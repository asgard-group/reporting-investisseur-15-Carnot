n');\n                if (icon) {\n                    if (currentBudgetSort === 'desc') {\n                        icon.innerHTML = '<polyline points=\"6 9 12 15 18 9\"/>';\n                    } else {\n                        icon.innerHTML = '<polyline points=\"6 15 12 9 18 15\"/>';\n                    }\n                }\n            }\n        }\n\n        \n\n        function renderCompareTable(items2026, items2025, total2026, total2025) {\n            const tbody = document.getElementById('budgetTableBody');\n            const tfoot = document.getElementById('budgetTableFoot');\n            if (!tbody || !tfoot) return;\n\n            // Update header for compare mode\n            const head = document.getElementById('budgetTableHead');\n            if (head) {\n                head.innerHTML = `\n                    <th style=\"min-width:220px;\"><button type=\"button\" class=\"driver-sort-btn\" id=\"driverSortBtn\" title=\"Trier par ordre alphabétique\">Driver<svg class=\"driver-sort-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 3 18 9\"/><polyline points=\"6 15 12 21 18 15\"/></svg></button></th>\n                    <th style=\"min-width:160px;\">Prestataire(s)</th>\n                    <th class=\"recup-col\" title=\"Récupérable / Non-récupérable\">Récup.</th>\n                    <th class=\"num\" style=\"background:rgba(26,169,160,0.08);\">Budget 2026</th>\n                    <th class=\"num\" style=\"background:rgba(100,116,139,0.08);\">Budget 2025</th>\n                    <th class=\"num\">Évolution</th>\n                `;\n            }\n\n            const map2025 = new Map();\n            items2025.forEach(i => map2025.set(i.driver, i));\n\n            let html = '';\n            BUDGET_CATEGORIES.forEach(cat => {\n                const cat26 = items2026.filter(i => i.category === cat.id).sort((a, b) => {\n                    const cmp = a.driver.localeCompare(b.driver, 'fr', {sensitivity:'base'});\n                    return currentBudgetSort === 'desc' ? -cmp : cmp;\n                });\n                if (!cat26.length) return;\n                const catBud26 = cat26.reduce((s, i) => s + i.budget, 0);\n                const catBud25 = cat26.reduce((s, i) => { const i25 = map2025.get(i.driver); return s + (i25 ? i25.budget : 0); }, 0);\n                const catEvol = catBud25 > 0 ? ((catBud26 - catBud25) / catBud25) * 100 : 0;\n                const catEvolColor = catEvol > 5 ? 'var(--danger)' : catEvol < -5 ? '#34D399' : 'var(--text-secondary)';\n                const isCollapsed = budgetCollapsedCategories.has(cat.id);\n                html += `\n                    <tr class=\"cat-header-row ${isCollapsed ? 'collapsed' : ''}\" data-cat=\"${cat.id}\">\n                        <td colspan=\"2\">\n                            <span class=\"cat-toggle\">\n                                <svg class=\"cat-caret\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"/></svg>\n                                <span class=\"cat-header-label\">${cat.label}</span>\n                                <span class=\"cat-header-count\">${cat26.length} poste${cat26.length > 1 ? 's' : ''}</span>\n                            </span>\n                        </td>\n                        <td></td>\n                        <td class=\"num cat-head-amount\" style=\"background:rgba(26,169,160,0.06);\">${catBud26 > 0 ? fmtEur(catBud26, {decimals:0}) + ' €' : '—'}</td>\n                        <td class=\"num cat-head-amount\" style=\"background:rgba(100,116,139,0.06);\">${catBud25 > 0 ? fmtEur(catBud25, {decimals:0}) + ' €' : '—'}</td>\n                        <td class=\"num\" style=\"color:${catEvolColor};font-weight:700;\">${catBud25 > 0 ? (catEvol >= 0 ? '+' : '') + catEvol.toFixed(1) + ' %' : '—'}</td>\n                    </tr>\n                `;\n                cat26.forEach(item => {\n                    const i25 = map2025.get(item.driver);\n                    const bud25 = i25 ? i25.budget : 0;\n                    const evol = bud25 > 0 ? ((item.budget - bud25) / bud25) * 100 : null;\n                    const evolColor = evol !== null ? (evol > 5 ? 'var(--danger)' : evol < -5 ? '#34D399' : 'var(--text-secondary)') : 'var(--text-muted)';\n                    const recupPill = item.recup === 'R'\n                        ? `<span class=\"recup-pill recup-r\" style=\"cursor:pointer\" onclick=\"toggleRecup('${item.description}')\">R</span>`\n                        : `<span class=\"recup-pill recup-nr\" style=\"cursor:pointer\" onclick=\"toggleRecup('${item.description}')\">NR</span>`;\n                    html += `\n                        <tr class=\"budget-data-row\" data-cat=\"${cat.id}\" ${isCollapsed ? 'style=\"display:none\"' : ''}>\n                            <td><span>${item.driver}</span></td>\n                            <td>${prestataireHTML(item.prestataires, item.description)}</td>\n                            <td class=\"recup-col\">${recupPill}</td>\n                            <td class=\"num\" style=\"background:rgba(26,169,160,0.04);\">${item.budget > 0 ? fmtEur(item.budget, {decimals:0}) + ' €' : '—'}</td>\n                            <td class=\"num\" style=\"background:rgba(100,116,139,0.04);\">${bud25 > 0 ? fmtEur(bud25, {decimals:0}) + ' €' : '—'}</td>\n                            <td class=\"num\" style=\"color:${evolColor};font-weight:600;\">${evol !== null ? (evol >= 0 ? '+' : '') + evol.toFixed(1) + ' %' : '—'}</td>\n                        </tr>\n                    `;\n                });\n            });\n            tbody.innerHTML = html;\n            tbody.querySelectorAll('.cat-header-row').forEach(row => {\n                row.addEventListener('click', () => {\n                    const cat = row.dataset.cat;\n                    if (budgetCollapsedCategories.has(cat)) budgetCollapsedCategories.delete(cat);\n                    else budgetCollapsedCategories.add(cat);\n                    renderBudget();\n                });\n            });\n\n            const evol_total = total2025 > 0 ? ((total2026 - total2025) / total2025) * 100 : 0;\n            const evolTotalColor = evol_total > 5 ? 'var(--danger)' : evol_total < -5 ? '#34D399' : 'var(--text-secondary)';\n            tfoot.innerHTML = `\n                <tr class=\"foot-total\">\n                    <td colspan=\"2\"><span class=\"mini-label\">Total comparatif</span>TOTAL GÉNÉRAL</td>\n                    <td></td>\n                    <td class=\"num\" style=\"background:rgba(26,169,160,0.06);\">${fmtEur(total2026, {decimals:0})} €</td>\n                    <td class=\"num\" style=\"background:rgba(100,116,139,0.06);\">${fmtEur(total2025, {decimals:0})} €</td>\n                    <td class=\"num\" style=\"color:${evolTotalColor};font-weight:700;\">${total2025 > 0 ? (evol_total >= 0 ? '+' : '') + evol_total.toFixed(1) + ' %' : '—'}</td>\n                </tr>\n            `;\n        }\n\n        let isPageUnlocked = false; // false = locked (default)\n\n        function togglePageLock() {\n            try {\n                isPageUnlocked = !isPageUnlocked;\n                if (document.body) document.body.classList.toggle('page-unlocked', isPageUnlocked);\n                const wrap = document.querySelector('.budget-wrapper');\n                if (wrap) wrap.classList.toggle('unlocked', isPageUnlocked);\n                const btn = document.getElementById('pageLockBtn');\n                if (btn) btn.title = isPageUnlocked ? 'Cliquer pour verrouiller' : 'Cliquer pour déverrouiller l\\'édition';\n\n                // Selector covers all major content sections\n                const editableSelector = [\n                    '.content-section h2', '.content-section h3', '.content-section h4',\n                    '.content-section p', '.content-section li',\n                    '.content-section .editable-text',\n                    '.content-section .kpi-label', '.content-section .kpi-value', '.content-section .kpi-unit',\n                    '.content-section .building-name',\n                    '.content-section .building-detail-value', '.content-section .building-detail-label',\n                    '.content-section .bvr-kpi-value', '.content-section .bvr-kpi-label', '.content-section .bvr-kpi-sub',\n                    '.content-section .budget-mini-kpi-value', '.content-section .budget-mini-kpi-label', '.content-section .budget-mini-kpi-sub',\n                    '.content-section .budget-footer-note',\n                    '.content-section .be-floor-name', '.content-section .am-section-title',\n                    '.content-section .team-name', '.content-section .team-desc', '.content-section .team-role'\n                ].join(',');\n\n                let elements = [];\n                try { elements = Array.from(document.querySelectorAll(editableSelector)); } catch(e) { elements = []; }\n\n                elements.forEach(el => {\n                    try {\n                        if (!el || !el.tagName) return;\n                        if (el.closest && el.closest('.no-edit')) return;\n                        if (el.classList && el.classList.contains('no-edit')) return;\n                        if (el.querySelector && el.querySelector('button, input, select, textarea')) return;\n                        if (!el.textContent || !el.textContent.trim()) return;\n                        el.contentEditable = isPageUnlocked ? 'true' : 'false';\n                        if (isPageUnlocked && !el.dataset.editWired) {\n                            el.dataset.editWired = '1';\n                            el.spellcheck = false;\n                            el.addEventListener('focus', function(){ this.dataset.original = this.innerHTML; });\n                            el.addEventListener('keydown', function(e){\n                                if (e.key === 'Enter' && !e.shiftKey && this.tagName !== 'P' && this.tagName !== 'LI') {\n                                    e.preventDefault(); this.blur();\n                                } else if (e.key === 'Escape') {\n                                    this.innerHTML = this.dataset.original; this.blur();\n                                }\n                            });\n                        }\n                    } catch(e) { /* skip element on error */ }\n                });\n\n                if (isPageUnlocked && document.body) {\n                    document.body.classList.add('lock-just-toggled');\n                    setTimeout(() => { try { document.body.classList.remove('lock-just-toggled'); } catch(e){} }, 1500);\n                }\n                if (typeof renderBudget === 'function') renderBudget();\n            } catch (err) {\n                console.warn('togglePageLock error:', err);\n            }\n        }\n        function toggleBudgetLock() { togglePageLock(); }\n\n        function toggleRecup(desc) {\n            if (typeof isPageUnlocked === 'undefined' || !isPageUnlocked) return;\n            const item = budgetData2026.find(i => i.description === desc);\n            if (item) {\n                item.recup = item.recup === 'R' ? 'NR' : 'R';\n                renderBudget();\n            }\n        }\n\n        function editAmount(el) {\n            if (typeof isPageUnlocked === 'undefined' || !isPageUnlocked) { renderBudget(); return; }\n            const desc = el.dataset.desc;\n            const field = el.dataset.field; // 'budget' or 'realized'\n            const item = budgetData2026.find(i => i.description === desc);\n            if (!item) return;\n            // Parse value: strip non-digit/comma/dot\n            const raw = el.textContent.replace(/[^0-9.,\\-]/g, '').replace(',', '.');\n            const val = parseFloat(raw);\n            if (isNaN(val)) {\n                renderBudget();\n                return;\n            }\n            const yr = currentBudgetYear === '2025' ? '2025' : '2026';\n            if (field === 'budget') {\n                if (yr === '2025') item.y2025 = val;\n                else { item.budget = val; item.y2026_obj = val; }\n            } else if (field === 'realized') {\n                if (yr === '2025') item.y2025_real = val;\n                else { item.realizedYTD = val; item.y2026_real = val; }\n            }\n            renderBudget();\n        }\n\n        function addPrestataire(desc) {\n            if (typeof isPageUnlocked === 'undefined' || !isPageUnlocked) return;\n            const item = budgetData2026.find(i => i.description === desc);\n            if (!item) return;\n            const name = prompt('Nom du prestataire à ajouter :', '');\n            if (!name || !name.trim()) return;\n            const trimmed = name.trim();\n            // Remove \"À venir\" placeholder if present\n            item.prestataires = item.prestataires.filter(p => p.cls !== 'none');\n            item.prestataires.push({ name: trimmed, cls: trimmed.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 12) || 'custom' });\n            renderBudget();\n        }\n\n        function removePrestataire(desc, idx) {\n            if (typeof isPageUnlocked === 'undefined' || !isPageUnlocked) return;\n            const item = budgetData2026.find(i => i.description === desc);\n            if (!item) return;\n            item.prestataires.splice(idx, 1);\n            if (item.prestataires.length === 0) {\n                item.prestataires = [{ name: 'À venir', cls: 'none' }];\n            }\n            renderBudget();\n        }\n\n        function prestataireHTML(prestataires, desc) {\n            const addBtn = desc\n                ? `<button class=\"budget-pill-add\" title=\"Ajouter un prestataire\" onclick=\"addPrestataire('${desc.replace(/'/g, \"\\\\'\")}')\">+</button>`\n                : '';\n            if (!prestataires || !prestataires.length) {\n                return '<div class=\"budget-prestas\"><span class=\"budget-dash\">—</span>' + addBtn + '</div>';\n            }\n            const escDesc = desc ? desc.replace(/'/g, \"\\\\'\") : '';\n            const pills = prestataires.map((p, i) =>\n                `<span class=\"budget-pill p-${p.cls}\">${p.name}${desc ? `<span class=\"pill-remove\" title=\"Retirer\" onclick=\"removePrestataire('${escDesc}', ${i}); event.stopPropagation();\">×</span>` : ''}</span>`\n            ).join('');\n            return '<div class=\"budget-prestas\">' + pills + addBtn + '</div>';\n        }\n        function docCellHTML(count) {\n            if (!count) return '<span class=\"budget-dash\">—</span>';\n            const icon = '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/></svg>';\n            return `<span class=\"budget-doc-cell has-docs\" onclick=\"openDataRoom()\" title=\"Voir les documents rattachés\">${icon}${count}</span>`;\n        }\n\n        function bvrStatusFromPct(pct) {\n            if (pct > 100) return 'danger';\n            if (pct >= 85) return 'warn';\n            return 'ok';\n        }\n\n        function renderBvrDashboard(items, totalBudget, totalRealized, period) {\n            const el = document.getElementById('bvrDashboard');\n            if (!el) return;\n            const ecart = totalRealized - totalBudget;\n            const ecartPct = totalBudget > 0 ? (ecart / totalBudget) * 100 : 0;\n            const consoPct = totalBudget > 0 ? (totalRealized / totalBudget) * 100 : 0;\n            const over = items.filter(i => i.status === 'danger');\n            const warn = items.filter(i => i.status === 'warn');\n            const globalStatus = bvrStatusFromPct(consoPct);\n\n            // Projection fin d'année (YTD uniquement)\n            let projCard = '';\n            if (period.showProj) {\n                const elapsed = 0.31; // ~23 avr = 31% de l'année\n                const projAnnual = totalRealized / elapsed;\n                const annualBudget = items.reduce((s, i) => s + i.budget, 0) / period.budgetMult;\n                const projEcart = projAnnual - annualBudget;\n                const projStatus = projEcart > 0 ? 'danger' : 'ok';\n                const sign = projEcart >= 0 ? '+' : '−';\n                projCard = `\n                    <div class=\"bvr-kpi ${projStatus}\">\n                        <span class=\"bvr-kpi-accent\"></span>\n                        <span class=\"bvr-kpi-label\">Projection fin 2026</span>\n                        <span class=\"bvr-kpi-value\">${fmtEur(projAnnual, {decimals: 0})} €</span>\n                        <span class=\"bvr-kpi-sub\">${sign}${fmtEur(Math.abs(projEcart), {decimals: 0})} € vs budget annuel (${fmtEur(annualBudget, {decimals: 0})} €)</span>\n                    </div>\n                `;\n            } else {\n                projCard = `\n                    <div class=\"bvr-kpi\">\n                        <span class=\"bvr-kpi-accent\"></span>\n                        <span class=\"bvr-kpi-label\">Postes à surveiller</span>\n                        <span class=\"bvr-kpi-value\">${warn.length + over.length}</span>\n                        <span class=\"bvr-kpi-sub\"><strong>${over.length}</strong> dépass. · <strong>${warn.length}</strong> proche lim.</span>\n                    </div>\n                `;\n            }\n\n            const ecartSign = ecart >= 0 ? '+' : '−';\n            el.innerHTML = `\n                <div class=\"bvr-kpi\">\n                    <span class=\"bvr-kpi-accent\"></span>\n                    <span class=\"bvr-kpi-label\">Budget ${period.label.split(' (')[0]}</span>\n                    <span class=\"bvr-kpi-value\">${fmtEur(totalBudget, {decimals: 0})} €</span>\n                    <span class=\"bvr-kpi-sub\">${items.length} postes · ${fmtEur(totalBudget / BUDGET_SURFACE, {decimals: 2})} €/m²</span>\n                </div>\n                <div class=\"bvr-kpi ${globalStatus}\">\n                    <span class=\"bvr-kpi-accent\"></span>\n                    <span class=\"bvr-kpi-label\">Réalisé Pennylane</span>\n                    <span class=\"bvr-kpi-value\">${fmtEur(Math.abs(totalRealized), {decimals: 0})} €</span>\n                    <span class=\"bvr-kpi-sub\"><strong>${consoPct.toFixed(1)} %</strong> du budget consommé</span>\n                </div>\n                <div class=\"bvr-kpi ${ecart > 0 ? 'danger' : 'ok'}\">\n                    <span class=\"bvr-kpi-accent\"></span>\n                    <span class=\"bvr-kpi-label\">Écart B vs R</span>\n                    <span class=\"bvr-kpi-value\">${ecartSign}${fmtEur(Math.abs(ecart), {decimals: 0})} €</span>\n                    <span class=\"bvr-kpi-sub\">${ecartSign}${Math.abs(ecartPct).toFixed(1)} % ${period.compareLabel}</span>\n                </div>\n                ${projCard}\n            `;\n        }\n\n        function renderBvrWarningBanner(items) {\n            const wrap = document.getElementById('bvrWarningBannerWrap');\n            if (!wrap) return;\n            const over = items.filter(i => i.status === 'danger');\n            if (!over.length) { wrap.innerHTML = ''; return; }\n            const topOver = [...over].sort((a, b) => b.ecart - a.ecart).slice(0, 3);\n            wrap.className = 'bvr-warning-banner-wrap';\n            wrap.innerHTML = `\n                <div class=\"bvr-warning-banner\">\n                    <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"/><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"/></svg>\n                    <div>\n                        <strong>${over.length} poste${over.length > 1 ? 's' : ''} en dépassement de budget</strong> —\n                        ${topOver.map(i => `${i.driver} <strong>+${fmtEur(i.ecart, {decimals: 0})} €</strong> (${i.consoPct.toFixed(0)} %)`).join(' · ')}\n                    </div>\n                </div>\n            `;\n        }\n\n        function renderBudgetTable(items, totalBudget, totalRealized, period) {\n            const tbody = document.getElementById('budgetTableBody');\n            const tfoot = document.getElementById('budgetTableFoot');\n            if (!tbody || !tfoot) return;\n\n            // Récap récupérables\n            const recupItems = items.filter(i => i.recup === 'R');\n            const nonRecupItems = items.filter(i => i.recup === 'NR');\n            const totalRecupBudget = recupItems.reduce((s, i) => s + i.budget, 0);\n            const totalRecupRealized = recupItems.reduce((s, i) => s + i.realized, 0);\n            const totalNRBudget = nonRecupItems.reduce((s, i) => s + i.budget, 0);\n            const totalNRRealized = nonRecupItems.reduce((s, i) => s + i.realized, 0);\n\n            const COLSPAN_LEFT = 3; // Driver + Récup + Prestataire\n\n            const contractPillHTML = (name) => {\n                if (!name) return '';\n                return `\n                    <a class=\"contract-link\" href=\"#\" title=\"${name}\" onclick=\"event.preventDefault();\">\n                        <svg class=\"contract-link-icon\" width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                            <path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/>\n                            <polyline points=\"14 2 14 8 20 8\"/>\n                        </svg>\n                        <span class=\"contract-link-name\">${name}</span>\n                    </a>\n                `;\n            };\n\n            const rowHTML = (item) => {\n                const perM2 = item.budget / BUDGET_SURFACE;\n                const hasRealized = item.realized > 0;\n                const ecartSign = item.ecart >= 0 ? '+' : '−';\n                const ecartColor = item.ecart > 0 ? 'var(--danger)' : '#34D399';\n                const pctCapped = Math.min(item.consoPct, 100);\n                const progClass = item.consoPct > 100 ? 'over' : item.status;\n                const showStatusDot = true;\n                const recupPill = item.recup === 'R'\n                    ? `<span class=\"recup-pill recup-r\" title=\"Cliquer pour basculer en NR\" style=\"cursor:pointer\" onclick=\"toggleRecup('${item.description}')\">R</span>`\n                    : `<span class=\"recup-pill recup-nr\" title=\"Cliquer pour basculer en R\" style=\"cursor:pointer\" onclick=\"toggleRecup('${item.description}')\">NR</span>`;\n                return `\n                    <tr class=\"budget-data-row\">\n                        <td>\n                            ${showStatusDot ? `<span class=\"bvr-status\"><span class=\"bvr-status-dot ${item.status}\"></span></span><span style=\"margin-left: 6px;\">${item.driver}</span>` : `<span>${item.driver}</span>`}\n                        </td>\n                        <td class=\"recup-col\">${recupPill}</td>\n                        <td>${prestataireHTML(item.prestataires, item.description)}</td>\n                        <td class=\"num\"><span class=\"editable-cell\" contenteditable=\"${typeof isPageUnlocked !== 'undefined' && isPageUnlocked}\" spellcheck=\"false\" data-desc=\"${item.description.replace(/\"/g, '&quot;')}\" data-field=\"budget\" data-locked=\"${typeof isPageUnlocked === 'undefined' || !isPageUnlocked}\" onblur=\"editAmount(this)\" onkeydown=\"if(event.key==='Enter'){event.preventDefault();this.blur();}else if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}\" onfocus=\"this.dataset.original=this.textContent\">${item.budget > 0 ? fmtEur(item.budget, {decimals: item.budget < 100 ? 2 : (item.budget % 1 ? 2 : 0)}) : '0'}</span> €</td>\n                        <td class=\"num col-bvr\" style=\"color: ${hasRealized ? 'var(--text-primary)' : 'var(--text-muted)'};\"><span class=\"editable-cell\" contenteditable=\"${typeof isPageUnlocked !== 'undefined' && isPageUnlocked}\" spellcheck=\"false\" data-desc=\"${item.description.replace(/\"/g, '&quot;')}\" data-field=\"realized\" data-locked=\"${typeof isPageUnlocked === 'undefined' || !isPageUnlocked}\" onblur=\"editAmount(this)\" onkeydown=\"if(event.key==='Enter'){event.preventDefault();this.blur();}else if(event.key==='Escape'){this.textContent=this.dataset.original;this.blur();}\" onfocus=\"this.dataset.original=this.textContent\">${hasRealized ? fmtEur(item.realized, {decimals: item.realized < 100 ? 2 : (item.realized % 1 ? 2 : 0)}) : '0'}</span> €</td>\n                        <td class=\"num col-bvr\" style=\"color: ${ecartColor};\">${hasRealized ? ecartSign + fmtEur(Math.abs(item.ecart), {decimals: 2}) + ' €' : '—'}</td>\n                        <td class=\"col-bvr\">\n                            ${item.budget > 0 ? `<div class=\"bvr-progress\"><div class=\"bvr-progress-track\"><div class=\"bvr-progress-fill ${progClass}\" style=\"width: ${pctCapped}%\"></div></div><span class=\"bvr-progress-pct ${item.status}\">${item.consoPct.toFixed(0)} %</span></div>` : '<span class=\"muted\">—</span>'}\n                        </td>\n                        <td class=\"num muted col-bonly\">${item.budget > 0 ? perM2.toFixed(1) + ' €/m²' : '—'}</td>\n                    </tr>\n                `;\n            };\n\n            const subtotalHTML = (label, catItems, catId) => {\n                const bud = catItems.reduce((s, i) => s + i.budget, 0);\n                const real = catItems.reduce((s, i) => s + i.realized, 0);\n                const ecart = real - bud;\n                const pct = bud > 0 ? (real / bud) * 100 : 0;\n                const status = bvrStatusFromPct(pct);\n                return `\n                    <tr class=\"cat-subtotal-row\" data-cat=\"${catId}\">\n                        <td colspan=\"${COLSPAN_LEFT}\">Sous-total — ${label}</td>\n                        <td class=\"num\">${bud > 0 ? fmtEur(bud, {decimals: 2}) + ' €' : '—'}</td>\n                        <td class=\"num col-bvr\">${real > 0 ? fmtEur(real, {decimals: 2}) + ' €' : '—'}</td>\n                        <td class=\"num col-bvr\" style=\"color: ${ecart > 0 ? 'var(--danger)' : '#34D399'};\">${bud > 0 && real > 0 ? (ecart >= 0 ? '+' : '−') + fmtEur(Math.abs(ecart), {decimals: 2}) + ' €' : '—'}</td>\n                        <td class=\"col-bvr\">${bud > 0 ? `<div class=\"bvr-progress\"><div class=\"bvr-progress-track\"><div class=\"bvr-progress-fill ${status}\" style=\"width: ${Math.min(pct, 100)}%\"></div></div><span class=\"bvr-progress-pct ${status}\">${pct.toFixed(0)} %</span></div>` : '<span class=\"muted\">—</span>'}</td>\n                        <td class=\"num muted col-bonly\">${bud > 0 ? (bud / BUDGET_SURFACE).toFixed(1) + ' €/m²' : '—'}</td>\n                    </tr>\n                `;\n            };\n\n            let html = '';\n            BUDGET_CATEGORIES.forEach(cat => {\n                const catItems = items.filter(i => i.category === cat.id).sort((a, b) => {\n                    const cmp = a.driver.localeCompare(b.driver, 'fr', {sensitivity: 'base'});\n                    return currentBudgetSort === 'desc' ? -cmp : cmp;\n                });\n                if (!catItems.length) return;\n                const catBud = catItems.reduce((s, i) => s + i.budget, 0);\n                const catReal = catItems.reduce((s, i) => s + i.realized, 0);\n                const catEcart = catReal - catBud;\n                const catPct = catBud > 0 ? (catReal / catBud) * 100 : 0;\n                const catStatus = bvrStatusFromPct(catPct);\n                const isCollapsed = budgetCollapsedCategories.has(cat.id);\n                html += `\n                    <tr class=\"cat-header-row ${isCollapsed ? 'collapsed' : ''}\" data-cat=\"${cat.id}\">\n                        <td colspan=\"${COLSPAN_LEFT}\">\n                            <span class=\"cat-toggle\">\n                                <svg class=\"cat-caret\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"/></svg>\n                                <span class=\"cat-header-label\">${cat.label}</span>\n                                <span class=\"cat-header-count\">${catItems.length} poste${catItems.length > 1 ? 's' : ''}</span>\n                            </span>\n                        </td>\n                        <td class=\"num cat-head-amount\">${catBud > 0 ? fmtEur(catBud, {decimals: 0}) + ' €' : '—'}</td>\n                        <td class=\"num cat-head-amount col-bvr\">${catReal > 0 ? fmtEur(catReal, {decimals: 0}) + ' €' : '—'}</td>\n                        <td class=\"num col-bvr cat-head-ecart\" style=\"color: ${catEcart > 0 ? 'var(--danger)' : '#34D399'};\">${catBud > 0 && catReal > 0 ? (catEcart >= 0 ? '+' : '−') + fmtEur(Math.abs(catEcart), {decimals: 0}) + ' €' : '—'}</td>\n                        <td class=\"cat-head-bar col-bvr\">${catBud > 0 ? `<div class=\"bvr-progress\"><div class=\"bvr-progress-track\"><div class=\"bvr-progress-fill ${catStatus}\" style=\"width: ${Math.min(catPct, 100)}%\"></div></div><span class=\"bvr-progress-pct ${catStatus}\">${catPct.toFixed(0)} %</span></div>` : '<span class=\"muted\">—</span>'}</td>\n                        <td class=\"num muted cat-head-m2 col-bonly\">${catBud > 0 ? (catBud / BUDGET_SURFACE).toFixed(1) + ' €/m²' : '—'}</td>\n                    </tr>\n                `;\n                catItems.forEach(item => {\n                    const rowStr = rowHTML(item);\n                    // Tag budget rows with data-cat so we can collapse them\n                    html += rowStr.replace('<tr class=\"budget-data-row\">', `<tr class=\"budget-data-row\" data-cat=\"${cat.id}\" ${isCollapsed ? 'style=\"display:none\"' : ''}>`);\n                });\n            });\n            tbody.innerHTML = html;\n\n            // Wire caret toggles\n            tbody.querySelectorAll('.cat-header-row').forEach(row => {\n                row.addEventListener('click', () => {\n                    const cat = row.dataset.cat;\n                    if (budgetCollapsedCategories.has(cat)) budgetCollapsedCategories.delete(cat);\n                    else budgetCollapsedCategories.add(cat);\n                    renderBudget();\n                });\n            });\n\n            // Footer : 3 lignes → Récupérables / Non récupérables / TOTAL\n            const totalEcart = totalRealized - totalBudget;\n            const totalPct = totalBudget > 0 ? (totalRealized / totalBudget) * 100 : 0;\n            const totalStatus = bvrStatusFromPct(totalPct);\n            const nrPct = totalNRBudget > 0 ? (totalNRRealized / totalNRBudget) * 100 : 0;\n            const nrStatus = bvrStatusFromPct(nrPct);\n            const nrEcart = totalNRRealized - totalNRBudget;\n            const rPct = totalRecupBudget > 0 ? (totalRecupRealized / totalRecupBudget) * 100 : 0;\n            const rStatus = bvrStatusFromPct(rPct);\n            const rEcart = totalRecupRealized - totalRecupBudget;\n\n            tfoot.innerHTML = `\n                <tr class=\"foot-total\">\n                    <td colspan=\"${COLSPAN_LEFT}\"><span class=\"mini-label\">Total — ${period.label}</span>TOTAL GÉNÉRAL</td>\n                    <td class=\"num\">${fmtEur(totalBudget, {decimals: 2})} €</td>\n                    <td class=\"num col-bvr\">${fmtEur(Math.abs(totalRealized), {decimals: 2})} €</td>\n                    <td class=\"num col-bvr\" style=\"color: ${totalEcart > 0 ? 'var(--danger)' : '#34D399'};\">${totalEcart >= 0 ? '+' : '−'}${fmtEur(Math.abs(totalEcart), {decimals: 2})} €</td>\n                    <td class=\"col-bvr\"><div class=\"bvr-progress\"><div class=\"bvr-progress-track\"><div class=\"bvr-progress-fill ${totalStatus}\" style=\"width: ${Math.min(totalPct, 100)}%\"></div></div><span class=\"bvr-progress-pct ${totalStatus}\">${totalPct.toFixed(1)} %</span></div></td>\n                    <td class=\"num teal col-bonly\">${(totalBudget / BUDGET_SURFACE).toFixed(1)} €/m²</td>\n                </tr>\n            `;\n        }\n\n        function renderBvrBars(items) {\n            const el = document.getElementById('bvrBarsList');\n            if (!el) return;\n            // Sort by absolute écart desc\n            const sorted = [...items].sort((a, b) => Math.abs(b.ecart) - Math.abs(a.ecart));\n            const maxAbs = Math.max(...sorted.map(i => Math.abs(i.ecart)), 1);\n            let html = '';\n            sorted.forEach(it => {\n                const pos = it.ecart > 0; // dépassement\n                const widthPct = (Math.abs(it.ecart) / maxAbs) * 50; // 50 % of track = max\n                html += `\n                    <div class=\"bvr-bar-row\">\n                        <div class=\"bvr-bar-label\" title=\"${it.driver}\">${it.driver}</div>\n                        <div class=\"bvr-bar-track\">\n                            <div class=\"bvr-bar-axis\"></div>\n                            ${pos\n                                ? `<div class=\"bvr-bar-fill pos\" style=\"width: ${widthPct}%;\"></div>`\n                                : `<div class=\"bvr-bar-fill neg\" style=\"width: ${widthPct}%;\"></div>`\n                            }\n                        </div>\n                        <div class=\"bvr-bar-value ${pos ? 'pos' : 'neg'}\">${pos ? '+' : '−'}${fmtEur(Math.abs(it.ecart), {decimals: 0})} €</div>\n                    </div>\n                `;\n            });\n            html += `<div class=\"bvr-bars-note\">← Économie par rapport au budget · Dépassement →</div>`;\n            el.innerHTML = html;\n        }\n\n        function wireBudgetChartToggle() {\n            const wrap = document.getElementById('budgetChartToggle');\n            if (!wrap) return;\n            wrap.addEventListener('click', (e) => {\n                const btn = e.target.closest('button');\n                if (!btn) return;\n                wrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));\n                btn.classList.add('active');\n                currentBudgetChart = btn.dataset.chart;\n                document.getElementById('budgetVizDonut').style.display = currentBudgetChart === 'donut' ? 'grid' : 'none';\n                document.getElementById('budgetVizBars').style.display = currentBudgetChart === 'bars' ? 'block' : 'none';\n            });\n        }\n\n        // Agrège plusieurs lignes partageant le même driver pour le donut/légende\n        function aggregateByDriver(items) {\n            const map = new Map();\n            items.forEach(it => {\n                if (it.budget <= 0) return;\n                const key = it.driver;\n                const cur = map.get(key) || { driver: it.driver, label: it.description || it.driver, montant: 0, prestataires: [], count: 0 };\n                cur.montant += it.montant;\n                cur.count += 1;\n                it.prestataires.forEach(p => { if (!cur.prestataires.find(x => x.name === p.name)) cur.prestataires.push(p); });\n                map.set(key, cur);\n            });\n            return [...map.values()];\n        }\n\n        function renderBudgetDonut(items, total) {\n            const svg = document.getElementById('budgetDonut');\n            if (!svg) return;\n            svg.innerHTML = '';\n\n            const rOuter = 118, rInner = 70, gap = 0.012;\n            const aggregated = aggregateByDriver(items).sort((a, b) => b.montant - a.montant);\n            const donutTotal = aggregated.reduce((s, i) => s + i.montant, 0) || total;\n            const budgetedCount = aggregated.length;\n            const yearLbl = currentBudgetView === 'bvr' ? '2026' : currentBudgetYear;\n\n            let acc = 0;\n            const slices = aggregated.map(it => {\n                const frac = it.montant / donutTotal;\n                const s = acc, e = acc + frac; acc = e;\n                return { ...it, start: s, end: e, frac, color: BUDGET_COLORS[it.driver] || '#81C6C1' };\n            });\n\n            const ns = 'http://www.w3.org/2000/svg';\n\n            // ── Slices ──\n            slices.forEach((s) => {\n                if (s.frac < 0.002) return;\n                const gapA = Math.min(gap, s.frac * Math.PI * 2 * 0.12);\n                const a0 = s.start * Math.PI * 2 - Math.PI / 2 + gapA / 2;\n                const a1 = s.end   * Math.PI * 2 - Math.PI / 2 - gapA / 2;\n                const large = (a1 - a0) > Math.PI ? 1 : 0;\n                const cos0 = Math.cos(a0), sin0 = Math.sin(a0);\n                const cos1 = Math.cos(a1), sin1 = Math.sin(a1);\n                const midA = ((s.start + s.end) / 2) * Math.PI * 2 - Math.PI / 2;\n                const ox = (Math.cos(midA) * 9).toFixed(2);\n                const oy = (Math.sin(midA) * 9).toFixed(2);\n\n                const path = document.createElementNS(ns, 'path');\n                path.setAttribute('d',\n                    `M ${(rOuter*cos0).toFixed(2)} ${(rOuter*sin0).toFixed(2)} ` +\n                    `A ${rOuter} ${rOuter} 0 ${large} 1 ${(rOuter*cos1).toFixed(2)} ${(rOuter*sin1).toFixed(2)} ` +\n                    `L ${(rInner*cos1).toFixed(2)} ${(rInner*sin1).toFixed(2)} ` +\n                    `A ${rInner} ${rInner} 0 ${large} 0 ${(rInner*cos0).toFixed(2)} ${(rInner*sin0).toFixed(2)} Z`\n                );\n                path.setAttribute('fill', s.color);\n                path.setAttribute('class', 'budget-donut-slice');\n                path.style.cursor = 'pointer';\n                path.style.transition = 'transform 0.2s cubic-bezier(.34,1.56,.64,1), filter 0.15s ease, opacity 0.15s ease';\n                path.setAttribute('data-driver', s.driver);\n\n                // ── Hover ──\n                path.addEventListener('mouseover', () => {\n                    // Pop slice\n                    path.style.transform = `translate(${ox}px,${oy}px)`;\n                    path.style.filter = 'brightness(1.18)';\n                    // Dim other slices\n                    svg.querySelectorAll('.budget-donut-slice').forEach(p => {\n                        if (p !== path) p.style.opacity = '0.35';\n                    });\n                    // Swap center\n                    const def = document.getElementById('donutCenterDefault');\n                    const hov = document.getElementById('donutCenterHover');\n                    if (def) def.style.display = 'none';\n                    if (hov) {\n                        const name = (s.label || s.driver);\n                        hov.innerHTML = `\n                            <text x=\"0\" y=\"-20\" text-anchor=\"middle\" style=\"font-size:8.5px;fill:var(--text-tertiary);letter-spacing:1.5px;text-transform:uppercase;font-weight:700\">${name.length>22?name.slice(0,21)+'…':name}</text>\n                            <text x=\"0\" y=\"-1\"  text-anchor=\"middle\" style=\"font-size:16px;font-weight:800;fill:var(--text-primary);letter-spacing:-0.8px\">${fmtEur(s.montant,{decimals:0})} €</text>\n                            <text x=\"0\" y=\"17\" text-anchor=\"middle\" style=\"font-size:11px;fill:${s.color};font-weight:700\">${(s.frac*100).toFixed(1)} %</text>\n                        `;\n                        hov.style.display = '';\n                    }\n                    // Highlight legend\n                    document.querySelectorAll('.budget-legend-item').forEach(li => {\n                        const match = li.dataset.driver === s.driver;\n                        li.style.opacity = match ? '1' : '0.3';\n                        li.style.transform = match ? 'translateX(4px)' : '';\n                        li.style.borderLeft = match ? `3px solid ${s.color}` : '3px solid transparent';\n                    });\n                });\n                path.addEventListener('mouseout', () => {\n                    path.style.transform = '';\n                    path.style.filter = '';\n                    svg.querySelectorAll('.budget-donut-slice').forEach(p => p.style.opacity = '');\n                    const def = document.getElementById('donutCenterDefault');\n                    const hov = document.getElementById('donutCenterHover');\n                    if (def) def.style.display = '';\n                    if (hov) hov.style.display = 'none';\n                    document.querySelectorAll('.budget-legend-item').forEach(li => {\n                        li.style.opacity = '';\n                        li.style.transform = '';\n                        li.style.borderLeft = '3px solid transparent';\n                    });\n                });\n                svg.appendChild(path);\n            });\n\n            // ── Default center ──\n            const defG = document.createElementNS(ns, 'g');\n            defG.setAttribute('id', 'donutCenterDefault');\n            defG.setAttribute('class', 'budget-donut-center');\n            defG.innerHTML = `\n                <text x=\"0\" y=\"-24\" text-anchor=\"middle\" class=\"budget-donut-center-label\">BUDGET ${yearLbl}</text>\n                <text x=\"0\" y=\"-2\"  text-anchor=\"middle\" class=\"budget-donut-center-value\">${fmtEur(total,{decimals:0})} €</text>\n                <text x=\"0\" y=\"18\"  text-anchor=\"middle\" class=\"budget-donut-center-sub\">${budgetedCount} postes · ${fmtEur(total/BUDGET_SURFACE,{decimals:2})} €/m²</text>\n            `;\n            svg.appendChild(defG);\n\n            // ── Hover center (hidden) ──\n            const hovG = document.createElementNS(ns, 'g');\n            hovG.setAttribute('id', 'donutCenterHover');\n            hovG.setAttribute('class', 'budget-donut-center');\n            hovG.style.display = 'none';\n            svg.appendChild(hovG);\n        }\n\n        function renderBudgetLegend(items, total) {\n            const el = document.getElementById('budgetLegend');\n            if (!el) return;\n            const aggregated = aggregateByDriver(items);\n            const legendTotal = aggregated.reduce((s, i) => s + i.montant, 0) || total;\n            const sorted = aggregated.sort((a, b) => b.montant - a.montant);\n\n            let h = `<div class=\"budget-legend-title\">Répartition par poste</div>`;\n            sorted.forEach((it, idx) => {\n                const pct = it.montant / legendTotal * 100;\n                const color = BUDGET_COLORS[it.driver] || '#81C6C1';\n                const rankStr = String(idx + 1).padStart(2, '0');\n                h += `\n                    <div class=\"budget-legend-item\" data-driver=\"${it.driver}\" style=\"border-left:3px solid transparent;transition:opacity .2s,transform .2s,border-left .15s,background .15s\">\n                        <span class=\"budget-legend-rank\">${rankStr}</span>\n                        <span class=\"budget-legend-swatch\" style=\"background:${color}\"></span>\n                        <span class=\"budget-legend-label\" title=\"${it.driver}\">${it.driver}</span>\n                        <span class=\"budget-legend-amount\">${fmtEur(it.montant,{decimals:0})} €</span>\n                        <span class=\"budget-legend-pct\">${pct.toFixed(1)} %</span>\n                    </div>`;\n            });\n            el.innerHTML = h;\n\n            // Legend hover → sync with donut\n            el.querySelectorAll('.budget-legend-item').forEach(li => {\n                li.addEventListener('mouseover', () => {\n                    const driver = li.dataset.driver;\n                    const slice = sorted.find(s => s.driver === driver);\n                    if (!slice) return;\n                    const color = BUDGET_COLORS[driver] || '#81C6C1';\n                    // Highlight this row\n                    el.querySelectorAll('.budget-legend-item').forEach(x => {\n                        x.style.opacity = x === li ? '1' : '0.3';\n                        x.style.transform = x === li ? 'translateX(4px)' : '';\n                        x.style.borderLeft = x === li ? `3px solid ${color}` : '3px solid transparent';\n                    });\n                    // Dim donut slices\n                    const svg = document.getElementById('budgetDonut');\n                    if (svg) svg.querySelectorAll('.budget-donut-slice').forEach(p => {\n                        p.style.opacity = p.getAttribute('data-driver') === driver ? '1' : '0.3';\n                    });\n                    // Update center\n                    const def = document.getElementById('donutCenterDefault');\n                    const hov = document.getElementById('donutCenterHover');\n                    if (def) def.style.display = 'none';\n                    if (hov) {\n                        const name = slice.driver;\n                        hov.innerHTML = `\n                            <text x=\"0\" y=\"-18\" text-anchor=\"middle\" style=\"font-size:9px;fill:var(--text-tertiary);letter-spacing:1.5px;text-transform:uppercase;font-weight:600\">${name.length>20?name.slice(0,19)+'…':name}</text>\n                            <text x=\"0\" y=\"2\"  text-anchor=\"middle\" style=\"font-size:15px;font-weight:700;fill:var(--text-primary)\">${fmtEur(slice.montant,{decimals:0})} €</text>\n                            <text x=\"0\" y=\"20\" text-anchor=\"middle\" style=\"font-size:10px;fill:${color};font-weight:600\">${(slice.montant/legendTotal*100).toFixed(1)} % du budget</text>`;\n                        hov.style.display = '';\n                    }\n                });\n                li.addEventListener('mouseout', () => {\n                    el.querySelectorAll('.budget-legend-item').forEach(x => {\n                        x.style.opacity = ''; x.style.transform = ''; x.style.borderLeft = '3px solid transparent';\n                    });\n                    const svg = document.getElementById('budgetDonut');\n                    if (svg) svg.querySelectorAll('.budget-donut-slice').forEach(p => p.style.opacity = '');\n                    const def = document.getElementById('donutCenterDefault');\n                    const hov = document.getElementById('donutCenterHover');\n                    if (def) def.style.display = '';\n                    if (hov) hov.style.display = 'none';\n                });\n            });\n        }\n\n        function renderBudgetMiniKpis(items, total, period) {\n            const el = document.getElementById('budgetMiniKpis');\n            if (!el) return;\n            const aggregated = aggregateByDriver(items);\n            const aggTotal = aggregated.reduce((s, i) => s + i.montant, 0) || 1;\n            const top = aggregated.sort((a, b) => b.montant - a.montant)[0] || { driver: '—', montant: 0 };\n            const withProvider = items.filter(i => i.prestataires.length && !i.prestataires.find(p => p.cls === 'none')).length;\n\n            el.innerHTML = `\n                <div class=\"budget-mini-kpi\">\n                    <span class=\"budget-mini-kpi-label\">Total €/m²</span>\n                    <span class=\"budget-mini-kpi-value\">${fmtEur(total / BUDGET_SURFACE, {decimals: 2})} €/m²</span>\n                    <span class=\"budget-mini-kpi-sub\">Surface : ${BUDGET_SURFACE} m²</span>\n                </div>\n                <div class=\"budget-mini-kpi\">\n                    <span class=\"budget-mini-kpi-label\">Poste majeur</span>\n                    <span class=\"budget-mini-kpi-value\">${(top.montant / aggTotal * 100).toFixed(0)} %</span>\n                    <span class=\"budget-mini-kpi-sub\">${top.label || top.driver}</span>\n                </div>\n                <div class=\"budget-mini-kpi\">\n                    <span class=\"budget-mini-kpi-label\">Avec prestataire</span>\n                    <span class=\"budget-mini-kpi-value\">${withProvider}/${items.length}</span>\n                    <span class=\"budget-mini-kpi-sub\">contrats actifs</span>\n                </div>\n            `;\n        }\n\n        function wireBudgetPeriodSelector() {\n            // No period selector — handled by mode cards (budget seul / comparatif)\n        }\n\n        function wireBudgetViewSelector() {\n            const wrap = document.getElementById('budgetViewSelect');\n            if (!wrap) return;\n            wrap.addEventListener('click', (e) => {\n                const btn = e.target.closest('.budget-mode-card');\n                if (!btn) return;\n                wrap.querySelectorAll('.budget-mode-card').forEach(b => b.classList.remove('active'));\n                btn.classList.add('active');\n                currentBudgetView = btn.dataset.view; // 'budget' or 'bvr'\n                applyBudgetView();\n                renderBudget();\n            });\n        }\n\n        function wireBudgetYearSelector() {\n            const wrap = document.getElementById('budgetYearSelect');\n            if (!wrap) return;\n            wrap.addEventListener('click', (e) => {\n                const btn = e.target.closest('.budget-period-tab');\n                if (!btn) return;\n                // 'compare' is a Budget-seul-only choice — auto-switch view if needed\n                if (btn.dataset.year === 'compare' && currentBudgetView === 'bvr') {\n                    currentBudgetView = 'budget';\n                    document.querySelectorAll('.budget-mode-card').forEach(c => {\n                        c.classList.toggle('active', c.dataset.view === 'budget');\n                    });\n                    applyBudgetView();\n                }\n                wrap.querySelectorAll('.budget-period-tab').forEach(b => b.classList.remove('active'));\n                btn.classList.add('active');\n                currentBudgetYear = btn.dataset.year;\n                renderBudget();\n            });\n        }\n\n        function applyBudgetView() {\n            const root = document.querySelector('.budget-wrapper');\n            if (!root) return;\n            root.classList.toggle('view-budget', currentBudgetView === 'budget');\n            const badge = document.getElementById('budgetViewBadge');\n            if (badge) badge.textContent = currentBudgetView === 'budget' ? 'Budget seul' : 'Réalisé vs Budget';\n        }\n\n        function exportBudget() {\n            const items = getBudgetForPeriod(currentBudgetPeriod);\n            const period = BUDGET_PERIODS[currentBudgetPeriod];\n            const totalB = items.reduce((s, i) => s + i.budget, 0);\n            const totalR = items.reduce((s, i) => s + i.realized, 0);\n\n            let csv = `Famille;Driver;Documents;Prestataires;Budget ${period.label} (€);Réalisé (€);Écart (€);Conso (%);€/m²\\n`;\n            items.forEach(i => {\n                const prestas = i.prestataires.map(p => p.name).join(', ') || '—';\n                csv += `\"${i.family}\";\"${i.driver}\";${i.docs};\"${prestas}\";-${i.budget.toFixed(2)};-${i.realized.toFixed(2)};${(i.ecart>=0?'+':'-')}${Math.abs(i.ecart).toFixed(2)};${i.consoPct.toFixed(1)};-${(i.budget/BUDGET_SURFACE).toFixed(2)}\\n`;\n            });\n            const te = totalR - totalB;\n            csv += `;;;\"Total Costs\";-${totalB.toFixed(2)};-${totalR.toFixed(2)};${(te>=0?'+':'-')}${Math.abs(te).toFixed(2)};${totalB>0?(totalR/totalB*100).toFixed(1):0};-${(totalB/BUDGET_SURFACE).toFixed(2)}\\n`;\n\n            const blob = new Blob(['\\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `Budget_vs_Realise_15Carnot_${currentBudgetPeriod}_${new Date().toISOString().split('T')[0]}.csv`;\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n\n        function initBudget() {\n            if (!document.getElementById('budgetTableBody')) return;\n            wireBudgetPeriodSelector();\n            wireBudgetViewSelector();\n            wireBudgetYearSelector();\n            wireBudgetChartToggle();\n            applyBudgetView();\n            renderBudget();\n        }\n\n        // ============================================================\n        // ANALYSE DU CHIFFRE D'AFFAIRES\n        // ============================================================\n        // Clients : 6 clients actifs sur 15 Carnot\n        //   loyer = loyer mensuel HC (€)\n        //   services = {concierge, events, fruits, salles, parking, menage} mensuel moyen (€)\n        //   color : pour donut / avatar\n        const caClientsData = [\n            {\n                id: 'loki', name: 'LOKI Consulting', type: 'Conseil · 3 plateaux (R+2/3/4)',\n                loyerMensuel: 52800, // 3 lots × ~17 600 €\n                services: { concierge: 1200, events: 900, fruits: 520, salles: 680, parking: 420, menage: 0 },\n                color: '#6366F1', avatarInitials: 'LK',\n                budgetAnnuel: 673560, // loyers + services × 12\n                realiseYTD: 224520, // ~4 mois\n                consoPct: 99, status: 'ok'\n            },\n            {\n                id: 'joro', name: 'JORO (siège)', type: 'Siège social · R+5',\n                loyerMensuel: 23800,\n                services: { concierge: 0, events: 0, fruits: 0, salles: 0, parking: 0, menage: 0 },\n                color: '#1AA9A0', avatarInitials: 'JR',\n                budgetAnnuel: 285600,\n                realiseYTD: 95200,\n                consoPct: 100, status: 'ok'\n            },\n            {\n                id: 'atlas', name: 'ATLAS Labs', type: 'R&D / Laboratoire · R+1',\n                loyerMensuel: 27300,\n                services: { concierge: 780, events: 320, fruits: 280, salles: 440, parking: 280, menage: 180 },\n                color: '#EC4899', avatarInitials: 'AT',\n                budgetAnnuel: 352560,\n                realiseYTD: 116400,\n                consoPct: 99, status: 'ok'\n            },\n            {\n                id: 'cafe-luma', name: 'Café Luma', type: 'Commerce — CHR · RDC',\n                loyerMensuel: 6800,\n                services: { concierge: 0, events: 0, fruits: 0, salles: 0, parking: 0, menage: 120 },\n                color: '#F59E0B', avatarInitials: 'CL',\n                budgetAnnuel: 83040,\n                realiseYTD: 20400, // retard 1 mois\n                consoPct: 74, status: 'late'\n            },\n            {\n                id: 'studio-noma', name: 'Studio Noma', type: 'Coworking ponctuel · R+1 (fraction)',\n                loyerMensuel: 4200,\n                services: { concierge: 140, events: 0, fruits: 90, salles: 380, parking: 0, menage: 80 },\n                color: '#10B981', avatarInitials: 'SN',\n                budgetAnnuel: 58680,\n                realiseYTD: 18900,\n                consoPct: 97, status: 'ok'\n            },\n            {\n                id: 'kora', name: 'Kora Events', type: 'Événementiel récurrent · Salles',\n                loyerMensuel: 0, // pas de loyer, que des services\n                services: { concierge: 0, events: 6800, fruits: 0, salles: 4200, parking: 340, menage: 520 },\n                color: '#A855F7', avatarInitials: 'KE',\n                budgetAnnuel: 142320, // services uniquement, saisonnier\n                realiseYTD: 49800, // T1 fort\n                consoPct: 105, status: 'ok'\n            }\n        ];\n\n        // Services complémentaires catalogue (pour donut par nature)\n        const caServicesCatalog = [\n            { key: 'concierge', label: 'Conciergerie', color: '#38BDF8' },\n            { key: 'events', label: 'Événementiel', color: '#A855F7' },\n            { key: 'salles', label: 'Salles de réunion', color: '#10B981' },\n            { key: 'fruits', label: 'Fruits & café', color: '#F59E0B' },\n            { key: 'parking', label: 'Parking', color: '#64748B' },\n            { key: 'menage', label: 'Ménage premium', color: '#EC4899' }\n        ];\n\n        // Données CA mensuel 2025-2026 (loyers stables, services saisonniers)\n        // T1, T2, T3, T4 → services events plus fort en été/automne\n        const caMonthlyData = [\n            // 2026\n            { month: 'Janv.', year: 26, loyers: 114900, services: 13800 },\n            { month: 'Févr.', year: 26, loyers: 114900, services: 14100 },\n            { month: 'Mars', year: 26, loyers: 114900, services: 16200 },\n            { month: 'Avr.', year: 26, loyers: 114900, services: 14800 },\n            { month: 'Mai', year: 26, loyers: 114900, services: 15600 },\n            { month: 'Juin', year: 26, loyers: 114900, services: 18400 },\n            { month: 'Juill.', year: 26, loyers: 114900, services: 12200 }, // creux estival\n            { month: 'Août', year: 26, loyers: 114900, services: 9800 },\n            { month: 'Sept.', year: 26, loyers: 114900, services: 19200 }, // rentrée\n            { month: 'Oct.', year: 26, loyers: 114900, services: 17400 },\n            { month: 'Nov.', year: 26, loyers: 114900, services: 16100 },\n            { month: 'Déc.', year: 26, loyers: 114900, services: 14200 }\n        ];\n\n        // State\n        let currentCaView = 'structure';\n        let currentCaPeriod = 'YTD';\n\n        function fmtK(n) {\n            if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + ' k€';\n            return n.toFixed(0) + ' €';\n        }\n\n        function caClientTotalMensuel(c) {\n            const svc = Object.values(c.services).reduce((s, v) => s + v, 0);\n            return c.loyerMensuel + svc;\n        }\n\n        function caClientServicesTotal(c) {\n            return Object.values(c.services).reduce((s, v) => s + v, 0);\n        }\n\n        // ------ KPIs ------\n        function renderCaKpis() {\n            const el = document.getElementById('caKpis');\n            if (!el) return;\n\n            const totalMensuel = caClientsData.reduce((s, c) => s + caClientTotalMensuel(c), 0);\n            const totalLoyers = caClientsData.reduce((s, c) => s + c.loyerMensuel, 0);\n            const totalServices = caClientsData.reduce((s, c) => s + caClientServicesTotal(c), 0);\n            const servicesShare = (totalServices / totalMensuel) * 100;\n\n            const totalBudget = caClientsData.reduce((s, c) => s + c.budgetAnnuel, 0);\n            const totalRealise = caClientsData.reduce((s, c) => s + c.realiseYTD, 0);\n            const pctBudget = (totalRealise / totalBudget) * 100;\n\n            // Top client concentration\n            const sorted = [...caClientsData].sort((a, b) => caClientTotalMensuel(b) - caClientTotalMensuel(a));\n            const topShare = (caClientTotalMensuel(sorted[0]) / totalMensuel) * 100;\n\n            el.innerHTML = `\n                <div class=\"ca-kpi\">\n                    <span class=\"ca-kpi-label\">CA mensuel</span>\n                    <span class=\"ca-kpi-value\">${fmtK(totalMensuel)}</span>\n                    <span class=\"ca-kpi-sub pos\">↑ 4,2 % vs N-1</span>\n                </div>\n                <div class=\"ca-kpi\">\n                    <span class=\"ca-kpi-label\">Part services compl.</span>\n                    <span class=\"ca-kpi-value\">${servicesShare.toFixed(1)} %</span>\n                    <span class=\"ca-kpi-sub\">${fmtK(totalServices)} / mois</span>\n                </div>\n                <div class=\"ca-kpi\">\n                    <span class=\"ca-kpi-label\">Concentration top client</span>\n                    <span class=\"ca-kpi-value\">${topShare.toFixed(0)} %</span>\n                    <span class=\"ca-kpi-sub\">${sorted[0].name}</span>\n                </div>\n                <div class=\"ca-kpi\">\n                    <span class=\"ca-kpi-label\">Réalisé YTD / Budget</span>\n                    <span class=\"ca-kpi-value\">${pctBudget.toFixed(0)} %</span>\n                    <span class=\"ca-kpi-sub\">${fmtK(totalRealise)} / ${fmtK(totalBudget)}</span>\n                </div>\n            `;\n        }\n\n        // ------ DONUT builder (reusable) ------\n        function buildCaDonut(data, centerValue, centerLabel) {\n            const cx = 100, cy = 100, rOuter = 85, rInner = 55;\n            const total = data.reduce((s, d) => s + d.value, 0);\n            const ns = 'http://www.w3.org/2000/svg';\n            const svg = document.createElementNS(ns, 'svg');\n            svg.setAttribute('class', 'ca-donut');\n            svg.setAttribute('viewBox', '0 0 200 200');\n\n            let angle = -Math.PI / 2;\n            data.forEach(d => {\n                const frac = d.value / total;\n                const a0 = angle;\n                const a1 = angle + frac * Math.PI * 2;\n                const large = frac > 0.5 ? 1 : 0;\n                const x0o = cx + rOuter * Math.cos(a0);\n                const y0o = cy + rOuter * Math.sin(a0);\n                const x1o = cx + rOuter * Math.cos(a1);\n                const y1o = cy + rOuter * Math.sin(a1);\n                const x0i = cx + rInner * Math.cos(a1);\n                const y0i = cy + rInner * Math.sin(a1);\n                const x1i = cx + rInner * Math.cos(a0);\n                const y1i = cy + rInner * Math.sin(a0);\n                const p = document.createElementNS(ns, 'path');\n                p.setAttribute('d',\n                    `M ${x0o.toFixed(2)} ${y0o.toFixed(2)} ` +\n                    `A ${rOuter} ${rOuter} 0 ${large} 1 ${x1o.toFixed(2)} ${y1o.toFixed(2)} ` +\n                    `L ${x0i.toFixed(2)} ${y0i.toFixed(2)} ` +\n                    `A ${rInner} ${rInner} 0 ${large} 0 ${x1i.toFixed(2)} ${y1i.toFixed(2)} Z`\n                );\n                p.setAttribute('fill', d.color);\n                svg.appendChild(p);\n                angle = a1;\n            });\n\n            const tVal = document.createElementNS(ns, 'text');\n            tVal.setAttribute('x', cx); tVal.setAttribute('y', cy - 4);\n            tVal.setAttribute('class', 'ca-donut-center ca-donut-center-value');\n            tVal.textContent = centerValue;\n            svg.appendChild(tVal);\n\n            const tLab = document.createElementNS(ns, 'text');\n            tLab.setAttribute('x', cx); tLab.setAttribute('y', cy + 16);\n            tLab.setAttribute('class', 'ca-donut-center ca-donut-center-label');\n            tLab.textContent = centerLabel;\n            svg.appendChild(tLab);\n\n            return svg;\n        }\n\n        // ------ STRUCTURE view ------\n        function renderCaStructure() {\n            const el = document.getElementById('caContent');\n            if (!el) return;\n\n            // Data : par client\n            const byClient = caClientsData.map(c => ({\n                label: c.name,\n                value: caClientTotalMensuel(c),\n                color: c.color\n            })).sort((a, b) => b.value - a.value);\n            const totalClient = byClient.reduce((s, d) => s + d.value, 0);\n\n            // Data : par nature (loyers vs services) + breakdown services\n            const totalLoyers = caClientsData.reduce((s, c) => s + c.loyerMensuel, 0);\n            const svcBreakdown = caServicesCatalog.map(s => ({\n                label: s.label,\n                value: caClientsData.reduce((sum, c) => sum + (c.services[s.key] || 0), 0),\n                color: s.color\n            })).filter(d => d.value > 0);\n            const totalServices = svcBreakdown.reduce((s, d) => s + d.value, 0);\n            const byNature = [\n                { label: 'Loyers HC', value: totalLoyers, color: 'var(--joro-teal)' },\n                ...svcBreakdown\n            ];\n            const totalNature = byNature.reduce((s, d) => s + d.value, 0);\n\n            el.innerHTML = `\n                <div class=\"ca-structure\">\n                    <div class=\"ca-chart-card\">\n                        <div class=\"ca-chart-card-title\">Par client</div>\n                        <div class=\"ca-donut-wrap\">\n                            <div id=\"caDonutClients\"></div>\n                            <div class=\"ca-legend\" id=\"caLegendClients\"></div>\n                        </div>\n                    </div>\n                    <div class=\"ca-chart-card\">\n                        <div class=\"ca-chart-card-title\">Par nature de revenu</div>\n                        <div class=\"ca-donut-wrap\">\n                            <div id=\"caDonutNature\"></div>\n                            <div class=\"ca-legend\" id=\"caLegendNature\"></div>\n                        </div>\n                    </div>\n                </div>\n            `;\n\n            // Insert SVG donuts\n            const donutClients = buildCaDonut(byClient, fmtK(totalClient), 'Mensuel');\n            document.getElementById('caDonutClients').appendChild(donutClients);\n            // Resolve joro-teal for the nature donut\n            const resolvedByNature = byNature.map(d => ({\n                ...d,\n                color: d.color.startsWith('var(') ? getComputedStyle(document.documentElement).getPropertyValue('--joro-teal').trim() || '#1AA9A0' : d.color\n            }));\n            const donutNature = buildCaDonut(resolvedByNature, fmtK(totalNature), 'Mensuel');\n            document.getElementById('caDonutNature').appendChild(donutNature);\n\n            // Legends\n            const legClients = document.getElementById('caLegendClients');\n            legClients.innerHTML = byClient.map(d => `\n                <div class=\"ca-legend-row\">\n                    <span class=\"ca-legend-dot\" style=\"background: ${d.color};\"></span>\n                    <span class=\"ca-legend-label\" title=\"${d.label}\">${d.label}</span>\n                    <span class=\"ca-legend-value\">${fmtK(d.value)}</span>\n                    <span class=\"ca-legend-pct\">${((d.value / totalClient) * 100).toFixed(1)} %</span>\n                </div>\n            `).join('');\n\n            const legNature = document.getElementById('caLegendNature');\n            legNature.innerHTML = resolvedByNature.map(d => `\n                <div class=\"ca-legend-row\">\n                    <span class=\"ca-legend-dot\" style=\"background: ${d.color};\"></span>\n                    <span class=\"ca-legend-label\">${d.label}</span>\n                    <span class=\"ca-legend-value\">${fmtK(d.value)}</span>\n                    <span class=\"ca-legend-pct\">${((d.value / totalNature) * 100).toFixed(1)} %</span>\n                </div>\n            `).join('');\n        }\n\n        // ------ EVOLUTION view ------\n        function renderCaEvolution() {\n            const el = document.getElementById('caContent');\n            if (!el) return;\n\n            const maxTotal = Math.max(...caMonthlyData.map(m => m.loyers + m.services));\n\n            el.innerHTML = `\n                <div class=\"ca-evolution\">\n                    <div class=\"ca-evolution-legend\">\n                        <span class=\"ca-evolution-legend-item\"><span class=\"sw\" style=\"background: var(--joro-teal);\"></span>Loyers HC</span>\n                        <span class=\"ca-evolution-legend-item\"><span class=\"sw\" style=\"background: #F59E0B;\"></span>Services complémentaires</span>\n                    </div>\n                    <div class=\"ca-evolution-chart\">\n                        ${caMonthlyData.map(m => {\n                            const total = m.loyers + m.services;\n                            const loyersH = (m.loyers / maxTotal) * 200;\n                            const servicesH = (m.services / maxTotal) * 200;\n                            return `\n                                <div class=\"ca-month\">\n                                    <div class=\"ca-month-total\">${fmtK(total)}</div>\n                                    <div class=\"ca-month-bar\" title=\"${m.month} · Loyers ${fmtK(m.loyers)} + Services ${fmtK(m.services)}\">\n                                        <div class=\"stack services\" style=\"height: ${servicesH}px;\"></div>\n                                        <div class=\"stack loyers\" style=\"height: ${loyersH}px;\"></div>\n                                    </div>\n                                    <div class=\"ca-month-label\">${m.month}</div>\n                                </div>\n                            `;\n                        }).join('')}\n                    </div>\n                </div>\n            `;\n        }\n\n        // ------ BUDGET vs RÉALISÉ view ------\n        function renderCaBvr() {\n            const el = document.getElementById('caContent');\n            if (!el) return;\n\n            const totalBud = caClientsData.reduce((s, c) => s + c.budgetAnnuel, 0);\n            const totalReal = caClientsData.reduce((s, c) => s + c.realiseYTD, 0);\n            // Prorata YTD : ~4 mois sur 12 = 33 %\n            const proRataPct = 33.3;\n            const totalAttendu = totalBud * (proRataPct / 100);\n            const totalEcart = totalReal - totalAttendu;\n\n            el.innerHTML = `\n                <div class=\"ca-bvr-table-wrap\">\n                    <table class=\"ca-bvr-table\">\n                        <thead>\n                            <tr>\n                                <th>Client</th>\n                                <th class=\"num\">Budget annuel</th>\n                                <th class=\"num\">Attendu YTD</th>\n                                <th class=\"num\">Réalisé YTD</th>\n                                <th class=\"num\">Écart</th>\n                                <th>Atteinte vs prorata</th>\n                                <th>Statut</th>\n                            </tr>\n                        </thead>\n                        <tbody>\n                            ${caClientsData.map(c => {\n                                const attendu = c.budgetAnnuel * (proRataPct / 100);\n                                const ecart = c.realiseYTD - attendu;\n                                const pct = (c.realiseYTD / attendu) * 100;\n                                const progClass = pct < 85 ? 'late' : (pct < 97 ? 'under' : '');\n                                const statusClass = c.status;\n                                const statusLabel = c.status === 'ok' ? 'À jour' : (c.status === 'late' ? 'Retard' : 'Vigilance');\n                                const ecartColor = ecart >= 0 ? '#34D399' : 'var(--danger)';\n                                return `\n                                    <tr>\n                                        <td>\n                                            <div class=\"client-cell\">\n                                                <div class=\"client-avatar\" style=\"background: ${c.color};\">${c.avatarInitials}</div>\n                                                <div>\n                                                    <div class=\"client-name\">${c.name}</div>\n                                                    <div class=\"client-type\">${c.type}</div>\n                                                </div>\n                                            </div>\n                                        </td>\n                                        <td class=\"num\">${fmtK(c.budgetAnnuel)}</td>\n                                        <td class=\"num\" style=\"color: var(--text-tertiary);\">${fmtK(attendu)}</td>\n                                        <td class=\"num\">${fmtK(c.realiseYTD)}</td>\n                                        <td class=\"num col-bvr\" style=\"color: ${ecartColor};\">${ecart >= 0 ? '+' : '−'}${fmtK(Math.abs(ecart))}</td>\n                                        <td>\n                                            <div class=\"ca-bvr-progress\">\n                                                <div class=\"ca-bvr-progress-track\">\n                                                    <div class=\"ca-bvr-progress-fill ${progClass}\" style=\"width: ${Math.min(pct, 100)}%;\"></div>\n                                                </div>\n                                                <span class=\"ca-bvr-progress-pct\">${pct.toFixed(0)} %</span>\n                                            </div>\n                                        </td>\n                                        <td><span class=\"ca-status-pill ${statusClass}\">${statusLabel}</span></td>\n                                    </tr>\n                                `;\n                            }).join('')}\n                        </tbody>\n                        <tfoot>\n                            <tr>\n                                <td>TOTAL · 6 clients</td>\n                                <td class=\"num\">${fmtK(totalBud)}</td>\n                                <td class=\"num\">${fmtK(totalAttendu)}</td>\n                                <td class=\"num\">${fmtK(totalReal)}</td>\n                                <td class=\"num\" style=\"color: ${totalEcart >= 0 ? '#34D399' : 'var(--danger)'};\">${totalEcart >= 0 ? '+' : '−'}${fmtK(Math.abs(totalEcart))}</td>\n                                <td>\n                                    <div class=\"ca-bvr-progress\">\n                                        <div class=\"ca-bvr-progress-track\">\n                                            <div class=\"ca-bvr-progress-fill\" style=\"width: ${Math.min((totalReal / totalAttendu) * 100, 100)}%;\"></div>\n                                        </div>\n                                        <span class=\"ca-bvr-progress-pct\">${((totalReal / totalAttendu) * 100).toFixed(0)} %</span>\n                                    </div>\n                                </td>\n                                <td></td>\n                            </tr>\n                        </tfoot>\n                    </table>\n                </div>\n            `;\n        }\n\n        function renderCa() {\n            renderCaKpis();\n            if (currentCaView === 'structure') renderCaStructure();\n            else if (currentCaView === 'evolution') renderCaEvolution();\n            else renderCaBvr();\n        }\n\n        function wireCaView() {\n            const wrap = document.getElementById('caViewSelect');\n            if (!wrap) return;\n            wrap.addEventListener('click', (e) => {\n                const btn = e.target.closest('.ca-mode-card');\n                if (!btn) return;\n                wrap.querySelectorAll('.ca-mode-card').forEach(b => b.classList.remove('active'));\n                btn.classList.add('active');\n                currentCaView = btn.dataset.view;\n                renderCa();\n            });\n        }\n\n        function wireCaPeriod() {\n            const wrap = document.getElementById('caPeriodSelect');\n            if (!wrap) return;\n            wrap.addEventListener('click', (e) => {\n                const btn = e.target.closest('.budget-period-tab');\n                if (!btn) return;\n                wrap.querySelectorAll('.budget-period-tab').forEach(b => b.classList.remove('active'));\n                btn.classList.add('active');\n                currentCaPeriod = btn.dataset.period;\n                // Period filter is visual-only for now (data is indicative)\n                renderCa();\n            });\n        }\n\n        function initCa() {\n            if (!document.getElementById('caContent')) return;\n            wireCaView();\n            wireCaPeriod();\n            renderCa();\n        }\n        if (document.readyState === 'loading') {\n            document.addEventListener('DOMContentLoaded', () => { initBudget(); initCa(); });\n        } else {\n            initBudget();\n            initCa();\n        }\n    <\/script>\n\n    <!-- DATA ROOM MODAL -->\n    <div class=\"dr-overlay\" id=\"drOverlay\" onclick=\"closeDataRoom()\"></div>\n    <div class=\"dr-modal\" id=\"drModal\" role=\"dialog\" aria-labelledby=\"drModalTitle\" aria-hidden=\"true\">\n        <div class=\"dr-modal-header\">\n            <button class=\"dr-modal-close\" onclick=\"closeDataRoom()\" aria-label=\"Fermer\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"></path></svg>\n            </button>\n            <span class=\"dr-modal-eyebrow\">Data Room · 15 Carnot</span>\n            <h2 class=\"dr-modal-title\" id=\"drModalTitle\">Tous les documents du dossier</h2>\n            <div class=\"dr-modal-sub\" id=\"drModalSub\">Accès centralisé à l'ensemble de la documentation — téléchargez n'importe quel fichier.</div>\n        </div>\n        <div class=\"dr-modal-toolbar\">\n            <div class=\"dr-search\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"></circle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"></line></svg>\n                <input type=\"text\" id=\"drSearch\" placeholder=\"Rechercher un document…\" oninput=\"renderDataRoom()\">\n            </div>\n            <div class=\"dr-filters\" id=\"drFilters\"></div>\n        </div>\n        <div class=\"dr-modal-body\" id=\"drModalBody\"></div>\n    </div>\n\n    <!-- Equipment Detail Drawer -->\n    <div class=\"eq-drawer-overlay\" id=\"eqDrawerOverlay\" onclick=\"closeEquipmentDrawer()\"></div>\n    <aside class=\"eq-drawer\" id=\"eqDrawer\" role=\"dialog\" aria-labelledby=\"eqDrawerTitle\" aria-hidden=\"true\">\n        <div class=\"eq-drawer-header\">\n            <button class=\"eq-drawer-close\" onclick=\"closeEquipmentDrawer()\" aria-label=\"Fermer\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"></path></svg>\n            </button>\n            <div id=\"eqDrawerHeaderInner\"></div>\n        </div>\n        <div class=\"eq-drawer-body\" id=\"eqDrawerBody\"></div>\n        <div class=\"eq-drawer-actions\">\n            <button class=\"eq-action-btn\" onclick=\"printEquipmentFiche()\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 6 2 18 2 18 9\"></polyline><path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"></path><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"></rect></svg>\n                Imprimer la fiche\n            </button>\n            <button class=\"eq-action-btn primary\" onclick=\"downloadEquipmentDossier()\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"></path><polyline points=\"7 10 12 15 17 10\"></polyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"></line></svg>\n                Télécharger le dossier complet\n            </button>\n        </div>\n    </aside>\n\n\n</body></html>"</script>
