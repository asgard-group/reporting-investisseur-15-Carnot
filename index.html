ackground: var(--bg-secondary);\n            border: 1px solid var(--border);\n            border-radius: 10px;\n            padding: 4px;\n            gap: 2px;\n        }\n\n        .timeline-btn {\n            background: none;\n            border: none;\n            padding: 7px 14px;\n            font-size: 0.82em;\n            color: var(--text-tertiary);\n            cursor: pointer;\n            transition: all 0.2s ease;\n            border-radius: 7px;\n            font-weight: 500;\n            white-space: nowrap;\n            font-family: inherit;\n        }\n\n        .timeline-btn:hover {\n            color: var(--text-secondary);\n            background: rgba(129, 198, 193, 0.06);\n        }\n\n        .timeline-btn.active {\n            color: var(--joro-dark);\n            background: var(--joro-teal);\n            font-weight: 600;\n            box-shadow: 0 2px 8px rgba(129, 198, 193, 0.3);\n        }\n\n        @media (max-width: 900px) {\n            .timeline-selector {\n                flex-wrap: wrap;\n                width: 100%;\n                justify-content: center;\n            }\n            .top-bar {\n                flex-direction: column;\n                align-items: stretch;\n            }\n            .top-bar-actions {\n                flex-wrap: wrap;\n            }\n        }\n\n        @keyframes pulse {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.5; }\n        }\n\n        /* MOBILE */\n        @media (max-width: 900px) {\n            .app-layout {\n                grid-template-columns: 1fr;\n            }\n\n            .sidebar {\n                position: fixed;\n                left: -280px;\n                width: 260px;\n                z-index: 1000;\n                transition: left 0.3s ease;\n                box-shadow: var(--shadow-xl);\n            }\n\n            .sidebar.open {\n                left: 0;\n            }\n\n            .main-area {\n                padding: 24px 20px;\n            }\n\n            .mobile-menu-btn {\n                display: inline-flex !important;\n            }\n        }\n\n        .mobile-menu-btn {\n            display: none;\n            background: var(--bg-secondary);\n            border: 1px solid var(--border);\n            color: var(--text-primary);\n            padding: 10px;\n            border-radius: 10px;\n            cursor: pointer;\n            align-items: center;\n            justify-content: center;\n        }\n\n        .container {\n            max-width: 100%;\n            width: 100%;\n        }\n\n        /* CONTENT SECTIONS */\n        .content-section {\n            display: none;\n            animation: fadeIn 0.3s ease;\n        }\n\n        .content-section.active {\n            display: block;\n        }\n\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n                transform: translateY(10px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n\n        /* CARDS */\n        .card {\n            background: var(--bg-card);\n            border-radius: 16px;\n            padding: 32px;\n            box-shadow: var(--shadow);\n            margin-bottom: 28px;\n            border: 1px solid var(--border);\n            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);\n            position: relative;\n            overflow: hidden;\n        }\n\n        .card::before {\n            content: '';\n            position: absolute;\n            top: 0;\n            left: 0;\n            right: 0;\n            height: 1px;\n            background: linear-gradient(90deg, transparent, var(--joro-teal), transparent);\n            opacity: 0.6;\n        }\n\n        .card:hover {\n            border-color: var(--border-hover);\n            transform: translateY(-2px);\n            box-shadow: var(--shadow-lg);\n        }\n\n        .card h2 {\n            color: var(--text-primary);\n            font-size: 1.4em;\n            margin-bottom: 20px;\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            font-weight: 600;\n            letter-spacing: -0.3px;\n        }\n\n        .card h3 {\n            color: var(--text-primary);\n            font-size: 1.05em;\n            margin-top: 32px;\n            margin-bottom: 20px;\n            padding-bottom: 14px;\n            border-bottom: 1px solid var(--border);\n            font-weight: 600;\n            letter-spacing: -0.2px;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n\n        /* DASHBOARD BUILDING */\n        .dashboard-header {\n            display: grid;\n            grid-template-columns: 1.1fr 1fr 1fr;\n            gap: 20px;\n            margin-bottom: 36px;\n            align-items: stretch;\n        }\n\n        @media (max-width: 1200px) {\n            .dashboard-header {\n                grid-template-columns: 1fr 1fr;\n            }\n            .dashboard-header > :nth-child(3) {\n                grid-column: 1 / -1;\n            }\n        }\n\n        @media (max-width: 768px) {\n            .dashboard-header {\n                grid-template-columns: 1fr;\n            }\n            .dashboard-header > :nth-child(3) {\n                grid-column: auto;\n            }\n        }\n\n        .building-info {\n            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);\n            color: var(--text-primary);\n            border-radius: 16px;\n            padding: 32px;\n            border: 1px solid var(--border);\n            position: relative;\n            overflow: hidden;\n        }\n\n        .building-info::before {\n            content: '';\n            position: absolute;\n            top: 0;\n            right: 0;\n            width: 200px;\n            height: 200px;\n            background: radial-gradient(circle, rgba(129, 198, 193, 0.12) 0%, transparent 70%);\n            pointer-events: none;\n        }\n\n        .building-name {\n            font-size: 1.6em;\n            font-weight: 700;\n            margin-bottom: 8px;\n            letter-spacing: -0.5px;\n            color: var(--text-primary);\n        }\n\n        .building-name::after {\n            content: '';\n            display: block;\n            width: 40px;\n            height: 3px;\n            background: var(--joro-teal);\n            border-radius: 2px;\n            margin-top: 12px;\n            margin-bottom: 24px;\n        }\n\n        .building-detail {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 0;\n            padding: 14px 0;\n            border-bottom: 1px solid var(--border);\n        }\n\n        .building-detail:last-of-type {\n            border-bottom: none;\n        }\n\n        .building-detail-label {\n            font-size: 0.88em;\n            color: var(--text-tertiary);\n            font-weight: 500;\n            letter-spacing: 0.2px;\n        }\n\n        .building-detail-value {\n            font-size: 1em;\n            font-weight: 600;\n            color: var(--text-primary);\n        }\n\n        .building-marque {\n            margin-top: 24px;\n            padding: 20px;\n            background: rgba(129, 198, 193, 0.08);\n            border: 1px solid rgba(129, 198, 193, 0.2);\n            border-radius: 12px;\n            text-align: center;\n        }\n\n        .marque-label {\n            font-size: 0.78em;\n            color: var(--text-tertiary);\n            margin-bottom: 8px;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            font-weight: 500;\n        }\n\n        .marque-value {\n            font-size: 1.8em;\n            font-weight: 700;\n            color: var(--joro-teal);\n            letter-spacing: 2px;\n            text-shadow: 0 0 20px rgba(129, 198, 193, 0.4);\n        }\n\n        /* MAP CONTAINER — Fake map (stylized) */\n        .map-container {\n            border-radius: 16px;\n            overflow: hidden;\n            border: 1px solid var(--border);\n            height: 100%;\n            min-height: 400px;\n            position: relative;\n            background:\n                linear-gradient(135deg, #1e2828 0%, #252f2f 100%);\n        }\n\n        .fake-map {\n            position: absolute;\n            inset: 0;\n            background-image:\n                /* Rues horizontales */\n                linear-gradient(to bottom, transparent 0, transparent 18%, rgba(129, 198, 193, 0.08) 18%, rgba(129, 198, 193, 0.08) 19%, transparent 19%),\n                linear-gradient(to bottom, transparent 0, transparent 38%, rgba(129, 198, 193, 0.10) 38%, rgba(129, 198, 193, 0.10) 39.5%, transparent 39.5%),\n                linear-gradient(to bottom, transparent 0, transparent 62%, rgba(129, 198, 193, 0.08) 62%, rgba(129, 198, 193, 0.08) 63%, transparent 63%),\n                linear-gradient(to bottom, transparent 0, transparent 82%, rgba(129, 198, 193, 0.07) 82%, rgba(129, 198, 193, 0.07) 82.8%, transparent 82.8%),\n                /* Rues verticales */\n                linear-gradient(to right, transparent 0, transparent 22%, rgba(129, 198, 193, 0.08) 22%, rgba(129, 198, 193, 0.08) 23%, transparent 23%),\n                linear-gradient(to right, transparent 0, transparent 48%, rgba(129, 198, 193, 0.12) 48%, rgba(129, 198, 193, 0.12) 49.5%, transparent 49.5%),\n                linear-gradient(to right, transparent 0, transparent 72%, rgba(129, 198, 193, 0.08) 72%, rgba(129, 198, 193, 0.08) 73%, transparent 73%),\n                /* Diagonale Avenue Carnot */\n                linear-gradient(113deg, transparent 0, transparent 40%, rgba(129, 198, 193, 0.18) 40%, rgba(129, 198, 193, 0.18) 42%, transparent 42%);\n            background-size: 100% 100%;\n        }\n\n        /* Blocs (buildings) */\n        .fake-map::before {\n            content: '';\n            position: absolute;\n            inset: 0;\n            background:\n                radial-gradient(ellipse 40px 30px at 15% 10%, rgba(129, 198, 193, 0.06), transparent),\n                radial-gradient(ellipse 55px 40px at 75% 15%, rgba(129, 198, 193, 0.05), transparent),\n                radial-gradient(ellipse 35px 45px at 30% 55%, rgba(129, 198, 193, 0.07), transparent),\n                radial-gradient(ellipse 50px 30px at 85% 70%, rgba(129, 198, 193, 0.06), transparent),\n                radial-gradient(ellipse 40px 35px at 15% 90%, rgba(129, 198, 193, 0.05), transparent);\n        }\n\n        /* Place de l'Étoile (rond-point) */\n        .fake-map::after {\n            content: '';\n            position: absolute;\n            top: 28%;\n            left: 38%;\n            width: 60px;\n            height: 60px;\n            border: 1px solid rgba(129, 198, 193, 0.25);\n            border-radius: 50%;\n            background: radial-gradient(circle, rgba(129, 198, 193, 0.08) 0%, transparent 70%);\n        }\n\n        /* Pin JORO */\n        .map-pin {\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            transform: translate(-50%, -100%);\n            z-index: 5;\n        }\n\n        .map-pin-dot {\n            width: 44px;\n            height: 44px;\n            background: var(--joro-teal);\n            border-radius: 50%;\n            box-shadow:\n                0 0 0 6px rgba(129, 198, 193, 0.15),\n                0 0 0 12px rgba(129, 198, 193, 0.08),\n                0 8px 24px rgba(0, 0, 0, 0.5);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            color: var(--joro-dark);\n            font-weight: 700;\n            font-size: 0.85em;\n            animation: pinPulse 2s ease-in-out infinite;\n        }\n\n        .map-pin-tail {\n            position: absolute;\n            left: 50%;\n            top: 100%;\n            transform: translate(-50%, -4px) rotate(45deg);\n            width: 14px;\n            height: 14px;\n            background: var(--joro-teal);\n            border-bottom-right-radius: 3px;\n        }\n\n        @keyframes pinPulse {\n            0%, 100% {\n                box-shadow:\n                    0 0 0 6px rgba(129, 198, 193, 0.15),\n                    0 0 0 12px rgba(129, 198, 193, 0.08),\n                    0 8px 24px rgba(0, 0, 0, 0.5);\n            }\n            50% {\n                box-shadow:\n                    0 0 0 10px rgba(129, 198, 193, 0.25),\n                    0 0 0 20px rgba(129, 198, 193, 0.12),\n                    0 8px 24px rgba(0, 0, 0, 0.5);\n            }\n        }\n\n        /* Map labels */\n        .map-label {\n            position: absolute;\n            font-size: 0.65em;\n            font-weight: 500;\n            color: rgba(255, 255, 255, 0.45);\n            letter-spacing: 0.5px;\n            text-transform: uppercase;\n            pointer-events: none;\n        }\n\n        .map-label-street {\n            color: rgba(129, 198, 193, 0.55);\n            font-weight: 600;\n            font-size: 0.68em;\n        }\n\n        /* Map overlay top (address badge) */\n        .map-overlay-top {\n            position: absolute;\n            top: 14px;\n            left: 14px;\n            display: flex;\n            align-items: center;\n            gap: 8px;\n            padding: 8px 12px;\n            background: rgba(28, 38, 38, 0.85);\n            backdrop-filter: blur(12px);\n            -webkit-backdrop-filter: blur(12px);\n            border: 1px solid var(--border);\n            border-radius: 10px;\n            color: var(--text-primary);\n            font-size: 0.78em;\n            font-weight: 500;\n            z-index: 10;\n        }\n\n        .map-overlay-top svg {\n            color: var(--joro-teal);\n            flex-shrink: 0;\n        }\n\n        /* Building photo */\n        .building-photo {\n            border-radius: 16px;\n            overflow: hidden;\n            border: 1px solid var(--border);\n            height: 100%;\n            min-height: 400px;\n            position: relative;\n            background: var(--bg-secondary);\n        }\n\n        .building-photo img {\n            width: 100%;\n            height: 100%;\n            object-fit: cover;\n            display: block;\n            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);\n        }\n\n        .building-photo:hover img {\n            transform: scale(1.03);\n        }\n\n        .building-photo-overlay {\n            position: absolute;\n            bottom: 0;\n            left: 0;\n            right: 0;\n            padding: 20px;\n            background: linear-gradient(to top, rgba(28, 38, 38, 0.95) 0%, rgba(28, 38, 38, 0.5) 60%, transparent 100%);\n            display: flex;\n            align-items: flex-end;\n            justify-content: space-between;\n            gap: 12px;\n        }\n\n        .building-photo-caption {\n            color: var(--text-primary);\n            font-size: 0.82em;\n            font-weight: 500;\n            letter-spacing: 0.2px;\n        }\n\n        .building-photo-caption small {\n            display: block;\n            color: var(--text-tertiary);\n            font-size: 0.88em;\n            font-weight: 400;\n            margin-top: 2px;\n        }\n\n        .building-photo-badge {\n            padding: 5px 10px;\n            background: rgba(129, 198, 193, 0.2);\n            border: 1px solid rgba(129, 198, 193, 0.35);\n            border-radius: 6px;\n            color: var(--joro-teal);\n            font-size: 0.72em;\n            font-weight: 600;\n            letter-spacing: 0.5px;\n            text-transform: uppercase;\n            backdrop-filter: blur(8px);\n            -webkit-backdrop-filter: blur(8px);\n        }\n\n        /* KPI GRID */\n        .kpi-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));\n            gap: 16px;\n            margin-bottom: 36px;\n        }\n\n        .kpi-card {\n            background: var(--bg-card);\n            border-radius: 14px;\n            padding: 24px;\n            text-align: left;\n            border: 1px solid var(--border);\n            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);\n            position: relative;\n            overflow: hidden;\n        }\n\n        .kpi-card::before {\n            content: '';\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 3px;\n            height: 100%;\n            background: var(--joro-teal);\n            opacity: 0.5;\n        }\n\n        .kpi-card:hover {\n            transform: translateY(-3px);\n            border-color: var(--border-hover);\n            background: var(--bg-card-hover);\n            box-shadow: var(--shadow-lg);\n        }\n\n        .kpi-card:hover::before {\n            opacity: 1;\n            box-shadow: 0 0 12px var(--joro-teal);\n        }\n\n        .kpi-label {\n            font-size: 0.78em;\n            color: var(--text-tertiary);\n            margin-bottom: 12px;\n            font-weight: 500;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n\n        .kpi-value {\n            font-size: 2.4em;\n            font-weight: 700;\n            color: var(--text-primary);\n            margin-bottom: 6px;\n            letter-spacing: -1px;\n            line-height: 1;\n        }\n\n        .kpi-unit {\n            font-size: 0.82em;\n            color: var(--text-tertiary);\n            font-weight: 500;\n        }\n\n        .kpi-card.success::before {\n            background: var(--success);\n        }\n\n        .kpi-card.success:hover::before {\n            box-shadow: 0 0 12px var(--success);\n        }\n\n        .kpi-card.success .kpi-value {\n            color: var(--success);\n        }\n\n        /* INFOS GRID */\n        .infos-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n            gap: 20px;\n        }\n\n        .info-box {\n            background: var(--bg-secondary);\n            border-radius: 14px;\n            padding: 24px;\n            border: 1px solid var(--border);\n            transition: all 0.25s ease;\n        }\n\n        .info-box:hover {\n            border-color: var(--border-hover);\n            background: var(--bg-card-hover);\n        }\n\n        .info-title {\n            font-size: 0.95em;\n            font-weight: 600;\n            color: var(--joro-teal);\n            margin-bottom: 18px;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            padding-bottom: 14px;\n            border-bottom: 1px solid var(--border);\n            letter-spacing: 0.2px;\n        }\n\n        .info-content {\n            display: flex;\n            flex-direction: column;\n            gap: 12px;\n            font-size: 0.92em;\n        }\n\n        .info-item {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            padding: 4px 0;\n        }\n\n        .info-item-label {\n            color: var(--text-tertiary);\n            font-weight: 500;\n            font-size: 0.92em;\n        }\n\n        .info-item-value {\n            font-weight: 600;\n            color: var(--text-primary);\n        }\n\n        /* CONTRATS — Galerie de cartes */\n        .contracts-header {\n            display: flex;\n            align-items: center;\n            justify-content: space-between;\n            gap: 16px;\n            margin-top: 8px;\n            margin-bottom: 20px;\n            flex-wrap: wrap;\n        }\n\n        .contracts-stats {\n            display: flex;\n            gap: 20px;\n            font-size: 0.85em;\n            color: var(--text-tertiary);\n        }\n\n        .contracts-stat strong {\n            color: var(--joro-teal);\n            font-weight: 600;\n        }\n\n        .contracts-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));\n            gap: 16px;\n            margin-bottom: 20px;\n        }\n\n        .contract-card {\n            background: var(--bg-secondary);\n            border: 1px solid var(--border);\n            border-radius: 14px;\n            padding: 20px;\n            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);\n            cursor: pointer;\n            position: relative;\n            display: flex;\n            flex-direction: column;\n            gap: 14px;\n            min-height: 140px;\n        }\n\n        .contract-card:hover {\n            border-color: var(--border-hover);\n            background: var(--bg-card-hover);\n            transform: translateY(-2px);\n            box-shadow: var(--shadow-lg);\n        }\n\n        .contract-card:hover .contract-card-arrow {\n            opacity: 1;\n            transform: translateX(2px);\n        }\n\n        .contract-card.placeholder {\n            opacity: 0.55;\n            border-style: dashed;\n        }\n\n        .contract-card.placeholder:hover {\n            opacity: 0.8;\n        }\n\n        .contract-card-top {\n            display: flex;\n            align-items: flex-start;\n            justify-content: space-between;\n            gap: 12px;\n        }\n\n        .contract-card-title {\n            font-size: 1em;\n            font-weight: 600;\n            color: var(--text-primary);\n            line-height: 1.3;\n            letter-spacing: -0.2px;\n        }\n\n        .contract-card-provider {\n            font-size: 0.85em;\n            color: var(--text-tertiary);\n            margin-top: 4px;\n            font-weight: 500;\n        }\n\n        .contract-card-category {\n            display: inline-flex;\n            align-items: center;\n box-shadow: none;\n            border: 1px dashed rgba(239, 68, 68, 0.35);\n        }\n        .tenant-info {\n            display: flex;\n            flex-direction: column;\n            gap: 2px;\n            min-width: 0;\n        }\n        .tenant-name {\n            color: var(--text-primary);\n            font-weight: 600;\n            font-size: 0.95em;\n            letter-spacing: -0.2px;\n        }\n        .tenant-type {\n            color: var(--text-muted);\n            font-size: 0.78em;\n        }\n        .building-cell {\n            color: var(--text-tertiary);\n            font-size: 0.88em;\n            font-weight: 500;\n        }\n        .building-cell strong {\n            color: var(--text-primary);\n            font-weight: 600;\n        }\n\n        /* Status badges — dark */\n        .status-badge {\n            display: inline-flex;\n            align-items: center;\n            gap: 6px;\n            padding: 4px 10px;\n            border-radius: 20px;\n            font-size: 0.76em;\n            font-weight: 600;\n            border: 1px solid;\n            white-space: nowrap;\n        }\n        .status-badge::before {\n            content: '';\n            width: 6px;\n            height: 6px;\n            border-radius: 50%;\n            background: currentColor;\n            box-shadow: 0 0 6px currentColor;\n        }\n        .status-badge.loue {\n            color: var(--success);\n            background: rgba(74, 222, 128, 0.08);\n            border-color: rgba(74, 222, 128, 0.3);\n        }\n        .status-badge.vacant {\n            color: var(--danger);\n            background: rgba(239, 68, 68, 0.08);\n            border-color: rgba(239, 68, 68, 0.3);\n        }\n        .status-badge.renego {\n            color: var(--warning);\n            background: rgba(251, 191, 36, 0.08);\n            border-color: rgba(251, 191, 36, 0.3);\n        }\n\n        /* Table footer (total row) */\n        .locatif-table tfoot td {\n color: var(--text-primary);\n            pointer-events: none;\n            opacity: 0;\n            transition: opacity 0.15s ease;\n            min-width: 200px;\n            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);\n            z-index: 10;\n            transform: translate(-50%, calc(-100% - 12px));\n        }\n        .cf-tooltip.visible { opacity: 1; }\n        .cf-tip-title {\n            font-size: 0.85em;\n            color: var(--text-tertiary);\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            font-weight: 600;\n            margin-bottom: 10px;\n            padding-bottom: 8px;\n            border-bottom: 1px solid var(--border);\n        }\n        .cf-tip-row {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            gap: 18px;\n            padding: 3px 0;\n            font-variant-numeric: tabular-nums;\n        }\n        .cf-tip-label {\n            display: inline-flex;\n            align-items: center;\n            gap: 7px;\n            color: var(--text-tertiary);\n            font-weight: 500;\n        }\n        .cf-tip-label::before {\n            content: '';\n            width: 8px;\n            height: 8px;\n            border-radius: 50%;\n            background: currentColor;\n        }\n        .cf-tip-label.in { color: #81C6C1; }\n        .cf-tip-label.out { color: #F87171; }\n        .cf-tip-label.net { color: #FBBF24; }\n        .cf-tip-label.cum { color: #A78BFA; }\n        .cf-tip-value {\n            color: var(--text-primary);\n            font-weight: 600;\n        }\n        .cf-tip-value.positive { color: var(--success); }\n        .cf-tip-value.negative { color: var(--danger); }\n\n        .cashflow-footnote {\n            margin-top: 14px;\n            padding-top: 14px;\n            border-top: 1px solid var(--border);\n            font-size: 0.75em;\n            color: var(--text-muted);\n            text-align: right;\n            letter-spacing: 0.3px;\n        }\n\n        /* ===== BUDGET ANALYSIS (FINANCIER) ===== */\n        .budget-wrapper {\n            background: var(--bg-secondary);\n            border: 1px solid var(--border);\n            border-radius: 16px;\n            padding: 0;\n            margin-top: 32px;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n            min-height: 600px;\n        }\n\n        /* ===== BUDGET HERO (top strip replacing sidebar) ===== */\n        .budget-hero {\n            display: grid;\n            grid-template-columns: 1fr auto;\n            gap: 32px;\n            align-items: stretch;\n            padding: 22px 26px;\n            background: linear-gradient(180deg, rgba(26, 169, 160, 0.035) 0%, transparent 100%);\n            border-bottom: 1px solid var(--border);\n        }\n        @media (max-width: 1100px) {\n            .budget-hero { grid-template-columns: 1fr; gap: 20px; }\n        }\n\n        /* YEAR FILTER — shown only in Budget seul mode */\n        .budget-year-filter {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            padding: 10px 14px;\n            background: var(--bg-tertiary);\n            border-top: 1px solid var(--border);\n        }\n        .budget-year-filter-label {\n            font-size: 0.78em;\n            font-weight: 600;\n            color: var(--text-muted);\n            text-transform: uppercase;\n            letter-spacing: 0.5px;\n        }\n        /* Year filter is shown in both Budget seul and BvR modes */\n\n        /* YEAR SELECTOR — 3 tabs */\n        .budget-year-selector {\n            display: inline-flex;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 14px;\n            padding: 5px;\n            gap: 4px;\n        }\n        .budget-year-tab {\n            background: transparent;\n            border: 1px solid transparent;\n            color: var(--text-secondary);\n            padding: 10px 24px;\n            font-size: 0.86em;\n            font-weight: 600;\n            font-family: inherit;\n            cursor: pointer;\n            border-radius: 10px;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            gap: 2px;\n            transition: all 0.15s ease;\n            white-space: nowrap;\n        }\n        .budget-year-tab:hover {\n            background: rgba(255,255,255,0.05);\n            color: var(--text-primary);\n        }\n        .budget-year-tab.active {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n            border-color: var(--joro-teal);\n            font-weight: 700;\n            box-shadow: 0 2px 10px -3px rgba(26,169,160,0.5);\n        }\n        .year-tab-label { font-size: 1em; }\n        .year-tab-sub { font-size: 0.75em; font-weight: 400; opacity: 0.72; }\n        .budget-year-tab.active .year-tab-sub { opacity: 0.85; }\n\n        /* MODE SWITCH — two big side-by-side cards (kept for CSS compat) */\n        .budget-mode-switch {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 10px;\n            padding: 4px;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 14px;\n            position: relative;\n        }\n        .budget-mode-card {\n            background: transparent;\n            border: 1px solid transparent;\n            border-radius: 10px;\n            padding: 14px 18px;\n            text-align: left;\n            cursor: pointer;\n            display: flex;\n            align-items: center;\n            gap: 14px;\n            color: var(--text-secondary);\n            transition: all 0.18s ease;\n            font-family: inherit;\n            min-width: 230px;\n        }\n        .budget-mode-card:hover {\n            background: rgba(255,255,255,0.03);\n            color: var(--text-primary);\n        }\n        .budget-mode-card.active {\n            background: var(--joro-dark);\n            border-color: var(--joro-teal);\n            color: var(--text-primary);\n            box-shadow: 0 0 0 1px rgba(26, 169, 160, 0.25), 0 6px 18px -8px rgba(26, 169, 160, 0.4);\n        }\n        .budget-mode-card .mode-icon-wrap {\n            width: 38px;\n            height: 38px;\n            border-radius: 9px;\n            background: rgba(255,255,255,0.04);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            flex-shrink: 0;\n            color: var(--text-tertiary);\n            transition: all 0.18s ease;\n        }\n        .budget-mode-card.active .mode-icon-wrap {\n            background: rgba(26, 169, 160, 0.15);\n            color: var(--joro-teal);\n        }\n        .budget-mode-card .mode-icon-wrap svg { width: 20px; height: 20px; }\n        .budget-mode-card .mode-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }\n        .budget-mode-card .mode-title {\n            font-weight: 700;\n            font-size: 0.92em;\n            letter-spacing: -0.2px;\n            color: inherit;\n        }\n        .budget-mode-card .mode-sub {\n            font-size: 0.72em;\n            color: var(--text-muted);\n            font-weight: 500;\n            line-height: 1.35;\n        }\n        .budget-mode-card.active .mode-sub { color: var(--text-tertiary); }\n\n        /* PERIOD FILTER — inline compact segmented */\n        .budget-period-filter {\n            display: flex;\n            flex-direction: column;\n            gap: 8px;\n            align-items: flex-end;\n            justify-content: center;\n        }\n        .budget-period-filter-label {\n            font-size: 0.62em;\n            font-weight: 700;\n            color: var(--text-muted);\n            text-transform: uppercase;\n            letter-spacing: 1.4px;\n            display: flex;\n            align-items: center;\n            gap: 6px;\n        }\n        .budget-period-filter-label svg { width: 11px; height: 11px; }\n        .budget-period-tabs {\n            display: inline-flex;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 10px;\n            padding: 3px;\n            gap: 2px;\n        }\n        .budget-period-tab {\n            background: transparent;\n            border: none;\n            color: var(--text-tertiary);\n            padding: 7px 13px;\n            font-size: 0.78em;\n            font-weight: 600;\n            font-family: inherit;\n            cursor: pointer;\n            border-radius: 7px;\n            letter-spacing: 0.2px;\n            transition: all 0.15s ease;\n            white-space: nowrap;\n        }\n        .budget-period-tab:hover {\n            background: rgba(255,255,255,0.04);\n            color: var(--text-primary);\n        }\n        .budget-period-tab.active {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n            font-weight: 700;\n            box-shadow: 0 2px 8px -2px rgba(26, 169, 160, 0.35);\n        }\n        .budget-period-tabs-separator {\n            width: 1px;\n            background: var(--border);\n            margin: 4px 2px;\n        }\n\n        /* LEFT SIDEBAR */\n        .budget-sidebar {\n            background: var(--bg-tertiary);\n            border-right: 1px solid var(--border);\n            padding: 20px 16px;\n            display: flex;\n            flex-direction: column;\n            gap: 22px;\n        }\n        @media (max-width: 1100px) {\n            .budget-sidebar { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; gap: 14px; }\n            .budget-sidebar > * { flex: 1; min-width: 220px; }\n        }\n        .budget-sb-section-title {\n            font-size: 0.68em;\n            font-weight: 700;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            color: var(--text-tertiary);\n            margin-bottom: 10px;\n            padding: 0 6px;\n        }\n        .budget-sb-group {\n            display: flex;\n            flex-direction: column;\n            gap: 3px;\n        }\n        .budget-sb-btn {\n            background: transparent;\n            border: 1px solid transparent;\n            color: var(--text-secondary);\n            font-family: inherit;\n            font-size: 0.88em;\n            font-weight: 500;\n            text-align: left;\n            padding: 9px 12px;\n            border-radius: 8px;\n            cursor: pointer;\n            transition: all 0.18s ease;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            width: 100%;\n        }\n        .budget-sb-btn:hover {\n            background: rgba(255,255,255,0.04);\n            color: var(--text-primary);\n        }\n        .budget-sb-btn.active {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n            font-weight: 700;\n        }\n        .budget-sb-btn .sb-icon {\n            width: 16px;\n            height: 16px;\n            flex-shrink: 0;\n        }\n        .budget-sb-btn .sb-chevron {\n            margin-left: auto;\n            width: 12px;\n            height: 12px;\n            opacity: 0.5;\n        }\n        .budget-sb-btn.active .sb-chevron { opacity: 0.9; }\n        .budget-sb-btn.period-year { font-weight: 600; }\n        .budget-sb-btn.period-year.active { font-weight: 800; }\n        .budget-sb-hint {\n            font-size: 0.72em;\n            color: var(--text-muted);\n            padding: 4px 8px;\n            line-height: 1.4;\n        }\n        .budget-sb-divider {\n            height: 1px;\n            background: var(--border);\n            margin: 0 -16px;\n        }\n\n        /* RIGHT CONTENT */\n        .budget-content {\n            display: flex;\n            flex-direction: column;\n            min-width: 0;\n        }\n\n        .budget-toolbar {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            gap: 16px;\n            padding: 18px 22px;\n            border-bottom: 1px solid var(--border);\n            flex-wrap: wrap;\n        }\n        .budget-toolbar-title {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n        .budget-toolbar-title h4 {\n            margin: 0;\n            font-size: 1em;\n            font-weight: 700;\n            color: var(--text-primary);\n            letter-spacing: -0.3px;\n        }\n        .budget-toolbar-title .badge-period {\n            display: inline-flex;\n            align-items: center;\n            gap: 6px;\n            padding: 3px 10px;\n            border-radius: 20px;\n            font-size: 0.72em;\n            font-weight: 600;\n            color: var(--joro-teal);\n            background: rgba(129, 198, 193, 0.08);\n            border: 1px solid rgba(129, 198, 193, 0.3);\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n        .budget-toolbar-title .badge-period.mode {\n            color: var(--text-primary);\n            background: var(--bg-tertiary);\n            border-color: var(--border);\n        }\n\n        /* Budget-only view hides all B vs R-specific elements */\n        .budget-wrapper.view-budget .col-bvr { display: none !important; }\n        .budget-wrapper.view-budget #bvrDashboard,\n        .budget-wrapper.view-budget #bvrWarningBannerWrap,\n        .budget-wrapper.view-budget #budgetVizBars,\n        .budget-wrapper.view-budget #budgetChartToggle { display: none !important; }\n        /* B vs R view : hide the entire repartition visualization */\n        .budget-wrapper:not(.view-budget) #budgetVizDonut,\n        .budget-wrapper:not(.view-budget) #budgetChartToggle { display: none !important; }\n        /* Comparatif tab is only relevant in Budget seul */\n        .budget-wrapper:not(.view-budget) #budgetYearSelect [data-year=\"compare\"] { display: none !important; }\n\n        /* ── Page-wide lock button (top-bar) ── */\n        .page-lock-btn .lock-icon-unlocked { display: none; }\n        .page-lock-btn .lock-icon-locked { display: block; color: var(--text-tertiary); }\n        body.page-unlocked .page-lock-btn .lock-icon-locked { display: none; }\n        body.page-unlocked .page-lock-btn .lock-icon-unlocked { display: block; color: var(--joro-teal); }\n        body.page-unlocked .page-lock-btn {\n            border-color: var(--joro-teal) !important;\n            background: rgba(129,198,193,0.10) !important;\n        }\n\n        /* Global edit affordances when page is unlocked.\n           Targets common text-bearing elements inside .content-section areas (works for all tabs). */\n        body.page-unlocked [contenteditable=\"true\"] {\n            cursor: text;\n            border-radius: 4px;\n            padding: 1px 4px;\n            border: 1px dashed rgba(129,198,193,0.45);\n            background: rgba(129,198,193,0.06);\n            box-shadow: 0 0 0 1px rgba(129,198,193,0.10);\n            transition: background .12s, border-color .12s, box-shadow .12s;\n        }\n        body.page-unlocked [contenteditable=\"true\"]:hover {\n            background: rgba(129,198,193,0.14);\n            border-color: var(--joro-teal);\n            box-shadow: 0 0 0 1px rgba(129,198,193,0.25);\n        }\n        body.page-unlocked [contenteditable=\"true\"]:focus {\n            outline: none;\n            background: rgba(129,198,193,0.20);\n            border-color: var(--joro-teal);\n            border-style: solid;\n            box-shadow: 0 0 0 2px rgba(129,198,193,0.4);\n        }\n        /* Subtle pulse on first unlock to show what's editable */\n        @keyframes editPulse {\n            0%   { box-shadow: 0 0 0 0   rgba(129,198,193,0.6); }\n            70%  { box-shadow: 0 0 0 6px rgba(129,198,193,0); }\n            100% { box-shadow: 0 0 0 0   rgba(129,198,193,0); }\n        }\n        body.page-unlocked.lock-just-toggled [contenteditable=\"true\"] {\n            animation: editPulse 1.4s ease-out 1;\n        }\n        /* Elements explicitly marked as non-editable */\n        body.page-unlocked .no-edit { cursor: default !important; }\n        body.page-unlocked .no-edit:hover {\n            background: transparent !important;\n            border-color: transparent !important;\n            box-shadow: none !important;\n        }\n\n        /* Hide budget toolbar lock button (replaced by global) */\n        .budget-lock-btn { display: none !important; }\n\n        /* ── Budget lock button (legacy - kept for CSS compat) ── */\n        .budget-lock-btn {\n            display: inline-flex;\n            align-items: center;\n            gap: 7px;\n            padding: 6px 12px 6px 10px;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 18px;\n            color: var(--text-tertiary);\n            font-size: 0.72em;\n            font-weight: 600;\n            cursor: pointer;\n            font-family: inherit;\n            text-transform: uppercase;\n            letter-spacing: 0.6px;\n            transition: all .15s;\n        }\n        .budget-lock-btn:hover {\n            border-color: var(--joro-teal);\n            color: var(--joro-teal);\n        }\n        .budget-lock-btn .lock-icon-unlocked { display: none; }\n        .budget-lock-btn .lock-icon-locked { display: block; }\n        .budget-wrapper.unlocked .budget-lock-btn {\n            background: rgba(129,198,193,0.12);\n            border-color: var(--joro-teal);\n            color: var(--joro-teal);\n        }\n        .budget-wrapper.unlocked .budget-lock-btn .lock-icon-locked { display: none; }\n        .budget-wrapper.unlocked .budget-lock-btn .lock-icon-unlocked { display: block; }\n\n        /* When LOCKED, hide all editing affordances */\n        body:not(.page-unlocked) .editable-cell {\n            cursor: default;\n            border-color: transparent !important;\n            background: transparent !important;\n        }\n        body:not(.page-unlocked) .editable-cell:hover {\n            background: transparent !important;\n            border-color: transparent !important;\n        }\n        body:not(.page-unlocked) .editable-cell::after { display: none !important; }\n        body:not(.page-unlocked) .budget-pill-add,\n        body:not(.page-unlocked) .pill-remove { display: none !important; }\n        body:not(.page-unlocked) .recup-pill { cursor: default !important; }\n        body:not(.page-unlocked) .recup-pill:hover {\n            transform: none !important;\n            box-shadow: none !important;\n            filter: none !important;\n        }\n\n        /* ── Editable cells ── */\n        .editable-cell {\n            cursor: text;\n            display: inline-block;\n            min-width: 28px;\n            padding: 2px 6px;\n            border-radius: 4px;\n            border: 1px dashed transparent;\n            transition: background .12s, border-color .12s;\n        }\n        .editable-cell:hover {\n            background: rgba(26, 169, 160, 0.06);\n            border-color: rgba(26, 169, 160, 0.3);\n        }\n        .editable-cell:focus {\n            outline: none;\n            background: rgba(26, 169, 160, 0.10);\n            border-color: var(--joro-teal);\n            border-style: solid;\n        }\n        .editable-cell::after {\n            content: ' ✎';\n            opacity: 0;\n            font-size: 0.75em;\n            color: var(--joro-teal);\n            transition: opacity .15s;\n        }\n        .editable-cell:hover::after { opacity: 0.6; }\n        .editable-cell:focus::after { display: none; }\n\n        /* Prestataire add button   .driver-sort-icon {\n            width: 11px; height: 11px;\n            opacity: 0.55;\n            transition: opacity .15s, color .15s;\n        }\n        .driver-sort-btn:hover .driver-sort-icon { opacity: 1; }\n        .driver-sort-btn.active .driver-sort-icon { opacity: 1; color: var(--joro-teal); }\n        /* B vs R view hides descriptive/contextual columns to keep comparison focused */\n        .budget-wrapper:not(.view-budget) .col-bonly { display: none !important; }\n\n        /* ===== CA ANALYSIS — reuses budget-hero look ===== */\n        .ca-wrapper {\n            background: var(--bg-secondary);\n            border: 1px solid var(--border);\n            border-radius: 16px;\n            margin-top: 32px;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n            min-height: 500px;\n        }\n        .ca-hero {\n            display: grid;\n            grid-template-columns: 1fr auto;\n            gap: 32px;\n            align-items: stretch;\n            padding: 22px 26px;\n            background: linear-gradient(180deg, rgba(26, 169, 160, 0.035) 0%, transparent 100%);\n            border-bottom: 1px solid var(--border);\n        }\n        @media (max-width: 1200px) {\n            .ca-hero { grid-template-columns: 1fr; gap: 20px; }\n        }\n        .ca-mode-switch {\n            display: grid;\n            grid-template-columns: repeat(3, 1fr);\n            gap: 10px;\n            padding: 4px;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 14px;\n        }\n        @media (max-width: 900px) {\n            .ca-mode-switch { grid-template-columns: 1fr; }\n        }\n        .ca-mode-card {\n            background: transparent;\n            border: 1px solid transparent;\n            border-radius: 10px;\n            padding: 14px 16px;\n            text-align: left;\n            cursor: pointer;\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            color: var(--text-secondary);\n            transition: all 0.18s ease;\n            font-family: inherit;\n        }\n        .ca-mode-card:hover {\n            background: rgba(255,255,255,0.03);\n            color: var(--text-primary);\n        }\n        .ca-mode-card.active {\n            background: var(--joro-dark);\n            border-color: var(--joro-teal);\n            color: var(--text-primary);\n            box-shadow: 0 0 0 1px rgba(26, 169, 160, 0.25), 0 6px 18px -8px rgba(26, 169, 160, 0.4);\n        }\n        .ca-mode-card .mode-icon-wrap {\n            width: 36px;\n            height: 36px;\n            border-radius: 9px;\n            background: rgba(255,255,255,0.04);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            flex-shrink: 0;\n            color: var(--text-tertiary);\n            transition: all 0.18s ease;\n        }\n        .ca-mode-card.active .mode-icon-wrap {\n            background: rgba(26, 169, 160, 0.15);\n            color: var(--joro-teal);\n        }\n        .ca-mode-card .mode-icon-wrap svg { width: 18px; height: 18px; }\n        .ca-mode-card .mode-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }\n        .ca-mode-card .mode-title {\n            font-weight: 700;\n            font-size: 0.88em;\n            letter-spacing: -0.2px;\n        }\n        .ca-mode-card .mode-sub {\n            font-size: 0.7em;\n            color: var(--text-muted);\n            font-weight: 500;\n            line-height: 1.35;\n        }\n        .ca-mode-card.active .mode-sub { color: var(--text-tertiary); }\n\n        /* KPIs */\n        .ca-kpis {\n            display: grid;\n            grid-template-columns: repeat(4, 1fr);\n            gap: 14px;\n            padding: 22px 26px 0;\n        }\n        @media (max-width: 1100px) { .ca-kpis { grid-template-columns: repeat(2, 1fr); } }\n        .ca-kpi {\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 12px;\n            padding: 14px 16px;\n            display: flex;\n            flex-direction: column;\n            gap: 4px;\n        }\n        .ca-kpi-label {\n            font-size: 0.68em;\n            font-weight: 700;\n            color: var(--text-muted);\n            text-transform: uppercase;\n            letter-spacing: 1.2px;\n        }\n        .ca-kpi-value {\n            font-size: 1.35em;\n            font-weight: 700;\n            color: var(--text-primary);\n            font-variant-numeric: tabular-nums;\n            letter-spacing: -0.4px;\n        }\n        .ca-kpi-sub {\n            font-size: 0.75em;\n            color: var(--text-tertiary);\n            font-weight: 500;\n        }\n        .ca-kpi-sub.pos { color: #34D399; }\n        .ca-kpi-sub.neg { color: var(--danger); }\n\n        .ca-content { padding: 22px 26px; flex: 1; }\n\n        /* ===== STRUCTURE view : donut (clients) + donut (nature) + top clients list ===== */\n        .ca-structure {\n            display: grid;\n            grid-template-columns: 1.1fr 1fr;\n            gap: 28px;\n        }\n        @media (max-width: 1100px) { .ca-structure { grid-template-columns: 1fr; } }\n        .ca-chart-card {\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 12px;\n            padding: 20px;\n            display: flex;\n            flex-direction: column;\n            gap: 14px;\n        }\n        .ca-chart-card-title {\n            font-size: 0.78em;\n            font-weight: 700;\n            text-transform: uppercase;\n            letter-spacing: 1.4px;\n            color: var(--text-muted);\n        }\n        .ca-donut-wrap {\n            display: grid;\n            grid-template-columns: 200px 1fr;\n            gap: 24px;\n            align-items: center;\n        }\n font-weight: 600;\n            text-transform: uppercase;\n            letter-spacing: 0.8px;\n        }\n        .ca-month-total {\n            text-align: center;\n            font-size: 0.72em;\n            color: var(--text-secondary);\n            font-variant-numeric: tabular-nums;\n            font-weight: 600;\n        }\n\n        /* ===== BUDGET VS RÉALISÉ CA — table style ===== */\n        .ca-bvr-table-wrap { overflow-x: auto; }\n        .ca-bvr-table {\n            width: 100%;\n            border-collapse: collapse;\n            font-size: 0.88em;\n        }\n        .ca-bvr-table thead th {\n            text-align: left;\n            padding: 10px 12px;\n            font-size: 0.7em;\n            font-weight: 700;\n            text-transform: uppercase;\n            letter-spacing: 1.2px;\n            color: var(--text-muted);\n            border-bottom: 1px solid var(--border);\n            background: rgba(255,255,255,0.02);\n        }\n        .ca-bvr-table thead th.num { text-align: right; }\n        .ca-bvr-table tbody td {\n            padding: 12px;\n            border-bottom: 1px solid rgba(255,255,255,0.04);\n            color: var(--text-secondary);\n        }\n        .ca-bvr-table tbody td.num {\n            text-align: right;\n            font-variant-numeric: tabular-nums;\n            color: var(--text-primary);\n            font-weight: 600;\n        }\n        .ca-bvr-table tbody tr:hover td { background: rgba(255,255,255,0.02); }\n        .ca-bvr-table .client-cell {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n        .ca-bvr-table .client-avatar {\n            width: 28px;\n            height: 28px;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            color: #fff;\n            font-size: 0.72em;\n            font-weight: 700;\n            flex-shrink: 0;\n        }\n        .ca-bvr-table .client-name { font-weight: 600; color: var(--text-primary); }\n        .ca-bvr-table .client-type {\n            font-size: 0.75em;\n            color: var(--text-muted);\n            font-weight: 500;\n        }\n        .ca-bvr-progress {\n            display: flex;\n            align-items: center;\n            gap: 8px;\n        }\n        .ca-bvr-progress-track {\n            flex: 1;\n            height: 6px;\n            background: rgba(255,255,255,0.06);\n            border-radius: 3px;\n            overflow: hidden;\n            min-width: 70px;\n        }\n        .ca-bvr-progress-fill {\n            height: 100%;\n            background: var(--joro-teal);\n            transition: width 0.4s ease;\n        }\n        .ca-bvr-progress-fill.under { background: #F59E0B; }\n        .ca-bvr-progress-fill.late { background: var(--danger); }\n        .ca-bvr-progress-pct {\n            font-variant-numeric: tabular-nums;\n            font-weight: 600;\n            font-size: 0.85em;\n            min-width: 42px;\n            text-align: right;\n            color: var(--text-secondary);\n        }\n        .ca-status-pill {\n            display: inline-flex;\n            align-items: center;\n            gap: 5px;\n            padding: 3px 9px;\n            border-radius: 6px;\n            font-size: 0.72em;\n            font-weight: 700;\n            letter-spacing: 0.3px;\n            text-transform: uppercase;\n        }\n        .ca-status-pill.ok { background: rgba(52, 211, 153, 0.12); color: #34D399; }\n        .ca-status-pill.warn { background: rgba(245, 158, 11, 0.12); color: #F59E0B; }\n        .ca-status-pill.late { background: rgba(239, 68, 68, 0.12); color: var(--danger); }\n\n        .ca-bvr-table tfoot td {\n            padding: 14px 12px;\n            border-top: 2px solid var(--border);\n            background: rgba(26, 169, 160, 0.04);\n            font-weight: 700;\n            color: var(--text-primary);\n        }\n        .ca-bvr-table tfoot td.num {\n            font-size: 1em;\n            color: var(--text-primary);\n        }\n        .budget-period-select {\n            display: inline-flex;\n            align-items: center;\n            gap: 4px;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 10px;\n            padding: 3px;\n        }\n        .budget-period-btn {\n            background: transparent;\n            border: none;\n            color: var(--text-tertiary);\n            font-family: inherit;\n            font-size: 0.82em;\n            font-weight: 600;\n            padding: 7px 14px;\n            border-radius: 7px;\n            cursor: pointer;\n            transition: all 0.2s ease;\n            letter-spacing: -0.1px;\n        }\n        .budget-period-btn:hover {\n            color: var(--text-primary);\n            background: rgba(255, 255, 255, 0.03);\n        }\n        .budget-period-btn.active {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n        }\n        .budget-period-btn.year { font-weight: 700; }\n\n        /* B vs R dashboard */\n        .bvr-dashboard {\n            display: grid;\n            grid-template-columns: repeat(4, 1fr);\n            gap: 12px;\n            padding: 18px 22px;\n            border-bottom: 1px solid var(--border);\n            background: rgba(255,255,255,0.015);\n        }\n        @media (max-width: 900px) { .bvr-dashboard { grid-template-columns: repeat(2, 1fr); } }\n        .bvr-kpi {\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 12px;\n            padding: 14px 16px;\n            display: flex;\n            flex-direction: column;\n            gap: 4px;\n            position: relative;\n            overflow: hidden;\n        }\n        .bvr-kpi-accent {\n            position: absolute;\n            left: 0; top: 0; bottom: 0;\n            width: 3px;\n            background: var(--joro-teal);\n        }\n        .bvr-kpi.warn .bvr-kpi-accent { background: #F59E0B; }\n        .bvr-kpi.danger .bvr-kpi-accent { background: var(--danger); }\n        .bvr-kpi.ok .bvr-kpi-accent { background: #34D399; }\n        .bvr-kpi-label {\n            font-size: 0.7em;\n            color: var(--text-tertiary);\n            text-transform: uppercase;\n            letter-spacing: 1.2px;\n            font-weight: 600;\n        }\n        .bvr-kpi-value {\n            font-size: 1.4em;\n            font-weight: 700;\n            color: var(--text-primary);\n            font-variant-numeric: tabular-nums;\n            letter-spacing: -0.5px;\n            line-height: 1.1;\n        }\n        .bvr-kpi.danger .bvr-kpi-value { color: var(--danger); }\n        .bvr-kpi.warn .bvr-kpi-value { color: #F59E0B; }\n        .bvr-kpi.ok .bvr-kpi-value { color: #34D399; }\n        .bvr-kpi-sub {\n            font-size: 0.78em;\n            color: var(--text-muted);\n        }\n        .bvr-kpi-sub strong { color: var(--text-secondary); font-weight: 600; }\n\n        /* Chart toggle */\n        .budget-chart-toggle {\n            display: inline-flex;\n            background: var(--bg-tertiary);\n            border: 1px solid var(--border);\n            border-radius: 8px;\n            padding: 2px;\n            gap: 0;\n        }\n        .budget-chart-toggle button {\n            background: transparent;\n            border: none;\n            color: var(--text-tertiary);\n            font-family: inherit;\n            font-size: 0.78em;\n            font-weight: 600;\n            padding: 5px 11px;\n            border-radius: 6px;\n            cursor: pointer;\n            transition: all 0.2s ease;\n        }\n        .budget-chart-toggle button.active {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n        }\n        .budget-chart-toggle button:not(.active):hover { color: var(--text-primary); }\n\n        /* Divergent bars (écart by poste) */\n        .bvr-bars {\n            padding: 20px 26px;\n            display: flex;\n            flex-direction: column;\n            gap: 8px;\n            width: 100%;\n        }\n        .bvr-bar-row {\n            display: grid;\n            grid-template-columns: 170px 1fr 90px;\n            align-items: center;\n            gap: 12px;\n            font-size: 0.85em;\n        }\n        .bvr-bar-label {\n            color: var(--text-secondary);\n            font-weight: 500;\n            overflow: hidden;\n            text-overflow: ellipsis;\n            white-space: nowrap;\n        }\n        .bvr-bar-track {\n            position: relative;\n            height: 22px;\n            background: var(--bg-tertiary);\n            border-radius: 4px;\n            overflow: hidden;\n        }\n        .bvr-bar-axis {\n            position: absolute;\n            left: 50%;\n            top: 0; bottom: 0;\n            width: 1px;\n            background: var(--border-hover);\n            z-index: 2;\n        }\n        .bvr-bar-fill {\n            position: absolute;\n            top: 2px; bottom: 2px;\n            border-radius: 3px;\n            transition: all 0.4s ease;\n        }\n        /* pos = dépassement (budget dépassé, mauvais → rouge) */\n        .bvr-bar-fill.pos { background: var(--danger); left: 50%; }\n        /* neg = économie (sous le budget, bon → vert) */\n        .bvr-bar-fill.neg { background: #34D399; right: 50%; }\n        .bvr-bar-value {\n            font-variant-numeric: tabular-nums;\n            font-weight: 700;\n            font-size: 0.88em;\n            text-align: right;\n        }\n        .bvr-bar-value.pos { color: var(--danger); }\n        .bvr-bar-value.neg { color: #34D399; }\n        .bvr-bars-note {\n            margin-top: 8px;\n            font-size: 0.72em;\n            color: var(--text-muted);\n            text-align: center;\n            letter-spacing: 0.5px;\n        }\n\n        /* Progress bar in table */\n        .bvr-progress {\n            display: flex;\n            align-items: center;\n            gap: 8px;\n            min-width: 150px;\n        }\n        .bvr-progress-track {\n            flex: 1;\n            height: 7px;\n            background: var(--bg-tertiary);\n            border-radius: 4px;\n            overflow: hidden;\n            position: relative;\n        }\n        .bvr-progress-fill {\n            height: 100%;\n            border-radius: 4px;\n            transition: width 0.4s ease;\n        }\n        .bvr-progress-fill.ok { background: #34D399; }\n        .bvr-progress-fill.warn { background: #F59E0B; }\n        .bvr-progress-fill.danger { background: var(--danger); }\n        .bvr-progress-fill.over {\n            background: repeating-linear-gradient(\n                45deg,\n                var(--danger),\n                var(--danger) 4px,\n                #B91C1C 4px,\n                #B91C1C 8px\n            );\n        }\n        .bvr-progress-pct {\n            font-size: 0.78em;\n            font-variant-numeric: tabular-nums;\n            font-weight: 700;\n            min-width: 42px;\n            text-align: right;\n        }\n        .bvr-progress-pct.ok { color: #34D399; }\n        .bvr-progress-pct.warn { color: #F59E0B; }\n        .bvr-progress-pct.danger { color: var(--danger); }\n\n        /* Status dot */\n        .bvr-status {\n            display: inline-flex;\n            align-items: center;\n            gap: 6px;\n        }\n        .bvr-status-dot {\n            width: 8px;\n            height: 8px;\n            border-radius: 50%;\n            flex-shrink: 0;\n        }\n        .bvr-status-dot.ok { background: #34D399; box-shadow: 0 0 6px rgba(52,211,153,0.5); }\n        .bvr-status-dot.warn { background: #F59E0B; box-shadow: 0 0 6px rgba(245,158,11,0.5); }\n        .bvr-status-dot.danger { background: var(--danger); box-shadow: 0 0 6px rgba(231,76,60,0.5); animation: bvrPulse 1.8s ease-in-out infinite; }\n        @keyframes bvrPulse {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.55; }\n        }\n\n        /* Warning banner if any over-budget */\n        .bvr-warning-banner {\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            margin: 0 22px 0 22px;\n            padding: 12px 14px;\n            background: rgba(231, 76, 60, 0.08);\n            border: 1px solid rgba(231, 76, 60, 0.3);\n            border-left: 3px solid var(--danger);\n            border-radius: 8px;\n            color: var(--text-secondary);\n            font-size: 0.88em;\n        }\n        .bvr-warning-banner + .bvr-warning-banner-wrap { margin-top: 14px; }\n        .bvr-warning-banner svg { color: var(--danger); flex-shrink: 0; }\n        .bvr-warning-banner strong { color: var(--danger); font-weight: 700; }\n        .bvr-warning-banner-wrap { padding: 14px 0 0 0; }\n\n        /* Main 2-col layout : donut + mini summary */\n        .budget-viz {\n            display: grid;\n            grid-template-columns: minmax(440px, 1.05fr) 1fr;\n            grid-template-rows: 1fr auto;\n            gap: 0;\n            border-bottom: 1px solid var(--border);\n        }\n        @media (max-width: 1100px) { .budget-viz { grid-template-columns: 1fr; } }\n\n        /* ── Donut column ── */\n        .budget-donut-wrap {\n            grid-column: 1; grid-row: 1;\n            padding: 28px 16px 18px;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            gap: 10px;\n            border-right: 1px solid var(--border);\n        }\n        @media (max-width: 1100px) {\n            .budget-donut-wrap { border-right: none; border-bottom: 1px solid var(--border); }\n        }\n        .budget-donut-svg {\n            width: 100%;\n            max-width: 420px;\n            height: auto;\n            overflow: visible;\n            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.28));\n        }\n        .budget-donut-hint {\n            font-size: 0.66em;\n            color: var(--text-tertiary);\n            letter-spacing: 0.9px;\n            opacity: 0.55;\n            user-select: none;\n            text-transform: uppercase;\n            font-weight: 500;\n        }\n        .budget-donut-hint::before { content: \"↻ \"; opacity: 0.6; }\n        .budget-donut-center { pointer-events: none; }\n        .budget-donut-center-label {\n            font-size: 9px;\n            fill: var(--joro-teal);\n            text-transform: uppercase;\n            letter-spacing: 2.8px;\n            font-weight: 700;\n            opacity: 0.85;\n        }\n        .budget-donut-center-value {\n            font-size: 19px;\n            fill: var(--text-primary);\n            font-weight: 800;\n            letter-spacing: -1.2px;\n        }\n        .budget-donut-center-sub {\n            font-size: 9.5px;\n            fill: var(--text-muted);\n            font-weight: 500;\n            letter-spacing: 0.4px;\n        }\n        .budget-donut-slice {\n            transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), filter 0.15s ease, opacity 0.15s ease;\n            cursor: pointer;\n        }\n\n        /* ── Legend column ── */\n        .budget-legend {\n            grid-column: 2; grid-row: 1;\n            padding: 14px 4px 14px 0;\n            display: flex;\n            flex-direction: column;\n            gap: 0;\n            overflow-y: auto;\n            max-height: 380px;\n            min-width: 0;\n        }\n        .budget-legend::-webkit-scrollbar { width: 5px; }\n        .budget-legend::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }\n        .budget-legend-title {\n            font-size: 0.66em;\n            color: var(--joro-teal);\n            text-transform: uppercase;\n            letter-spacing: 1.8px;\n            font-weight: 700;\n            padding: 2px      .budget-legend-bar-fill {\n            height: 100%;\n            border-radius: 4px;\n            opacity: 1;\n            box-shadow: 0 0 8px -2px currentColor;\n            transition: width 0.5s cubic-bezier(.22,1,.36,1);\n        }\n        .budget-legend-bar-wrap { padding-right: 4px; }\n        .budget-legend-amount {\n            font-size: 0.85em;\n            color: var(--text-primary);\n            font-weight: 700;\n            font-variant-numeric: tabular-nums;\n            letter-spacing: -0.2px;\n            text-align: right;\n            white-space: nowrap;\n        }\n        .budget-legend-pct {\n            font-size: 0.72em;\n            color: var(--text-tertiary);\n            font-weight: 600;\n            font-variant-numeric: tabular-nums;\n            text-align: right;\n            white-space: nowrap;\n            padding: 2px 6px;\n            background: rgba(255,255,255,0.04);\n            border-radius: 4px;\n        }\n\n        /* Table */\n        .budget-table-wrap {\n            overflow-x: auto;\n        }\n        .budget-table-wrap::-webkit-scrollbar { height: 8px; }\n        .budget-table-wrap::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }\n        .budget-table {\n            width: 100%;\n            border-collapse: collapse;\n            font-size: 0.9em;\n        }\n        .budget-table thead {\n            background: linear-gradient(180deg, rgba(26,169,160,0.10) 0%, rgba(26,169,160,0.04) 100%);\n            position: sticky;\n            top: 0;\n            z-index: 2;\n        }\n        .budget-table th {\n            padding: 13px 16px;\n            text-align: left;\n            font-weight: 700;\n            font-size: 0.7em;\n            text-transform: uppercase;\n            letter-spacing: 1.2px;\n            color: var(--joro-teal);\n            border-bottom: 2px solid rgba(26,169,160,0.35);\n            border-top: none;\n            white-space: nowrap;\n
