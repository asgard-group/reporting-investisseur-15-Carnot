e');\n            }\n\n            // Mettre à jour le titre du top bar\n            const pageTitle = document.getElementById('pageTitle');\n            if (pageTitle && pageTitles[tabName]) {\n                pageTitle.textContent = pageTitles[tabName];\n            }\n\n            // Fermer le menu mobile si ouvert\n            const sidebar = document.getElementById('sidebar');\n            if (sidebar && window.innerWidth <= 900) {\n                sidebar.classList.remove('open');\n            }\n        }\n\n        document.addEventListener('DOMContentLoaded', () => {\n            renderLocatif();\n            initializeEquipment();\n            renderSatisfactionCards();\n            initMap();\n            renderCashflowChart();\n        });\n\n        // ===== CASH FLOW CHART =====\n        // 12 derniers mois — encaissements (loyers + charges refacturées) / décaissements (contrats, taxes, travaux)\n        const cashflowDataMonthly = [\n            { label: 'Juil.',  year: '24', in: 38200, out: 14820 },\n            { label: 'Août',   year: '24', in: 38200, out: 12400 },\n            { label: 'Sept.',  year: '24', in: 39100, out: 21600, note: 'Taxe foncière acompte' },\n            { label: 'Oct.',   year: '24', in: 39100, out: 13900 },\n            { label: 'Nov.',   year: '24', in: 39100, out: 15800 },\n            { label: 'Déc.',   year: '24', in: 40650, out: 24500, note: 'Travaux climatisation' },\n            { label: 'Janv.',  year: '25', in: 41250, out: 13200 },\n            { label: 'Févr.',  year: '25', in: 41250, out: 12900 },\n            { label: 'Mars',   year: '25', in: 41850, out: 19100, note: 'Régularisation charges' },\n            { label: 'Avril',  year: '25', in: 42300, out: 14100 },\n            { label: 'Mai',    year: '25', in: 42300, out: 14800 },\n            { label: 'Juin',   year: '25', in: 44020, out: 19360, current: true }\n        ];\n\n        let cashflowGranularity = 'month';\n\n        // ===== EXPORT CASH FLOW · EXCEL (.xls via HTML table — natively opens in Excel) =====\n        function exportCashflowExcel() {\n            // Build the monthly dataset with computed columns\n            let cumul = 0;\n            const monthly = cashflowDataMonthly.map(r => {\n                const net = r.in - r.out;\n                cumul += net;\n                return { ...r, net, cumul };\n            });\n\n            // Totals\n            const totalIn = monthly.reduce((s, r) => s + r.in, 0);\n            const totalOut = monthly.reduce((s, r) => s + r.out, 0);\n            const totalNet = totalIn - totalOut;\n\n            // Quarterly aggregation\n            const quartersDef = [\n                { label: 'T3 2024', months: [0, 1, 2] },\n                { label: 'T4 2024', months: [3, 4, 5] },\n                { label: 'T1 2025', months: [6, 7, 8] },\n                { label: 'T2 2025', months: [9, 10, 11] },\n            ];\n            const quarterly = quartersDef.map(q => {\n                const rows = q.months.map(i => monthly[i]);\n                const qIn = rows.reduce((s, r) => s + r.in, 0);\n                const qOut = rows.reduce((s, r) => s + r.out, 0);\n                return { label: q.label, in: qIn, out: qOut, net: qIn - qOut };\n            });\n\n            const fmt = n => n.toLocaleString('fr-FR');\n            const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');\n\n            // Build an HTML workbook — Excel opens this as a real .xls\n            const html = `<?xml version=\"1.0\"?>\n<?mso-application progid=\"Excel.Sheet\"?>\n<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:x=\"urn:schemas-microsoft-com:office:excel\" xmlns=\"http://www.w3.org/TR/REC-html40\">\n<head>\n<meta charset=\"UTF-8\">\n<!--[if gte mso 9]><xml>\n  <x:ExcelWorkbook><x:ExcelWorksheets>\n    <x:ExcelWorksheet><x:Name>Cash Flow Mensuel</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>\n    <x:ExcelWorksheet><x:Name>Cash Flow Trimestriel</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>\n    <x:ExcelWorksheet><x:Name>Synthèse</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>\n  </x:ExcelWorksheets></x:ExcelWorkbook>\n</xml><![endif]-->\n<style>\n  body { font-family: Calibri, Arial, sans-serif; }\n  h2 { color: #1C2626; font-size: 16pt; margin: 0 0 4px; }\n  .sub { color: #5A6666; font-size: 10pt; margin-bottom: 14px; }\n  table { border-collapse: collapse; font-size: 10pt; }\n  th { background: #1C2626; color: #81C6C1; font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid #2E3838; text-transform: uppercase; letter-spacing: 0.5px; font-size: 9pt; }\n  td { padding: 7px 12px; border: 1px solid #D5DDDD; }\n  td.num { text-align: right; mso-number-format: \"#,##0\\\\ \\\\€\"; font-variant-numeric: tabular-nums; }\n  td.label { font-weight: 600; color: #1C2626; background: #F4F7F7; }\n  tr.total td { background: #E8F2F1; font-weight: 700; color: #1C2626; border-top: 2px solid #81C6C1; }\n  td.pos { color: #2D7A4A; font-weight: 600; }\n  td.neg { color: #B91C1C; font-weight: 600; }\n  td.note { font-size: 9pt; color: #5A6666; font-style: italic; }\n</style>\n</head>\n<body>\n\n<h2>Cash Flow · 12 derniers mois</h2>\n<div class=\"sub\">15 Avenue Carnot · LOKI — Source : Pennylane — Généré le ${new Date().toLocaleDateString('fr-FR')}</div>\n<table>\n  <thead>\n    <tr>\n      <th>Période</th>\n      <th>Année</th>\n      <th>Encaissements</th>\n      <th>Décaissements</th>\n      <th>Cash flow net</th>\n      <th>Trésorerie cumulée</th>\n      <th>Commentaire</th>\n    </tr>\n  </thead>\n  <tbody>\n    ${monthly.map(r => `\n      <tr>\n        <td class=\"label\">${esc(r.label)}</td>\n        <td>20${esc(r.year)}</td>\n        <td class=\"num\">${fmt(r.in)}</td>\n        <td class=\"num\">${fmt(r.out)}</td>\n        <td class=\"num ${r.net >= 0 ? 'pos' : 'neg'}\">${fmt(r.net)}</td>\n        <td class=\"num\">${fmt(r.cumul)}</td>\n        <td class=\"note\">${esc(r.note || '')}</td>\n      </tr>\n    `).join('')}\n    <tr class=\"total\">\n      <td class=\"label\" colspan=\"2\">TOTAL 12 MOIS</td>\n      <td class=\"num\">${fmt(totalIn)}</td>\n      <td class=\"num\">${fmt(totalOut)}</td>\n      <td class=\"num ${totalNet >= 0 ? 'pos' : 'neg'}\">${fmt(totalNet)}</td>\n      <td class=\"num\">${fmt(monthly[monthly.length - 1].cumul)}</td>\n      <td></td>\n    </tr>\n  </tbody>\n</table>\n\n<br/><br/>\n\n<h2>Cash Flow · Vue trimestrielle</h2>\n<div class=\"sub\">Agrégation par trimestre civil</div>\n<table>\n  <thead>\n    <tr>\n      <th>Trimestre</th>\n      <th>Encaissements</th>\n      <th>Décaissements</th>\n      <th>Cash flow net</th>\n    </tr>\n  </thead>\n  <tbody>\n    ${quarterly.map(q => `\n      <tr>\n        <td class=\"label\">${esc(q.label)}</td>\n        <td class=\"num\">${fmt(q.in)}</td>\n        <td class=\"num\">${fmt(q.out)}</td>\n        <td class=\"num ${q.net >= 0 ? 'pos' : 'neg'}\">${fmt(q.net)}</td>\n      </tr>\n    `).join('')}\n    <tr class=\"total\">\n      <td class=\"label\">TOTAL ANNUEL</td>\n      <td class=\"num\">${fmt(totalIn)}</td>\n      <td class=\"num\">${fmt(totalOut)}</td>\n      <td class=\"num ${totalNet >= 0 ? 'pos' : 'neg'}\">${fmt(totalNet)}</td>\n    </tr>\n  </tbody>\n</table>\n\n<br/><br/>\n\n<h2>Synthèse · Indicateurs clés</h2>\n<table>\n  <tbody>\n    <tr><td class=\"label\">Actif</td><td>15 Avenue Carnot · LOKI</td></tr>\n    <tr><td class=\"label\">Période</td><td>${esc(monthly[0].label)} 20${esc(monthly[0].year)} → ${esc(monthly[monthly.length-1].label)} 20${esc(monthly[monthly.length-1].year)}</td></tr>\n    <tr><td class=\"label\">Encaissements cumulés</td><td class=\"num\">${fmt(totalIn)}</td></tr>\n    <tr><td class=\"label\">Décaissements cumulés</td><td class=\"num\">${fmt(totalOut)}</td></tr>\n    <tr><td class=\"label\">Cash flow net</td><td class=\"num ${totalNet >= 0 ? 'pos' : 'neg'}\">${fmt(totalNet)}</td></tr>\n    <tr><td class=\"label\">Encaissement mensuel moyen</td><td class=\"num\">${fmt(Math.round(totalIn / monthly.length))}</td></tr>\n    <tr><td class=\"label\">Décaissement mensuel moyen</td><td class=\"num\">${fmt(Math.round(totalOut / monthly.length))}</td></tr>\n    <tr><td class=\"label\">Meilleur mois (net)</td><td>${esc(monthly.reduce((a,b) => a.net > b.net ? a : b).label)} ${esc(monthly.reduce((a,b) => a.net > b.net ? a : b).year)}</td></tr>\n    <tr><td class=\"label\">Mois le plus faible (net)</td><td>${esc(monthly.reduce((a,b) => a.net < b.net ? a : b).label)} ${esc(monthly.reduce((a,b) => a.net < b.net ? a : b).year)}</td></tr>\n    <tr><td class=\"label\">Devise</td><td>EUR HT</td></tr>\n    <tr><td class=\"label\">Source</td><td>Pennylane</td></tr>\n    <tr><td class=\"label\">Date d'export</td><td>${new Date().toLocaleDateString('fr-FR')} ${new Date().toLocaleTimeString('fr-FR')}</td></tr>\n  </tbody>\n</table>\n\n</body>\n</html>`;\n\n            const blob = new Blob(['\\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `CashFlow_15Carnot_${new Date().toISOString().split('T')[0]}.xls`;\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n\n        function aggregateQuarterly(data) {\n            const quarters = [\n                { label: 'T3', year: '24', months: [0, 1, 2] },\n                { label: 'T4', year: '24', months: [3, 4, 5] },\n                { label: 'T1', year: '25', months: [6, 7, 8] },\n                { label: 'T2', year: '25', months: [9, 10, 11], current: true }\n            ];\n            return quarters.map(q => {\n                const inSum = q.months.reduce((a, i) => a + data[i].in, 0);\n                const outSum = q.months.reduce((a, i) => a + data[i].out, 0);\n                return { label: q.label, year: q.year, in: inSum, out: outSum, current: q.current };\n            });\n        }\n\n        function fmtEUR(v) {\n            const sign = v < 0 ? '-' : '';\n            const abs = Math.abs(Math.round(v));\n            return sign + abs.toLocaleString('fr-FR') + ' €';\n        }\n        function fmtEURsigned(v) {\n            const sign = v >= 0 ? '+' : '-';\n            return sign + Math.abs(Math.round(v)).toLocaleString('fr-FR') + ' €';\n        }\n        function fmtEURshort(v) {\n            const abs = Math.abs(v);\n            if (abs >= 1000) return (v / 1000).toFixed(0) + 'k€';\n            return v + '€';\n        }\n\n        function renderCashflowChart() {\n            const container = document.getElementById('cashflowChart');\n            if (!container) return;\n\n            const raw = cashflowGranularity === 'quarter'\n                ? aggregateQuarterly(cashflowDataMonthly)\n                : cashflowDataMonthly;\n\n            // Compute nets and cumulative\n            const startingCash = 121720; // trésorerie début période\n            const data = raw.map((d, i) => ({ ...d, net: d.in - d.out }));\n            let cum = startingCash;\n            data.forEach(d => { cum += d.net; d.cum = cum; });\n\n            // Dimensions\n            const W = 1040;\n            const H = 380;\n            const pad = { top: 30, right: 60, bottom: 46, left: 64 };\n            const innerW = W - pad.left - pad.right;\n            const innerH = H - pad.top - pad.bottom;\n\n            // Scales\n            const maxIn = Math.max(...data.map(d => d.in));\n            const maxOut = Math.max(...data.map(d => d.out));\n            const barMax = Math.ceil(Math.max(maxIn, maxOut) / 10000) * 10000;\n            const maxCum = Math.max(...data.map(d => d.cum));\n            const cumMax = Math.ceil(maxCum / 50000) * 50000;\n\n            // Split: top 62% for bars area (in above axis, out below), right axis cumulative line\n            const zeroY = pad.top + innerH * 0.55;\n            const inAreaH = zeroY - pad.top;\n            const outAreaH = (pad.top + innerH) - zeroY;\n\n            const n = data.length;\n            const slotW = innerW / n;\n            const barGroupW = slotW * 0.62;\n            const barW = barGroupW / 2 - 2;\n\n            const scaleIn = v => (v / barMax) * inAreaH;\n            const scaleOut = v => (v / barMax) * outAreaH;\n            const scaleCum = v => pad.top + innerH - (v / cumMax) * innerH;\n\n            // Build SVG\n            let svg = `<svg viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-label=\"Cash flow graphique\">`;\n\n            // Defs\n            svg += `\n                <defs>\n                    <linearGradient id=\"cfCumGradient\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                        <stop offset=\"0%\" stop-color=\"#A78BFA\" stop-opacity=\"0.30\"/>\n                        <stop offset=\"100%\" stop-color=\"#A78BFA\" stop-opacity=\"0.02\"/>\n                    </linearGradient>\n                    <linearGradient id=\"cfInGradient\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                        <stop offset=\"0%\" stop-color=\"#9FD6D2\" stop-opacity=\"1\"/>\n                        <stop offset=\"100%\" stop-color=\"#6AAEA9\" stop-opacity=\"0.85\"/>\n                    </linearGradient>\n                    <linearGradient id=\"cfOutGradient\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                        <stop offset=\"0%\" stop-color=\"#F87171\" stop-opacity=\"0.85\"/>\n                        <stop offset=\"100%\" stop-color=\"#C14A4A\" stop-opacity=\"0.95\"/>\n                    </linearGradient>\n                </defs>\n            `;\n\n            // Horizontal gridlines (on bars' in side + out side)\n            const gridSteps = 4;\n            for (let i = 0; i <= gridSteps; i++) {\n                const frac = i / gridSteps;\n                // positive\n                const yPos = zeroY - frac * inAreaH;\n                svg += `<line class=\"cf-axis-line\" x1=\"${pad.left}\" y1=\"${yPos}\" x2=\"${W - pad.right}\" y2=\"${yPos}\"/>`;\n                const valPos = frac * barMax;\n                svg += `<text class=\"cf-axis-label\" x=\"${pad.left - 10}\" y=\"${yPos + 3}\" text-anchor=\"end\">${fmtEURshort(valPos)}</text>`;\n                // cumulative axis labels (right)\n                const valCum = frac * cumMax;\n                const yCum = pad.top + innerH - frac * innerH;\n                svg += `<text class=\"cf-axis-label\" x=\"${W - pad.right + 10}\" y=\"${yCum + 3}\" text-anchor=\"start\" style=\"fill:#A78BFA;\">${fmtEURshort(valCum)}</text>`;\n            }\n            // negative (out) gridlines\n            for (let i = 1; i <= gridSteps; i++) {\n                const frac = i / gridSteps;\n                const yNeg = zeroY + frac * outAreaH;\n                svg += `<line class=\"cf-axis-line\" x1=\"${pad.left}\" y1=\"${yNeg}\" x2=\"${W - pad.right}\" y2=\"${yNeg}\"/>`;\n                const valNeg = -frac * barMax;\n                svg += `<text class=\"cf-axis-label\" x=\"${pad.left - 10}\" y=\"${yNeg + 3}\" text-anchor=\"end\">${fmtEURshort(valNeg)}</text>`;\n            }\n\n            // Zero line\n            svg += `<line class=\"cf-axis-zero\" x1=\"${pad.left}\" y1=\"${zeroY}\" x2=\"${W - pad.right}\" y2=\"${zeroY}\"/>`;\n\n            // Y axis legends (corners)\n            svg += `<text class=\"cf-axis-label\" x=\"${pad.left - 50}\" y=\"${pad.top - 12}\" style=\"font-weight:600;text-transform:uppercase;letter-spacing:1px;\">Flux</text>`;\n            svg += `<text class=\"cf-axis-label\" x=\"${W - pad.right + 10}\" y=\"${pad.top - 12}\" style=\"font-weight:600;text-transform:uppercase;letter-spacing:1px;fill:#A78BFA;\">Trésorerie</text>`;\n\n            // Hover columns (behind)\n            data.forEach((d, i) => {\n                const cx = pad.left + slotW * (i + 0.5);\n                const x0 = cx - slotW / 2 + 2;\n                svg += `<rect class=\"cf-hover-col\" data-idx=\"${i}\" x=\"${x0}\" y=\"${pad.top}\" width=\"${slotW - 4}\" height=\"${innerH}\" rx=\"6\"/>`;\n            });\n\n            // Bars — inflows (above) and outflows (below)\n            data.forEach((d, i) => {\n                const cx = pad.left + slotW * (i + 0.5);\n                const xIn = cx - barGroupW / 2;\n                const xOut = cx + 2;\n                const hIn = scaleIn(d.in);\n                const hOut = scaleOut(d.out);\n\n                // Inflow bar (up from zero)\n                svg += `<rect class=\"cf-bar-in\" x=\"${xIn}\" y=\"${zeroY - hIn}\" width=\"${barW}\" height=\"${hIn}\" rx=\"3\" fill=\"url(#cfInGradient)\" data-idx=\"${i}\"/>`;\n                // Outflow bar (down from zero)\n                svg += `<rect class=\"cf-bar-out\" x=\"${xOut}\" y=\"${zeroY}\" width=\"${barW}\" height=\"${hOut}\" rx=\"3\" fill=\"url(#cfOutGradient)\" data-idx=\"${i}\"/>`;\n\n                // Net marker (small tick on the pair)\n                const netY = d.net >= 0 ? (zeroY - scaleIn(d.net)) : (zeroY + scaleOut(-d.net));\n                // drawn later as line\n            });\n\n            // Net line (dashed)\n            const netPts = data.map((d, i) => {\n                const cx = pad.left + slotW * (i + 0.5);\n                const y = d.net >= 0 ? (zeroY - scaleIn(d.net)) : (zeroY + scaleOut(-d.net));\n                return [cx, y];\n            });\n            const netPath = netPts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ');\n            svg += `<path class=\"cf-net-line\" d=\"${netPath}\"/>`;\n            netPts.forEach(p => {\n                svg += `<circle cx=\"${p[0]}\" cy=\"${p[1]}\" r=\"2.5\" fill=\"#FBBF24\"/>`;\n            });\n\n            // Cumulative line + area (right axis)\n            const cumPts = data.map((d, i) => {\n                const cx = pad.left + slotW * (i + 0.5);\n                const y = scaleCum(d.cum);\n                return [cx, y];\n            });\n            // Area path\n            let area = 'M' + cumPts[0][0] + ',' + (pad.top + innerH);\n            cumPts.forEach(p => { area += ' L' + p[0] + ',' + p[1]; });\n            area += ' L' + cumPts[cumPts.length - 1][0] + ',' + (pad.top + innerH) + ' Z';\n            svg += `<path class=\"cf-cum-area\" d=\"${area}\"/>`;\n\n            // Smooth line\n            let linePath = 'M' + cumPts[0][0] + ',' + cumPts[0][1];\n            for (let i = 1; i < cumPts.length; i++) {\n                const [x1, y1] = cumPts[i - 1];\n                const [x2, y2] = cumPts[i];\n                const mx = (x1 + x2) / 2;\n                linePath += ` C ${mx},${y1} ${mx},${y2} ${x2},${y2}`;\n            }\n            svg += `<path class=\"cf-cum-line\" d=\"${linePath}\"/>`;\n\n            // Cumulative dots\n            cumPts.forEach((p, i) => {\n                const isCurr = data[i].current;\n                svg += `<circle class=\"cf-cum-dot\" cx=\"${p[0]}\" cy=\"${p[1]}\" r=\"${isCurr ? 5 : 3.5}\" ${isCurr ? 'style=\"fill:#A78BFA;stroke:var(--bg-secondary);stroke-width:3;\"' : ''}/>`;\n            });\n\n            // X axis labels\n            data.forEach((d, i) => {\n                const cx = pad.left + slotW * (i + 0.5);\n                const y = pad.top + innerH + 22;\n                const cls = d.current ? 'cf-month-label highlight' : 'cf-month-label';\n                svg += `<text class=\"${cls}\" x=\"${cx}\" y=\"${y}\">${d.label}</text>`;\n                // year tag below if first in year or changes\n                if (i === 0 || data[i].year !== data[i - 1].year || d.current) {\n                    svg += `<text class=\"cf-axis-label\" x=\"${cx}\" y=\"${y + 14}\" text-anchor=\"middle\" style=\"font-size:9px;opacity:0.7;\">'${d.year}</text>`;\n                }\n            });\n\n            svg += `</svg>`;\n            svg += `<div class=\"cf-tooltip\" id=\"cfTooltip\"></div>`;\n            container.innerHTML = svg;\n\n            // Interactions\n            const tooltip = document.getElementById('cfTooltip');\n            const hoverCols = container.querySelectorAll('.cf-hover-col');\n            const svgEl = container.querySelector('svg');\n\n            function showTip(i, evt) {\n                const d = data[i];\n                hoverCols.forEach(c => c.classList.remove('active'));\n                hoverCols[i].classList.add('active');\n\n                const rect = container.getBoundingClientRect();\n                const svgRect = svgEl.getBoundingClientRect();\n                const scale = svgRect.width / W;\n                const cx = pad.left + slotW * (i + 0.5);\n                const yTop = pad.top;\n\n                tooltip.innerHTML = `\n                    <div class=\"cf-tip-title\">${d.label} '${d.year}${d.current ? ' · en cours' : ''}</div>\n                    <div class=\"cf-tip-row\">\n                        <span class=\"cf-tip-label in\">Encaissements</span>\n                        <span class=\"cf-tip-value\">${fmtEUR(d.in)}</span>\n                    </div>\n                    <div class=\"cf-tip-row\">\n                        <span class=\"cf-tip-label out\">Décaissements</span>\n                        <span class=\"cf-tip-value\">${fmtEUR(d.out)}</span>\n                    </div>\n                    <div class=\"cf-tip-row\">\n                        <span class=\"cf-tip-label net\">Cash flow net</span>\n                        <span class=\"cf-tip-value ${d.net >= 0 ? 'positive' : 'negative'}\">${fmtEURsigned(d.net)}</span>\n                    </div>\n                    <div class=\"cf-tip-row\">\n                        <span class=\"cf-tip-label cum\">Trésorerie</span>\n                        <span class=\"cf-tip-value\">${fmtEUR(d.cum)}</span>\n                    </div>\n                    ${d.note ? `<div style=\"margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:0.88em;color:var(--text-tertiary);font-style:italic;\">↳ ${d.note}</div>` : ''}\n                `;\n                tooltip.style.left = (cx * scale) + 'px';\n                tooltip.style.top = (yTop * scale + svgRect.top - rect.top) + 'px';\n                tooltip.classList.add('visible');\n            }\n\n            function hideTip() {\n                hoverCols.forEach(c => c.classList.remove('active'));\n                tooltip.classList.remove('visible');\n            }\n\n            hoverCols.forEach((col, i) => {\n                col.addEventListener('mouseenter', (e) => showTip(i, e));\n                col.addEventListener('mouseleave', hideTip);\n            });\n\n            container.addEventListener('mouseleave', hideTip);\n        }\n\n        // Granularity toggle\n        document.addEventListener('click', (e) => {\n            const btn = e.target.closest('.cf-gran-btn');\n            if (!btn) return;\n            document.querySelectorAll('.cf-gran-btn').forEach(b => b.classList.remove('active'));\n            btn.classList.add('active');\n            cashflowGranularity = btn.dataset.gran;\n            renderCashflowChart();\n        });\n\n        /* ============================================================\n           PLANS & SURFACES — section 7\n           ============================================================ */\n        const FLOORS_DATA = [\n            {\n                id: 'r6', lvl: 'R+6', name: 'Terrasse & PH',\n                destination: 'Terrasse partagée', useful: 180, commons: 40, total: 220,\n                occupant: 'Commune', status: 'commune',\n                desc: 'Toiture-terrasse végétalisée accessible à l\\'ensemble des occupants. Local technique ascenseur et ventilation.',\n                stats: { hsp: '—', bureaux: 0, postes: 0, meeting: 0 }\n            },\n            {\n                id: 'r5', rentBudgetSort = null; // null = grouped by category | 'asc' = A→Z flat | 'desc' = Z→A flat\n        const budgetCollapsedCategories = new Set(); // e.g. 'expl', 'fiscal'\n\n        function fmtEur(n, opts) {\n            opts = opts || {};\n            const d = opts.decimals != null ? opts.decimals : (Math.abs(n) < 100 ? 2 : 0);\n            return n.toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });\n        }\n\n        function getBudgetForPeriod(periodKey) {\n            return budgetData2026.map(item => {\n                let budget, realized;\n                if (periodKey === '2025') {\n                    budget   = item.y2025      || 0;\n                    realized = item.y2025_real || 0;\n                } else {\n                    budget   = item.budget     || 0;\n                    realized = item.realizedYTD || 0;\n                }\n                const ecart = realized - budget; // positif = dépassement\n                const consoPct = budget > 0 ? (realized / budget) * 100 : 0;\n                let status = 'ok';\n                if (consoPct > 100) status = 'danger';\n                else if (consoPct >= 85) status = 'warn';\n                return { ...item, montant: budget, budget, realized, ecart, consoPct, status };\n            });\n        }\n\n        function renderBudget() {\n            const period = BUDGET_PERIODS[currentBudgetYear] || BUDGET_PERIODS['2026'];\n            \n\n            if (currentBudgetView === 'bvr') {\n                // Réalisé vs Budget — uses currentBudgetYear\n                const yr = currentBudgetYear;\n                const items = getBudgetForPeriod(yr);\n                const totalBudget = items.reduce((s, i) => s + i.budget, 0);\n                const totalRealized = items.reduce((s, i) => s + i.realized, 0);\n                const pYr = BUDGET_PERIODS[yr] || BUDGET_PERIODS['2026'];\n\n                // Restore standard header if was switched\n                const head = document.getElementById('budgetTableHead');\n                if (head && head.querySelectorAll('th').length < 7) {\n                    head.innerHTML = `\n                        <th style=\"min-width:220px;\"><button type=\"button\" class=\"driver-sort-btn\" id=\"driverSortBtn\" title=\"Trier par ordre alphabétique\">Driver<svg class=\"driver-sort-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 3 18 9\"/><polyline points=\"6 15 12 21 18 15\"/></svg></button></th>\n                        <th class=\"recup-col\" title=\"R = Récupérable · NR = Non récupérable\">Récup.</th>\n                        <th style=\"min-width:160px;\">Prestataire(s)</th>\n                        <th class=\"num\" id=\"budgetCol\">Budget ${yr}</th>\n                        <th class=\"num col-bonly\">€/m²</th>\n                        <th class=\"num col-bvr\" id=\"realizedCol\">Réalisé ${yr}</th>\n                        <th class=\"num col-bvr\">Écart €</th>\n                        <th class=\"col-bvr\" style=\"min-width:150px;\">Conso. / Statut</th>\n                    `;\n                }\n                const budgetCol = document.getElementById('budgetCol');\n                if (budgetCol) budgetCol.textContent = 'Budget ' + yr;\n                const realCol = document.getElementById('realizedCol');\n                if (realCol) realCol.textContent = 'Réalisé ' + yr;\n\n                const bvrDash = document.getElementById('bvrDashboard');\n                if (bvrDash) bvrDash.style.display = '';\n\n                renderBvrDashboard(items, totalBudget, totalRealized, pYr);\n                renderBvrWarningBanner(items);\n                renderBudgetTable(items, totalBudget, totalRealized, pYr);\n                renderBudgetDonut(items, totalBudget);\n                renderBudgetLegend(items, totalBudget);\n                renderBudgetMiniKpis(items, totalBudget, pYr);\n                renderBvrBars(items);\n\n            } else if (currentBudgetYear === 'compare') {\n                // Comparatif Budget 2026 vs Budget 2025\n                const items2026 = getBudgetForPeriod('2026');\n                const items2025 = getBudgetForPeriod('2025');\n                const total2026 = items2026.reduce((s, i) => s + i.budget, 0);\n                const total2025 = items2025.reduce((s, i) => s + i.budget, 0);\n\n                const bvrDash = document.getElementById('bvrDashboard');\n                if (bvrDash) bvrDash.style.display = 'none';\n\n                renderCompareTable(items2026, items2025, total2026, total2025);\n                // Donut shown for 2026 budget so user keeps a visual anchor\n                renderBudgetDonut(items2026, total2026);\n                renderBudgetLegend(items2026, total2026);\n                renderBudgetMiniKpis(items2026, total2026, BUDGET_PERIODS['2026']);\n\n            } else {\n                // Budget seul — year = currentBudgetYear (2026 or 2025)\n                const items = getBudgetForPeriod(currentBudgetYear);\n                const totalBudget = items.reduce((s, i) => s + i.budget, 0);\n                const totalRealized = items.reduce((s, i) => s + i.realized, 0);\n                const yearLabel = currentBudgetYear;\n\n                const budgetCol = document.getElementById('budgetCol');\n                if (budgetCol) budgetCol.textContent = 'Budget ' + yearLabel;\n\n                // Restore standard header\n                const head = document.getElementById('budgetTableHead');\n                if (head) {\n                    head.innerHTML = `\n                        <th style=\"min-width:220px;\"><button type=\"button\" class=\"driver-sort-btn\" id=\"driverSortBtn\" title=\"Trier par ordre alphabétique\">Driver<svg class=\"driver-sort-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-li
