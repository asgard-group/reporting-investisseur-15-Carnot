 { color: var(--text-muted); background: transparent; border-color: var(--border); font-style: italic; }\n\n        .budget-prestas {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 4px;\n            align-items: center;\n        }\n        .budget-dash {\n            color: var(--text-muted);\n            font-size: 1.2em;\n        }\n\n        /* Final total row */\n        .budget-table tfoot td {\n            background: var(--bg-tertiary);\n            border-top: 2px solid var(--joro-teal);\n            border-bottom: none;\n            padding: 16px;\n            color: var(--text-primary);\n            font-weight: 700;\n            font-size: 0.92em;\n        }\n        .budget-table tfoot td.num {\n            color: var(--text-primary);\n            font-size: 1.05em;\n            font-variant-numeric: tabular-nums;\n        }\n        .budget-table tfoot td.num.teal {\n            color: var(--joro-teal);\n        }\n        .budget-table tfoot td .mini-label {\n            display: block;\n            font-size: 0.7em;\n            color: var(--text-tertiary);\n            font-weight: 500;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            margin-bottom: 2px;\n        }\n\n        /* Recup column + pills */\n        .budget-table th.recup-col,\n        .budget-table td.recup-col {\n            text-align: center;\n            white-space: nowrap;\n            width: 54px;\n            padding-left: 6px;\n            padding-right: 6px;\n        }\n        .recup-pill {\n            display: inline-flex;\n            align-items: center;\n            justify-content: center;\n            min-width: 32px;\n            height: 22px;\n            padding: 0 7px;\n            border-radius: 5px;\n            font-size: 0.72em;\n            font-weight: 700;\n            transition: transform .15s, box-shadow .15s, filter .15s;\n            letter-spacing: 0.5px;\n            border: 1px solid;\n            font-variant-numeric: tabular-nums;\n        }\n        .recup-pill.recup-r {\n            color: #34D399;\n            background: rgba(52, 211, 153, 0.1);\n            border-color: rgba(52, 211, 153, 0.35);\n        }\n        .recup-pill.recup-nr {\n            color: #F59E0B;\n            background: rgba(245, 158, 11, 0.1);\n            border-color: rgba(245, 158, 11, 0.35);\n        }\n        .recup-pill[onclick]:hover {\n            transform: translateY(-1px) scale(1.06);\n            filter: brightness(1.15);\n            box-shadow: 0 4px 12px -3px rgba(0,0,0,0.4);\n        }\n        .budget-desc {\n            color: var(--text-secondary);\n            font-size: 0.88em;\n            line-height: 1.35;\n        }\n\n        /* Description + contract cell (discreet) */\n        .budget-desc-cell { padding-top: 10px; padding-bottom: 10px; }\n        .budget-desc-title {\n            color: var(--text-primary);\n            font-size: 0.9em;\n            font-weight: 500;\n            line-height: 1.3;\n        }\n        .contract-link {\n            display: inline-flex;\n            align-items: center;\n            gap: 5px;\n            margin-top: 3px;\n            color: var(--text-tertiary);\n            font-size: 0.78em;\n            font-weight: 400;\n            text-decoration: none;\n            max-width: 100%;\n            overflow: hidden;\n            transition: color 0.15s ease;\n        }\n        .contract-link:hover { color: var(--joro-teal); }\n        .contract-link-icon { flex-shrink: 0; opacity: 0.7; }\n        .contract-link:hover .contract-link-icon { opacity: 1; }\n        .contract-link-name {\n            white-space: nowrap;\n            overflow: hidden;\n            text-overflow: ellipsis;\n            max-width: 260px;\n        }\n\n        /* Category header row */\n        .budget-table tbody tr.cat-header-row > td {\n            background: rgba(26,169,160,0.07);\n            padding: 11px 16px;\n            border-top: 1px solid rgba(26,169,160,0.20);\n            border-bottom: 1px solid rgba(26,169,160,0.16);\n            cursor: pointer;\n            user-select: none;\n            transition: background 0.12s ease;\n        }\n        .cat-header-row > td:first-child {\n            border-left: 3px solid var(--joro-teal);\n            padding-left: 13px;\n        }\n        .budget-table tbody tr.cat-header-row:hover > td {\n            background: rgba(26,169,160,0.12);\n        }\n        .cat-toggle {\n            display: inline-flex;\n            align-items: center;\n            gap: 8px;\n        }\n        .cat-caret {\n            color: var(--joro-teal);\n            transition: transform 0.2s ease;\n            flex-shrink: 0;\n            opacity: 0.85;\n        }\n        .budget-table tbody tr.cat-header-row.collapsed .cat-caret {\n            transform: rotate(-90deg);\n        }\n        .cat-header-label {\n            color: var(--text-primary);\n            font-weight: 700;\n            font-size: 0.82em;\n            letter-spacing: 0.8px;\n            text-transform: uppercase;\n        }\n        .cat-header-count {\n            display: inline-flex;\n            align-items: center;\n            justify-content: center;\n            margin-left: 8px;\n            background: rgba(26,169,160,0.15);\n            color: var(--joro-teal);\n            font-weight: 600;\n            font-size: 0.72em;\n            letter-spacing: 0.2px;\n            padding: 1px 7px;\n            border-radius: 20px;\n            border: 1px solid rgba(26,169,160,0.25);\n        }\n        /* Category header — per-column cells (totals aligned on Budget / Réalisé / Écart / Bar / €/m²) */\n        .budget-table tbody tr.cat-header-row > td.cat-head-amount {\n            color: var(--text-primary);\n            font-weight: 700;\n            font-size: 0.9em;\n            font-variant-numeric: tabular-nums;\n        }\n        .budget-table tbody tr.cat-header-row > td.cat-head-ecart,\n        .budget-table tbody tr.cat-header-row > td.cat-head-m2 {\n            color: var(--text-muted);\n            font-weight: 500;\n            font-size: 0.82em;\n            font-variant-numeric: tabular-nums;\n        }\n        .budget-table tbody tr.cat-header-row > td.cat-head-bar {\n            padding-right: 14px;\n        }\n        .budget-table tbody tr.cat-header-row > td.cat-head-bar .bvr-progress {\n            opacity: 0.75;\n        }\n        .budget-table tbody tr.cat-header-row > td.cat-head-bar .bvr-progress-pct {\n            font-size: 0.75em;\n        }\n\n        /* Category subtotal row */\n        .budget-table tbody tr.cat-subtotal-row > td {\n            background: rgba(255, 255, 255, 0.018);\n            padding-top: 10px;\n            padding-bottom: 10px;\n            font-weight: 600;\n            color: var(--text-secondary);\n            border-top: 1px dashed var(--border-hover);\n            border-bottom: 1px solid var(--border);\n        }\n        .budget-table tbody tr.cat-subtotal-row > td:first-child {\n            color: var(--text-secondary);\n            font-size: 0.82em;\n            text-transform: uppercase;\n            letter-spacing: 0.8px;\n            padding-left: 32px;\n        }\n        .budget-table tbody tr.cat-subtotal-row td.num {\n            color: var(--text-primary);\n            font-size: 0.92em;\n        }\n        .budget-table tbody tr.cat-subtotal-row:hover > td {\n            background: rgba(255, 255, 255, 0.035);\n        }\n\n        /* Foot sub-rows (R / NR) */\n        .budget-table tfoot tr.foot-sub td {\n            background: var(--bg-tertiary);\n            color: var(--text-secondary);\n            font-size: 0.82em;\n            font-weight: 600;\n            text-transform: none;\n            letter-spacing: 0.3px;\n            border-top: 1px solid var(--border);\n            padding-top: 10px;\n            padding-bottom: 10px;\n        }\n        .budget-table tfoot tr.foot-sub td.num {\n            color: var(--text-primary);\n            font-size: 0.9em;\n        }\n        .budget-table tfoot tr.foot-sub + tr.foot-sub td {\n            border-top: 1px dashed var(--border-hover);\n        }\n        .foot-tag {\n            display: inline-flex;\n            align-items: center;\n            justify-content: center;\n            min-width: 26px;\n            height: 18px;\n            margin-right: 8px;\n            padding: 0 5px;\n            border-radius: 4px;\n            font-size: 0.68em;\n            font-weight: 700;\n            letter-spacing: 0.5px;\n            border: 1px solid;\n            vertical-align: 1px;\n        }\n        .foot-tag.recup-r { color: #34D399; background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.35); }\n        .foot-tag.recup-nr { color: #F59E0B; background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.35); }\n\n        /* Grand total row */\n        .budget-table tfoot tr.foot-total td {\n            background: linear-gradient(180deg, rgba(26,169,160,0.10) 0%, rgba(26,169,160,0.04) 100%);\n            border-top: 2px solid rgba(26,169,160,0.5);\n            color: var(--text-primary);\n            font-weight: 700;\n            font-size: 0.9em;\n            font-variant-numeric: tabular-nums;\n        }\n        .budget-table tfoot tr.foot-total td:first-child {\n            border-left: 3px solid var(--joro-teal);\n            padding-left: 13px;\n        }\n        .budget-table tfoot tr.foot-total td.num {\n            color: var(--text-primary);\n            font-size: 1.08em;\n            font-variant-numeric: tabular-nums;\n        }\n        .budget-table tfoot tr.foot-total td.num.teal {\n            color: var(--joro-teal);\n        }\n\n        /* Budget footer & actions */\n        .budget-footer {\n            padding: 14px 22px;\n            border-top: 1px solid var(--border);\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            flex-wrap: wrap;\n            gap: 10px;\n            background: rgba(255,255,255,0.015);\n        }\n        .budget-footer-note {\n            color: var(--text-muted);\n            font-size: 0.82em;\n            font-style: italic;\n        }\n        .budget-export-btn {\n            display: inline-flex;\n            align-items: center;\n            gap: 8px;\n            padding: 8px 14px;\n            background: var(--bg-secondary);\n            border: 1px solid var(--border);\n            border-radius: 8px;\n            color: var(--joro-teal);\n            font-size: 0.82em;\n            font-weight: 600;\n            cursor: pointer;\n            font-family: inherit;\n            transition: all 0.2s ease;\n        }\n        .budget-export-btn:hover {\n            background: var(--joro-teal);\n            color: var(--joro-dark);\n            border-color: var(--joro-teal);\n        }\n\n        /* Mini summary cards under donut */\n        .budget-mini-kpis {\n            grid-column: 1 / -1;\n            grid-row: 2;\n            display: grid;\n            grid-template-columns: repeat(3, 1fr);\n            gap: 0;\n            border-top: 1px solid var(--border);\n            background: linear-gradient(180deg, rgba(26,169,160,0.04) 0%, transparent 100%);\n        }\n        .budget-mini-kpi {\n            padding: 16px 22px;\n            display: flex;\n            flex-direction: column;\n            gap: 4px;\n            border-right: 1px solid var(--border);\n            position: relative;\n            transition: background .15s;\n        }\n        .budget-mini-kpi:last-child { border-right: none; }\n        .budget-mini-kpi:hover { background: rgba(26,169,160,0.04); }\n        .budget-mini-kpi::before {\n            content: '';\n            position: absolute;\n            left: 0; top: 22%; bottom: 22%;\n            width: 3px;\n            background: linear-gradient(180deg, var(--joro-teal), rgba(26,169,160,0.25));\n            border-radius: 0 3px 3px 0;\n        }\n        .budget-mini-kpi-label {\n            font-size: 0.66em;\n            color: var(--text-tertiary);\n            text-transform: uppercase;\n            letter-spacing: 1.2px;\n            font-weight: 700;\n        }\n        .budget-mini-kpi-value {\n            font-size: 1.05em;\n            font-weight: 800;\n            color: var(--text-primary);\n            font-variant-numeric: tabular-nums;\n            letter-spacing: -0.5px;\n        }\n        .budget-mini-kpi-sub {\n            font-size: 0.71em;\n            color: var(--text-muted);\n            font-weight: 400;\n        }\n    </style>\n</head>\n<body>\n    \n    <div class=\"app-layout\">\n        <!-- SIDEBAR (Sora-style) -->\n        <aside class=\"sidebar\" id=\"sidebar\">\n            <!-- Brand -->\n            <div class=\"sidebar-brand\">\n                <div class=\"sidebar-logo-wrap\">\n                    <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAABY2lDQ1BrQ0dDb2xvclNwYWNlRGlzcGxheVAzAAAokX2QsUvDUBDGv1aloHUQHRwcMolDlJIKuji0FURxCFXB6pS+pqmQxkeSIgU3/4GC/4EKzm4Whzo6OAiik+jm5KTgouV5L4mkInqP435877vjOCA5bnBu9wOoO75bXMorm6UtJfWMBL0gDObxnK6vSv6uP+P9PvTeTstZv///jcGK6TGqn5QZxl0fSKjE+p7PJe8Tj7m0FHFLshXyieRyyOeBZ71YIL4mVljNqBC/EKvlHt3q4brdYNEOcvu06WysyTmUE1jEDjxw2DDQhAId2T/8s4G/gF1yN+FSn4UafOrJkSInmMTLcMAwA5VYQ4ZSk3eO7ncX3U+NtYMnYKEjhLiItZUOcDZHJ2vH2tQ8MDIEXLW54RqB1EeZrFaB11NguASM3lDPtlfNauH26Tww8CjE2ySQOgS6LSE+joToHlPzA3DpfAEDp2ITpJYOWwAAAARjSUNQDA0AAW4D4+8AAAA4ZVhJZk1NACoAAAAIAAGHaQAEAAAAAQAAABoAAAAAAAKgAgAEAAAAAQAAAGCgAwAEAAAAAQAAAGAAAAAAivt9dAAAAsJpVFh0WE1MOmNvbS5hZG9iZS54bXAAAAAAADx4OnhtcG1ldGEgeG1sbnM6eD0iYWRvYmU6bnM6bWV0YS8iIHg6eG1wdGs9IlhNUCBDb3JlIDYuMC4wIj4KICAgPHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj4KICAgICAgPHJkZjpEZXNjcmlwdGlvbiByZGY6YWJvdXQ9IiIKICAgICAgICAgICAgeG1sbnM6ZXhpZj0i \n                totalVacant += loc.surfaceTotale - loc.surfaceLoue;\n                totalBureaux += loc.surfBureaux || 0;\n                totalArchives += loc.surfArchives || 0;\n                totalParkExt += loc.parkingExt || 0;\n                totalParkInt += loc.parkingInt || 0;\n                totalLoyerAn += loc.loyerAnnuel || 0;\n                totalLoyerBureaux += loc.loyerBureaux || 0;\n\n                if (loc.status !== 'vacant' && loc.walb) {\n                    walbSumYears.push({ years: loc.walb, weight: loc.loyerAnnuel });\n                }\n\n                const isVacant = loc.status === 'vacant';\n                const pctSurf = grandTotalSurface ? ((loc.surfaceTotale / grandTotalSurface) * 100).toFixed(0) : 0;\n                const initials = tenantInitials(loc.locataire);\n\n                const tenantHTML = isVacant\n                    ? `<div class=\"tenant-cell\">\n                            <div class=\"tenant-avatar vacant\">—</div>\n                            <div class=\"tenant-info\">\n                                <span class=\"tenant-name\" style=\"color: var(--text-tertiary); font-style: italic;\">VACANT</span>\n                                <span class=\"tenant-type\">${loc.activite}</span>\n                            </div>\n                        </div>`\n                    : `<div class=\"tenant-cell\">\n                            <div class=\"tenant-avatar\" style=\"background: ${tenantAvatarColor(loc.locataire)};\">${initials}</div>\n                            <div class=\"tenant-info\">\n                                <span class=\"tenant-name\">${loc.locataire}</span>\n                                <span class=\"tenant-type\">${loc.activite}</span>\n                            </div>\n                        </div>`;\n\n                const muted = isVacant ? ' muted' : '';\n                const dash = v => v || '—';\n                const fmtEur = v => v ? v.toLocaleString('fr-FR') + ' €' : '—';\n\n                const parkCell = (loc.parkingExt || loc.parkingInt)\n                    ? `${loc.parkingExt} / ${loc.parkingInt}`\n                    : '<span style=\"color: var(--text-muted);\">0 / 0</span>';\n\n                const row = document.createElement('tr');\n                row.className = isVacant ? 'vacant' : 'loue';\n                row.innerHTML = `\n                    <td>${tenantHTML}</td>\n                    <td><span class=\"building-cell\"><strong>${loc.niveau}</strong></span></td>\n                    <td class=\"num\">${loc.surfaceTotale} m²</td>\n                    <td class=\"num${muted}\">${pctSurf} %</td>\n                    <td class=\"num${muted}\">${loc.surfBureaux ? loc.surfBureaux + ' m²' : '—'}</td>\n                    <td class=\"num muted\">${loc.surfArchives ? loc.surfArchives + ' m²' : '0 m²'}</td>\n                    <td class=\"num muted\">${parkCell}</td>\n                    <td class=\"num${muted}\" style=\"font-weight: 600;\">${loc.loyerAnnuel ? loc.loyerAnnuel.toLocaleString('fr-FR') + ' €' : '—'}</td>\n                    <td class=\"num${muted}\">${loc.loyerM2 ? loc.loyerM2.toLocaleString('fr-FR') + ' €/m²' : '—'}</td>\n                    <td style=\"color: var(--text-tertiary); font-size: 0.88em;\">${dash(loc.typeContrat)}</td>\n                    <td class=\"num muted\">${loc.dureeMois ? loc.dureeMois + ' mois' : '—'}</td>\n                    <td style=\"color: var(--text-tertiary); font-size: 0.88em; white-space: nowrap;\">${dash(loc.dateDebut)}</td>\n                    <td style=\"color: var(--text-tertiary); font-size: 0.88em; white-space: nowrap;\">${dash(loc.break1)}</td>\n                    <td class=\"num${muted}\">${loc.walb ? loc.walb.toFixed(1) : '—'}</td>\n                    <td style=\"color: var(--text-tertiary); font-size: 0.88em; white-space: nowrap;\">${dash(loc.dateFin)}</td>\n                    <td class=\"num${muted}\">${loc.walt ? loc.walt.toFixed(1) : '—'}</td>\n                    <td style=\"color: #f59e0b; font-size: 0.88em; font-weight: 600; white-space: nowrap;\">${dash(loc.limiteReception)}</td>\n                `;\n                tbody.appendChild(row);\n            });\n\n            const tauxOcc = ((totalLoue / totalSurface) * 100).toFixed(1);\n\n            // WALB pondéré\n            const walbSum = walbSumYears.reduce((s, e) => s + e.years * e.weight, 0);\n            const walbW = walbSumYears.reduce((s, e) => s + e.weight, 0);\n            const walb = walbW ? (walbSum / walbW) : 0;\n\n            // Loyer bureaux €/m² moyen pondéré (sur la surface louée bureaux)\n            const loyerM2Moy = totalLoue ? (totalLoyerBureaux / totalLoue) : 0;\n\n            // TFOOT — totaux : loué / vacant / immeuble\n            const tfoot = document.getElementById('locatifFoot');\n            if (tfoot) {\n                const surfLouePct = ((totalLoue / totalSurface) * 100).toFixed(0);\n                const surfVacantPct = ((totalVacant / totalSurface) * 100).toFixed(0);\n                tfoot.innerHTML = `\n                    <tr class=\"tfoot-loue\">\n                        <td colspan=\"2\"><span class=\"mini-label\">Total loué</span>${locatairesData.filter(l => l.status !== 'vacant').length} lots</td>\n                        <td class=\"num\">${totalLoue.toLocaleString('fr-FR')} m²</td>\n                        <td class=\"num\">${surfLouePct} %</td>\n                        <td class=\"num\">${totalBureaux - (locatairesData.find(l=>l.status==='vacant')?.surfBureaux || 0)} m²</td>\n                        <td class=\"num muted\">${totalArchives} m²</td>\n                        <td class=\"num muted\">${totalParkExt} / ${totalParkInt}</td>\n                        <td class=\"num\" style=\"font-weight: 700;\">${totalLoyerAn.toLocaleString('fr-FR')} €</td>\n                        <td class=\"num\">${Math.round(loyerM2Moy).toLocaleString('fr-FR')} €/m²</td>\n                        <td colspan=\"4\"></td>\n                        <td class=\"num\">${walb.toFixed(1)}</td>\n                        <td></td>\n                        <td class=\"num\">${walb.toFixed(1)}</td>\n                        <td></td>\n                    </tr>\n                    <tr class=\"tfoot-vacant\">\n                        <td colspan=\"2\"><span class=\"mini-label\">Total vacant</span>${locatairesData.filter(l => l.status === 'vacant').length} lot${locatairesData.filter(l => l.status === 'vacant').length > 1 ? 's' : ''}</td>\n                        <td class=\"num\">${totalVacant.toLocaleString('fr-FR')} m²</td>\n                        <td class=\"num\">${surfVacantPct} %</td>\n                        <td class=\"num muted\" colspan=\"13\"></td>\n                    </tr>\n                    <tr class=\"tfoot-total\">\n                        <td colspan=\"2\"><span class=\"mini-label\">Total immeuble</span>${locatairesData.length} lots · 15 Carnot</td>\n                        <td class=\"num\" style=\"font-weight: 700;\">${totalSurface.toLocaleString('fr-FR')} m²</td>\n                        <td class=\"num\" style=\"font-weight: 700;\">100 %</td>\n                        <td class=\"num\">${totalBureaux} m²</td>\n                        <td class=\"num\">${totalArchives} m²</td>\n                        <td class=\"num\">${totalParkExt} / ${totalParkInt}</td>\n                        <td class=\"num\" style=\"font-weight: 700;\">${totalLoyerAn.toLocaleString('fr-FR')} €</td>\n                        <td colspan=\"8\"></td>\n                    </tr>\n                `;\n            }\n\n            renderLocatifSummary({\n                totalSurface, totalLoue, totalVacant,\n                totalLoyer: totalLoyerAn, tauxOcc,\n                walb, lotCount: locatairesData.length,\n                vacantCount: locatairesData.filter(l => l.status === 'vacant').length,\n                loyerM2Moy\n            });\n        }\n\n        function renderLocatifSummary(s) {\n            const summary = document.getElementById('locatifSummary');\n            if (!summary) return;\n            summary.innerHTML = `\n                <div class=\"summary-card accent-success\">\n                    <span class=\"summary-label\">Taux d'occupation</span>\n                    <span class=\"summary-value\">${s.tauxOcc}<span class=\"unit\">%</span></span>\n                    <div class=\"summary-bar\"><span style=\"width: ${s.tauxOcc}%;\"></span></div>\n                    <span class=\"summary-sub\">${s.totalLoue.toLocaleString('fr-FR')} m² loués / ${s.totalSurface.toLocaleString('fr-FR')} m²</span>\n                </div>\n                <div class=\"summary-card\">\n                    <span class=\"summary-label\">Loyer annualisé HT</span>\n                    <span class=\"summary-value\">${(s.totalLoyer / 1000).toFixed(0)}<span class=\"unit\">k€</span></span>\n                    <span class=\"summary-sub\">${s.totalLoyer.toLocaleString('fr-FR')} €/an</span>\n                </div>\n                <div class=\"summary-card\">\n                    <span class=\"summary-label\">Loyer bureaux moyen</span>\n                    <span class=\"summary-value\">${Math.round(s.loyerM2Moy).toLocaleString('fr-FR')}<span class=\"unit\">€/m²</span></span>\n                    <span class=\"summary-sub\">Positionnement marché Carnot</span>\n                </div>\n                <div class=\"summary-card\">\n                    <span class=\"summary-label\">WALB</span>\n                    <span class=\"summary-value\">${s.walb.toFixed(1)}<span class=\"unit\">ans</span></span>\n                    <span class=\"summary-sub\">Durée moyenne pondérée avant break</span>\n                </div>\n                <div class=\"summary-card ${s.vacantCount ? 'accent-warning' : 'accent-success'}\">\n                    <span class=\"summary-label\">Vacance</span>\n                    <span class=\"summary-value\">${s.totalVacant.toLocaleString('fr-FR')}<span class=\"unit\">m²</span></span>\n                    <span class=\"summary-sub\">${s.vacantCount} lot${s.vacantCount > 1 ? 's' : ''} vacant${s.vacantCount > 1 ? 's' : ''} sur ${s.lotCount}</span>\n                </div>\n                <div class=\"summary-card\">\n                    <span class=\"summary-label\">Nombre de lots</span>\n                    <span class=\"summary-value\">${s.lotCount - s.vacantCount}<span class=\"unit\">/ ${s.lotCount}</span></span>\n                    <span class=\"summary-sub\">Lots actuellement loués</span>\n                </div>\n            `;\n        }\n\n        function exportLocatif() {\n            let csv = 'Locataire;Immeuble;Étage;Surface totale (m²);% surface;Bureaux (m²);Archives (m²);Parking ext;Parking int;Loyer HT annuel (€);Loyer bureaux (€);Loyer €/m²;Type contrat;Durée (mois);Date début;Break #1;WALB;Fin de bail;WALT;Date limite réception\\n';\n            const grandTotal = locatairesData.reduce((s, l) => s + l.surfaceTotale, 0);\n            locatairesData.forEach(loc => {\n                const pct = grandTotal ? ((loc.surfaceTotale / grandTotal) * 100).toFixed(0) : 0;\n                csv += `\"${loc.locataire}\";\"${loc.immeuble}\";\"${loc.niveau}\";${loc.surfaceTotale};${pct};${loc.surfBureaux};${loc.surfArchives};${loc.parkingExt};${loc.parkingInt};${loc.loyerAnnuel};${loc.loyerBureaux};${loc.loyerM2};\"${loc.typeContrat}\";${loc.dureeMois};\"${loc.dateDebut}\";\"${loc.break1}\";${loc.walb};\"${loc.dateFin}\";${loc.walt};\"${loc.limiteReception}\"\\n`;\n            });\n            const blob = new Blob(['\\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });\n            const url = window.URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `etat_locatif_15_carnot_${new Date().toISOString().split('T')[0]}.csv`;\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            window.URL.revokeObjectURL(url);\n        }\n        // ===== ÉQUIPEMENTS TECHNIQUES — RENDERING =====\n        function getHealthStatus(score) {\n            if (score >= 85) return 'ok';\n            if (score >= 70) return 'warning';\n            return 'ko';\n        }\n        function getHealthLabel(score) {\n            if (score >= 85) return 'Bon état';\n            if (score >= 70) return 'À surveiller';\n            return 'À réparer';\n        }\n        function getGlobalStatusLabel(score) {\n            if (score >= 85) return '✓ Excellent état général';\n            if (score >= 75) return '◎ État satisfaisant';\n            if (score >= 60) return '⚠ Surveillance recommandée';\n            return '✕ Interventions prioritaires';\n        }\n\n        function initializeEquipment() {\n            const saved = localStorage.getItem('joro_equipment_v2');\n            if (!saved) {\n                const initial = {};\n                equipment.forEach(eq => {\n                    initial[eq.id] = { healthScore: eq.healthScore, note: '' };\n                });\n                localStorage.setItem('joro_equipment_v2', JSON.stringify(initial));\n            }\n            renderFilters();\n            renderEquipment();\n            updateHealthOverview();\n        }\n\n        function getEquipmentState() {\n            return JSON.parse(localStorage.getItem('joro_equipment_v2') || '{}');\n        }\n\n        function renderFilters() {\n            const filters = document.getElementById('equipmentFilters');\n            if (!filters) return;\n            const cats = ['Tous', ...new Set(equipment.map(e => e.category))];\n            filters.innerHTML = cats.map(cat => {\n                const count = cat === 'Tous' ? equipment.length : equipment.filter(e => e.category === cat).length;\n                const active = cat === equipmentFilter ? 'active' : '';\n                return `<button class=\"eq-filter-btn ${active}\" data-cat=\"${cat}\" onclick=\"setEquipmentFilter('${cat}')\">\n                    ${cat}<span class=\"eq-filter-count\">${count}</span>\n                </button>`;\n            }).join('');\n        }\n\n        function setEquipmentFilter(cat) {\n            equipmentFilter = cat;\n            document.querySelectorAll('.eq-filter-btn').forEach(btn => {\n                btn.classList.toggle('active', btn.dataset.cat === cat);\n            });\n            renderEquipment();\n        }\n\n        function renderEquipment() {\n            const grid = document.getElementById('equipmentGrid');\n            if (!grid) return;\n            const state = getEquipmentState();\n            const list = equipmentFilter === 'Tous'\n                ? equipment\n                : equipment.filter(e => e.category === equipmentFilter);\n\n            grid.innerHTML = list.map(eq => {\n                const s = state[eq.id] || { healthScore: eq.healthScore, note: '' };\n                const status = getHealthStatus(s.healthScore);\n                const label = getHealthLabel(s.healthScore);\n                return `\n                    <div class=\"eq-card status-${status}\" onclick=\"openEquipmentDrawer('${eq.id}')\">\n                        <div class=\"eq-card-head\">\n                            <div class=\"eq-card-title\">\n                                <div class=\"eq-card-name\">${eq.name}</div>\n                                <span class=\"eq-card-category\">${eq.category}</span>\n                            </div>\n                            <span class=\"eq-status-pill\" onclick=\"event.stopPropagation();cycleHealth('${eq.id}')\" title=\"Cliquer pour cycler le statut\">${label}</span>\n                        </div>\n                        <div class=\"eq-health\">\n                            <div class=\"eq-health-head\">\n                                <span class=\"eq-health-label\">Score de santé</span>\n                                <span class=\"eq-health-score\">${s.healthScore}<small>/100</small></span>\n                            </div>\n                            <div class=\"eq-health-bar\">\n                                <div class=\"eq-health-fill\" style=\"width:${s.healthScore}%\"></div>\n                            </div>\n                        </div>\n                        <div class=\"eq-card-meta\">\n                            <div class=\"eq-meta-item\">\n                                <span class=\"eq-meta-label\">Dernier contrôle</span>\n                                <span class=\"eq-meta-value\">${eq.lastCheck}</span>\n                            </div>\n                            <div class=\"eq-meta-item\" style=\"text-align:right;\">\n                                <span class=\"eq-meta-label\">Prochain contrôle</span>\n                                <span class=\"eq-meta-value\">${eq.nextCheck}</span>\n                            </div>\n                        </div>\n                        <input type=\"text\" class=\"eq-card-note\" placeholder=\"Notes d'intervention…\" value=\"${s.note || ''}\"\n                               onclick=\"event.stopPropagation()\"\n                               onchange=\"updateEquipmentNote('${eq.id}', this.value)\">\n                        <span class=\"eq-card-cta\">\n                            Voir la fiche complète\n                            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M9 6l6 6-6 6\"/></svg>\n                        </span>\n                    </div>\n                `;\n            }).join('');\n\n            if (list.length === 0) {\n                grid.innerHTML = `<div style=\"grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-size:0.9em;\">Aucun équipement dans cette catégorie</div>`;\n            }\n        }\n\n        function cycleHealth(id) {\n            const state = getEquipmentState();\n            const original = equipment.find(e => e.id === id).healthScore;\n            const current = state[id]?.healthScore ?? original;\n            // Cycle: keep status levels — if ok, drop to warn; if warn drop to ko; if ko reset to original\n            let next;\n            if (current >= 85) next = 78;\n            else if (current >= 70) next = 55;\n            else next = original;\n            state[id] = { ...state[id], healthScore: next };\n            localStorage.setItem('joro_equipment_v2', JSON.stringify(state));\n            renderEquipment();\n            updateHealthOverview();\n        }\n\n        function updateEquipmentNote(id, value) {\n            const state = getEquipmentState();\n            state[id] = { ...state[id], note: value };\n            localStorage.setItem('joro_equipment_v2', JSON.stringify(state));\n        }\n\n        function updateHealthOverview() {\n            const state = getEquipmentState();\n            let ok = 0, warn = 0, ko = 0, sum = 0;\n            const byCat = {};\n            equipment.forEach(eq => {\n                const score = state[eq.id]?.healthScore ?? eq.healthScore;\n                sum += score;\n                const st = getHealthStatus(score);\n                if (st === 'ok') ok++; else if (st === 'warning') warn++; else ko++;\n                if (!byCat[eq.category]) byCat[eq.category] = { sum: 0, count: 0 };\n                byCat[eq.category].sum += score;\n                byCat[eq.category].count++;\n            });\n            const avg = Math.round(sum / equipment.length);\n\n            document.getElementById('okCount').textContent = ok;\n            document.getElementById('warningCount').textContent = warn;\n            document.getElementById('koCount').textContent = ko;\n            document.getElementById('totalCount').textContent = equipment.length;\n            document.getElementById('globalScore').textContent = avg;\n            document.getElementById('globalStatus').textContent = getGlobalStatusLabel(avg);\n\n            // Gauge ring\n            const bar = document.getElementById('gaugeBar');\n            const circ = 2 * Math.PI * 52;\n            bar.style.strokeDasharray = circ;\n            bar.style.strokeDashoffset = circ * (1 - avg / 100);\n\n            // Category breakdown\n            const breakdown = document.getElementById('categoryBreakdown');\n            if (breakdown) {\n                breakdown.innerHTML = Object.entries(byCat).map(([cat, v]) => {\n                    const score = Math.round(v.sum / v.count);\n                    const color = score >= 85 ? 'var(--success)' : score >= 70 ? 'var(--warning)' : 'var(--danger)';\n                    return `\n                        <div class=\"cat-row\">\n                            <div class=\"cat-row-head\">\n                                <span class=\"cat-row-name\">${cat} <span style=\"color:var(--text-muted);font-weight:500;\">· ${v.count}</span></span>\n                                <span class=\"cat-row-score\" style=\"color:${color};\">${score}/100</span>\n                            </div>\n                            <div class=\"cat-row-bar\"><div class=\"cat-row-fill\" style=\"width:${score}%;background:${color};box-shadow:0 0 8px ${color};\"></div></div>\n                        </div>\n                    `;\n                }).join('');\n            }\n        }\n\n        // ===== DRAWER: FICHE TECHNIQUE =====\n        function openEquipmentDrawer(id) {\n            const eq = equipment.find(e => e.id === id);\n            if (!eq) return;\n            currentEquipmentId = id;\n            const state = getEquipmentState();\n            const s = state[id] || { healthScore: eq.healthScore, note: '' };\n            const status = getHealthStatus(s.healthScore);\n            const label = getHealthLabel(s.healthScore);\n            const d = getEquipmentDetail(eq);\n\n            // Header\n            document.getElementById('eqDrawerHeaderInner').innerHTML = `\n                <span class=\"eq-drawer-category\">${eq.category}</span>\n                <h2 class=\"eq-drawer-title\" id=\"eqDrawerTitle\">${eq.name}</h2>\n                <div class=\"eq-drawer-topmeta\">\n                    <span class=\"eq-drawer-score status-${status}\">\n                        <big>${s.healthScore}</big><small>/100</small>\n                    </span>\n                    <span class=\"eq-drawer-statuspill status-${status}\" style=\"color:${status==='ok'?'var(--success)':status==='warning'?'var(--warning)':'var(--danger)'};background:${status==='ok'?'rgba(74,222,128,0.08)':status==='warning'?'rgba(251,191,36,0.08)':'rgba(239,68,68,0.08)'};\">${label}</span>\n                </div>\n            `;\n\n            // Body\n            const docIcon = `<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/></svg>`;\n            const dlIcon = `<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/></svg>`;\n\n            document.getElementById('eqDrawerBody').innerHTML = `\n                <div class=\"eq-section\">\n                    <div class=\"eq-section-label\">Caractéristiques techniques</div>\n                    <div class=\"eq-specs\">\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Marque</span><span class=\"eq-spec-value\">${d.brand}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Modèle</span><span class=\"eq-spec-value\">${d.model}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">N° série</span><span class=\"eq-spec-value\">${d.serial}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Mise en service</span><span class=\"eq-spec-value\">${d.installed}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Durée de vie estimée</span><span class=\"eq-spec-value\">${d.lifespan}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Capacité</span><span class=\"eq-spec-value\">${d.capacity}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Puissance</span><span class=\"eq-spec-value\">${d.power}</span></div>\n                        <div class=\"eq-spec\"><span class=\"eq-spec-label\">Prochain contrôle</span><span class=\"eq-spec-value\">${eq.nextCheck}</span></div>\n                    </div>\n                </div>\n\n                <div class=\"eq-section\">\n                    <div class=\"eq-section-label\">Prestataire & contrat</div>\n                    <div class=\"eq-contact\">\n                        <div class=\"eq-contact-item\"><span class=\"eq-contact-label\">Prestataire</span><span class=\"eq-contact-value\">${d.contractor}</span></div>\n                        <div class=\"eq-contact-item\"><span class=\"eq-contact-label\">Type de contrat</span><span class=\"eq-contact-value\">${d.contract}</span></div>\n                        <div class=\"eq-contact-item\"><span class=\"eq-contact-label\">Téléphone</span><span class=\"eq-contact-value\"><a href=\"tel:${d.contractorPhone.replace(/\\s/g,'')}\">${d.contractorPhone}</a></span></div>\n                        <div class=\"eq-contact-item\"><span class=\"eq-contact-label\">Email</span><span class=\"eq-contact-value\"><a href=\"mailto:${d.contractorEmail}\">${d.contractorEmail}</a></span></div>\n                        <div class=\"eq-contact-item\" style=\"grid-column:1/-1;\"><span class=\"eq-contact-label\">Fin de contrat</span><span class=\"eq-contact-value\">${d.contractExpiry}</span></div>\n                    </div>\n                </div>\n\n                <div class=\"eq-section\">\n                    <div class=\"eq-section-label\">Historique des interventions</div>\n                    <div class=\"eq-timeline\">\n                        ${d.history.map(h => `\n                            <div class=\"eq-timeline-item ${h.type === 'warning' ? 'warning' : h.type === 'danger' ? 'danger' : ''}\">\n                                <div class=\"eq-timeline-date\">${h.date}</div>\n                                <div class=\"eq-timeline-title\">${h.title}</div>\n                                <div class=\"eq-timeline-desc\">${h.desc}</div>\n                            </div>\n                        `).join('')}\n                    </div>\n                </div>\n\n                <div class=\"eq-section\">\n                    <div class=\"eq-section-label\">Documentation technique</div>\n                    <div class=\"eq-docs\">\n                        ${d.docs.map((doc, idx) => `\n                            <button class=\"eq-doc\" onclick=\"downloadEquipmentDoc('${id}', ${idx})\">\n                                <span class=\"eq-doc-icon\">${docIcon}</span>\n                                <span class=\"eq-doc-main\">\n                                    <span class=\"eq-doc-title\">${doc.name}</span>\n                                    <span class=\"eq-doc-meta\"><span>${doc.type}</span><span>•</span><span>${doc.size}</span></span>\n                                </span>\n                                <span class=\"eq-doc-download\">${dlIcon}</span>\n                            </button>\n                        `).join('')}\n                    </div>\n                </div>\n\n                ${s.note ? `<div class=\"eq-section\">\n                    <div class=\"eq-section-label\">Notes d'intervention</div>\n                    <div style=\"padding:14px 16px;back  x2=\"12.01\" y2=\"16\"/></svg>'\n            };\n            return icons[type] || icons.info;\n        }\n\n        function renderNotifs() {\n            const list = document.getElementById('notifList');\n            const dot = document.getElementById('notifDot');\n            if (!list) return;\n            if (!notifications.length) {\n                list.innerHTML = '<div class=\"notif-empty\">Aucune notification</div>';\n            } else {\n                list.innerHTML = notifications.map(n => `\n                    <div class=\"notif-item ${n.unread ? 'unread' : ''}\" onclick=\"markNotifRead(${n.id})\">\n                        <div class=\"notif-icon ${n.type}\">${notifIconSvg(n.type)}</div>\n                        <div class=\"notif-body\">\n                            <div class=\"notif-title\">${n.title}</div>\n                            <div class=\"notif-desc\">${n.desc}</div>\n                            <div class=\"notif-time\">${n.time}</div>\n                        </div>\n                    </div>\n                `).join('');\n            }\n            const unreadCount = notifications.filter(n => n.unread).length;\n            if (unreadCount > 0) {\n                dot.textContent = unreadCount;\n                dot.classList.remove('hidden');\n            } else {\n                dot.classList.add('hidden');\n            }\n        }\n\n        function toggleNotifCenter(e) {\n            if (e) e.stopPropagation();\n            const panel = document.getElementById('notifPanel');\n            const overlay = document.getElementById('notifOverlay');\n            const trigger = document.getElementById('notifTrigger');\n            const isOpen = panel.classList.contains('open');\n            if (isOpen) {\n                closeNotifCenter();\n            } else {\n                renderNotifs();\n                panel.classList.add('open');\n                overlay.classList.add('open');\n                trigger.setAttribute('aria-expanded', 'true');\n            }\n        }\n\n        function closeNotifCenter() {\n            document.getElementById('notifPanel').classList.remove('open');\n            document.getElementById('notifOverlay').classList.remove('open');\n            document.getElementById('notifTrigger').setAttribute('aria-expanded', 'false');\n        }\n\n        function markNotifRead(id) {\n            const n = notifications.find(x => x.id === id);\n            if (n) n.unread = false;\n            renderNotifs();\n        }\n\n        function clearAllNotifs() {\n            notifications.forEach(n => n.unread = false);\n            renderNotifs();\n        }\n\n        // init badge on load\n        document.addEventListener('DOMContentLoaded', renderNotifs);\n        // Esc closes\n        document.addEventListener('keydown', e => {\n            if (e.key === 'Escape' && document.getElementById('notifPanel')?.classList.contains('open')) {\n                closeNotifCenter();\n            }\n        });\n\n        function openDataRoom() {\n            const modal = document.getElementById('drModal');\n            const overlay = document.getElementById('drOverlay');\n            modal.classList.add('open');\n            overlay.classList.add('open');\n            modal.setAttribute('aria-hidden', 'false');\n            document.body.style.overflow = 'hidden';\n            document.getElementById('drSearch').value = '';\n            drActiveFilter = 'Tous';\n            renderDataRoomFilters();\n            renderDataRoom();\n            setTimeout(() => document.getElementById('drSearch')?.focus(), 300);\n        }\n\n        function closeDataRoom() {\n            document.getElementById('drModal').classList.remove('open');\n            document.getElementById('drOverlay').classList.remove('open');\n            document.getElementById('drModal').setAttribute('aria-hidden', 'true');\n            document.body.style.overflow = '';\n        }\n\n        function setDataRoomFilter(group) {\n            drActiveFilter = group;\n            document.querySelectorAll('.dr-filter-btn').forEach(b => {\n                b.classList.toggle('active', b.dataset.group === group);\n            });\n            renderDataRoom();\n        }\n\n        function renderDataRoomFilters() {\n            const container = document.getElementById('drFilters');\n            container.innerHTML = drGroupOrder.map(g => {\n                const count = g === 'Tous' ? dataRoomDocs.length : dataRoomDocs.filter(d => d.group === g).length;\n                if (count === 0 && g !== 'Tous') return '';\n                const shortLabel = g === 'Administratif & Juridique' ? 'Juridique' :\n                                   g === 'Plans & descriptifs' ? 'Plans' :\n                                   g === 'Hospitality & exploitation' ? 'Hospitality' : g;\n                return `<button class=\"dr-filter-btn ${g === drActiveFilter ? 'active' : ''}\" data-group=\"${g}\" onclick=\"setDataRoomFilter('${g.replace(/'/g, \"\\\\'\")}')\">${shortLabel}<span class=\"dr-count\">${count}</span></button>`;\n            }).join('');\n        }\n\n        function renderDataRoom() {\n            const body = document.getElementById('drModalBody');\n            const query = document.getElementById('drSearch').value.trim().toLowerCase();\n\n            let filtered = dataRoomDocs;\n            if (drActiveFilter !== 'Tous') filtered = filtered.filter(d => d.group === drActiveFilter);\n            if (query) filtered = filtered.filter(d =>\n                d.name.toLowerCase().includes(query) || d.group.toLowerCase().includes(query)\n            );\n\n            if (filtered.length === 0) {\n                body.innerHTML = `\n                    <div class=\"dr-empty\">\n                        <svg width=\"48\" height=\"48\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/></svg>\n                        Aucun document ne correspond à votre recherche.\n                    </div>\n                `;\n                return;\n            }\n\n            // Group by category (keep order)\n            const groups = {};\n            filtered.forEach(d => {\n                if (!groups[d.group]) groups[d.group] = [];\n                groups[d.group].push(d);\n            });\n\n            const dlIcon = `<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/></svg>`;\n\n            body.innerHTML = Object.entries(groups).map(([group, docs]) => `\n                <div class=\"dr-group\">\n                    <div class=\"dr-group-head\">\n                        <span class=\"dr-group-title\">${group}</span>\n                        <span class=\"dr-group-count\">${docs.length}</span>\n                    </div>\n                    <div class=\"dr-files\">\n                        ${docs.map((d, i) => {\n                            const idx = dataRoomDocs.indexOf(d);\n                            const typeLabel = d.type.toUpperCase();\n                            return `\n                            <button class=\"dr-file\" onclick=\"downloadDataRoomDoc(${idx})\" title=\"Télécharger ${d.name.replace(/\"/g, '&quot;')}\">\n                                <span class=\"dr-file-icon ${d.type}\">${typeLabel}</span>\n                                <span class=\"dr-file-main\">\n                                    <span class=\"dr-file-name\">${d.name}</span>\n                                    <span class=\"dr-file-meta\"><span>${d.size}</span><span>•</span><span>${d.date}</span></span>\n                                </span>\n                                <span class=\"dr-file-dl\">${dlIcon}</span>\n                            </button>\n                        `;\n                        }).join('')}\n                    </div>\n                </div>\n            `).join('');\n        }\n\n        function downloadDataRoomDoc(idx) {\n            const doc = dataRoomDocs[idx];\n            if (!doc) return;\n            const content = `═══════════════════════════════════════════════════════════\n  JORO · DATA ROOM · 15 AVENUE CARNOT\n═══════════════════════════════════════════════════════════\n\nDocument      : ${doc.name}\nCatégorie     : ${doc.group}\nType          : ${doc.type.toUpperCase()}\nTaille        : ${doc.size}\nDate          : ${doc.date}\n\n───────────────────────────────────────────────────────────\n\nCe document fait partie du dossier centralisé du 15 Avenue\nCarnot géré par JORO.\n\nPour toute question concernant ce document, contactez :\n  • Romain Ruby (Asset Manager) — romain.ruby@joro.fr\n  • Romain Vedrune (Property Manager) — romain.vedrune@asgard-group.fr\n\n═══════════════════════════════════════════════════════════\nDocument exporté le ${new Date().toLocaleDateString('fr-FR')}\nvia JORO · Playbook de Reporting Trimestriel\n═══════════════════════════════════════════════════════════\n`;\n            const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = doc.name.replace(/\\.(pdf|xlsx|docx|zip|jpg|png)$/i, '.txt');\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n\n        // Esc closes Data Room too\n        document.addEventListener('keydown', e => {\n            if (e.key === 'Escape' && document.getElementById('drModal')?.classList.contains('open')) {\n                closeDataRoom();\n            }\n        });\n\n        function exportEquipmentStatus() {\n            const state = getEquipmentState();\n            let csv = 'Équipement,Catégorie,Score santé (/100),Statut,Dernier contrôle,Prochain contrôle,Notes\\n';\n            equipment.forEach(eq => {\n                const s = state[eq.id] || { healthScore: eq.healthScore, note: '' };\n                const st = getHealthLabel(s.healthScore);\n                csv += `\"${eq.name}\",\"${eq.category}\",${s.healthScore},\"${st}\",\"${eq.lastCheck}\",\"${eq.nextCheck}\",\"${s.note || ''}\"\\n`;\n            });\n            const blob = new Blob([csv], { type: 'text/csv; charset=utf-8;' });\n            const url = window.URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `equipements_${new Date().toISOString().split('T')[0]}.csv`;\n            a.click();\n        }\n\n        // ===== SATISFACTION =====\n        function getSatisfactionColor(score) {\n            if (score >= 85) return 'excellent';\n            if (score >= 75) return 'good';\n            if (score >= 60) return 'warning';\n            return 'danger';\n        }\n\n        function getSatisfactionStatus(score) {\n            if (score >= 85) return '😊 Très satisfait';\n            if (score >= 75) return '🙂 Satisfait';\n            if (score >= 60) return '😐 Moyen';\n            return '😟 Insatisfait';\n        }\n\n        function getVisitStatusBadge(status) {\n            if (status === 'ok') return '✓';\n            if (status === 'warning') return '⚠';\n            return '!';\n        }\n\n        function renderSatisfactionCards() {\n            const grid = document.getElementById('satisfactionGrid');\n            const summary = document.getElementById('satisfactionSummary');\n            \n            grid.innerHTML = '';\n            \n            let totalScore = 0;\n            let excellent = 0, good = 0, moyen = 0, mauvais = 0;\n\n            tenantData.forEach(tenant => {\n                totalScore += tenant.score;\n                const color = getSatisfactionColor(tenant.score);\n                if (color === 'excellent') excellent++;\n                else if (color === 'good') good++;\n                else if (color === 'warning') moyen++;\n                else mauvais++;\n\n                const status = getSatisfactionStatus(tenant.score);\n                \n                let visitsHTML = '';\n                tenant.visits.forEach(visit => {\n                    const badge = getVisitStatusBadge(visit.status);\n                    visitsHTML += `\n                        <div class=\"visit-item\">\n                            <div class=\"visit-item-badge ${visit.status}\">${badge}</div>\n                            <div class=\"visit-item-content\">\n                                <div class=\"visit-item-label\">${visit.month}</div>\n                                <div>${visit.observation}</div>\n                                <div class=\"visit-item-date\">${visit.date}</div>\n                            </div>\n                        </div>\n                    `;\n                });\n\n                const card = document.createElement('div');\n                card.className = 'satisfaction-card';\n                card.innerHTML = `\n                    <div class=\"satisfaction-header\">\n                        <div class=\"satisfaction-info\">\n                            <div class=\"satisfaction-location\">${tenant.immeuble}</div>\n                            <div class=\"satisfaction-name\">${tenant.nom}</div>\n                        </div>\n                        <div class=\"satisfaction-score ${color}\">${tenant.score}</div>\n                    </div>\n                    \n                    <div class=\"satisfaction-bar-container\">\n                        <div class=\"satisfaction-bar ${color}\" style=\"width: ${tenant.score}%\">${tenant.score}%</div>\n                    </div>\n                    \n                    <div class=\"satisfaction-status\">${status}</div>\n                    \n                    <div class=\"satisfaction-feedback\">\"${tenant.feedback}\"</div>\n                    \n                    <div class=\"visit-section\">\n                        <div class=\"visit-section-title\">📋 Comptes rendus de visite</div>\n                        <div class=\"visit-items\">\n                            ${visitsHTML}\n                        </div>\n                    </div>\n                `;\n                grid.appendChild(card);\n            });\n\n            const avgScore = Math.round(totalScore / tenantData.length);\n            const avgColor = getSatisfactionColor(avgScore);\n            \n            let colorStyle = 'var(--success)';\n            if (avgColor === 'good') colorStyle = '#2A9D8F';\n            else if (avgColor === 'warning') colorStyle = 'var(--warning)';\n            else if (avgColor === 'danger') colorStyle = 'var(--danger)';\n            \n            summary.innerHTML = `\n                <div class=\"summary-stat\">\n                    <div class=\"summary-label\">Satisfaction moyenne</div>\n                    <div class=\"summary-value\" style=\"color: ${colorStyle};\">${avgScore}</div>\n                </div>\n                <div class=\"summary-stat\">\n                    <div class=\"summary-label\">Très satisfaits (≥85)</div>\n                    <div class=\"summary-value\">${excellent}</div>\n                </div>\n                <div class=\"summary-stat\">\n                    <div class=\"summary-label\">Satisfaits (75-84)</div>\n                    <div class=\"summary-value\">${good}</div>\n                </div>\n                <div class=\"summary-stat\">\n                    <div class=\"summary-label\">À améliorer (<75)</div>\n                    <div class=\"summary-value\">${moyen + mauvais}</div>\n                </div>\n            `;\n        }\n\n        function exportData() {\n            let csv = 'Locataire,Immeuble,Satisfaction (1-100),Feedback,Dernier Compte Rendu,Date,Observation,Statut\\n';\n            \n            tenantData.forEach(tenant => {\n                const lastVisit = tenant.visits[0] || {};\n                csv += `\"${tenant.nom}\",\"${tenant.immeuble}\",${tenant.score},\"${tenant.feedback}\",\"${lastVisit.month || 'N/A'}\",\"${lastVisit.date || 'N/A'}\",\"${(lastVisit.observation || 'N/A').replace(/\"/g, '\"\"')}\",\"${lastVisit.status || 'N/A'}\"\\n`;\n            });\n            \n            const blob = new Blob([csv], { type: 'text/csv; charset=utf-8;' });\n            const url = window.URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `hospitality_${new Date().toISOString().split('T')[0]}.csv`;\n            a.click();\n            alert('Données exportées avec succès !');\n        }\n\n        function updateScore() {\n            const nom = prompt('Nom du locataire (ex: SOCIÉTÉ X) :');\n            if (!nom) return;\n            \n            const tenant = tenantData.find(t => t.nom.toLowerCase().includes(nom.toLowerCase()));\n            if (!tenant) {\n                alert('Locataire non trouvé');\n                return;\n            }\n            \n            const newScore = prompt(`Nouveau score pour ${tenant.nom} (1-100) :`);\n            if (!newScore) return;\n            \n            const score = Math.min(100, Math.max(1, parseInt(newScore)));\n            tenant.score = score;\n            renderSatisfactionCards();\n            alert(`Score mis à jour : ${tenant.nom} = ${score}/100`);\n        }\n\n        // ===== CONTRATS OPÉRATIONNELS =====\n        const contractsData = {\n            'bigjack': {\n                title: 'Nettoyage cuisine & sanitaires R+1',\n                provider: 'BigJack',\n                category: 'Nettoyage',\n                categoryClass: 'cat-nettoyage',\n                status: 'actif',\n                statusLabel: 'Actif',\n                frequency: '1h / semaine · mardi',\n                priceMonthly: '96,30 €',\n                priceYearly: '1 155,60 €',\n                startDate: '04/03/2025',\n                endDate: 'Durée indéterminée',\n                scope: 'Cuisine et sanitaires R+1',\n                contact: '—',\n                notes: 'Contrat récurrent. Premier prestataire signé pour l\\'immeuble 15 Av. Carnot.'\n            }\n        };\n\n        let currentContractKey = null;\n\n        function showContract(key, fallbackTitle, fallbackCategoryClass, fallbackCategory) {\n            const modal = document.getElementById('contractModal');\n            const categoryEl = document.getElementById('modalCategory');\n            const titleEl = document.getElementById('modalTitle');\n            const providerEl = document.getElementById('modalProvider');\n            const bodyEl = document.getElementById('modalBody');\n            const downloadBtn = document.getElementById('modalDownloadBtn');\n\n            const data = contractsData[key];\n            currentContractKey = data ? key : null;\n\n            // État du bouton PDF\n            if (data && data.pdfAvailable !== false) {\n                downloadBtn.disabled = false;\n                downloadBtn.style.opacity = '1';\n                downloadBtn.style.cursor = 'pointer';\n                downloadBtn.title = 'Télécharger le contrat en PDF';\n            } else {\n                downloadBtn.disabled = true;\n                downloadBtn.style.opacity = '0.4';\n                downloadBtn.style.cursor = 'not-allowed';\n                downloadBtn.title = 'Aucun PDF disponible — contrat à renseigner';\n            }\n\n            if (data) {\n                // Contrat réel\n                categoryEl.className = 'contract-modal-category ' + data.categoryClass;\n                categoryEl.textContent = data.category;\n                titleEl.textContent = data.title;\n                providerEl.textContent = data.provider;\n\n                bodyEl.innerHTML = `\n                    <div class=\"contract-modal-section\">\n                        <div class=\"contract-modal-section-label\">Modalités</div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                                    <circle cx=\"12\" cy=\"12\" r=\"10\"/>\n                                    <polyline points=\"12 6 12 12 16 14\"/>\n                                </svg>\n                                Fréquence\n                            </span>\n                            <span class=\"contract-modal-row-value\">${data.frequency}</span>\n                        </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                                    <path d=\"M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z\"/>\n                                </svg>\n                                Périmètre\n                            </span>\n                            <span class=\"contract-modal-row-value\">${data.scope}</span>\n                        </div>\n                    </div>\n\n                    <div class=\"contract-modal-section\">\n                        <div class=\"contract-modal-section-label\">Coût</div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                                    <line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"/>\n                                    <path d=\"M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6\"/>\n                                </svg>\n                                Mensuel\n                            </span>\n                            <span class=\"contract-modal-row-value highlight\">${data.priceMonthly}</span>\n                        </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                                    <rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"/>\n                                    <line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"/>\n                                    <line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"/>\n                                    <line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"/>\n                                </svg>\n                                Annuel estimé\n                            </span>\n                            <span class=\"contract-modal-row-value\">${data.priceYearly}</span>\n                        </div>\n                    </div>\n\n                    <div class=\"contract-modal-section\">\n                        <div class=\"contract-modal-section-label\">Période & statut</div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">\n                                <svg width=\" </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">Mensuel</span>\n                            <span class=\"contract-modal-row-value\">—</span>\n                        </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">Annuel estimé</span>\n                            <span class=\"contract-modal-row-value\">—</span>\n                        </div>\n                    </div>\n\n                    <div class=\"contract-modal-section\">\n                        <div class=\"contract-modal-section-label\">Période & statut</div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">Date de début</span>\n                            <span class=\"contract-modal-row-value\">—</span>\n                        </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">Échéance</span>\n                            <span class=\"contract-modal-row-value\">—</span>\n                        </div>\n                        <div class=\"contract-modal-row\">\n                            <span class=\"contract-modal-row-label\">Statut</span>\n                            <span class=\"contract-modal-status-badge status-asigner\">À renseigner</span>\n                        </div>\n                    </div>\n\n                    <div class=\"contract-modal-section\">\n                        <div class=\"contract-modal-section-label\">Notes</div>\n                        <div class=\"contract-modal-notes\"><em>Contrat à renseigner. Cliquer sur « Modifier » pour compléter les informations.</em></div>\n                    </div>\n                `;\n            }\n\n            modal.classList.add('open');\n            document.body.style.overflow = 'hidden';\n        }\n\n        function closeContractModal(event) {\n            // Si event est défini, vérifier qu'on clique bien sur le backdrop (pas sur le modal lui-même)\n            if (event && event.target !== event.currentTarget) return;\n            const modal = document.getElementById('contractModal');\n            modal.classList.remove('open');\n            document.body.style.overflow = '';\n            currentContractKey = null;\n        }\n\n        function downloadContractPDF() {\n            if (!currentContractKey) {\n                alert('Aucun PDF disponible pour ce contrat.');\n                return;\n            }\n            const data = contractsData[currentContractKey];\n            if (!data) return;\n\n            // Génération d'un HTML de contrat formaté, puis impression en PDF par le navigateur\n            const today = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });\n            const html = `<!DOCTYPE html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"UTF-8\">\n<title>Contrat - ${data.title}</title>\n<style>\n    @page { size: A4; margin: 20mm; }\n    * { box-sizing: border-box; }\n    body {\n        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n        color: #1C2626;\n        margin: 0;\n        padding: 0;\n        line-height: 1.5;\n        font-size: 11pt;\n    }\n    .header {\n        display: flex;\n        justify-content: space-between;\n        align-items: flex-start;\n        padding-bottom: 20px;\n        border-bottom: 3px solid #81C6C1;\n        margin-bottom: 30px;\n    }\n    .brand {\n        font-size: 24pt;\n        font-weight: 800;\n        letter-spacing: 2px;\n        color: #1C2626;\n    }\n    .brand-sub {\n        font-size: 9pt;\n        color: #666;\n        letter-spacing: 1px;\n        text-transform: uppercase;\n        margin-top: 2px;\n    }\n    .doc-meta {\n        text-align: right;\n        font-size: 9pt;\n        color: #666;\n    }\n    .doc-meta strong {\n        color: #1C2626;\n        display: block;\n        font-size: 11pt;\n        margin-bottom: 4px;\n    }\n    .category-pill {\n        display: inline-block;\n        padding: 4px 10px;\n        background: #81C6C1;\n        color: #1C2626;\n        border-radius: 4px;\n        font-size: 8pt;\n        font-weight: 700;\n        letter-spacing: 1px;\n        text-transform: uppercase;\n        margin-bottom: 12px;\n    }\n    h1 {\n        font-size: 18pt;\n        margin: 0 0 6px;\n        color: #1C2626;\n        letter-spacing: -0.3px;\n    }\n    .provider {\n        font-size: 12pt;\n        color: #555;\n        margin-bottom: 30px;\n    }\n    h2 {\n        font-size: 10pt;\n        text-transform: uppercase;\n        letter-spacing: 1.5px;\n        color: #81C6C1;\n        margin: 25px 0 12px;\n        padding-bottom: 6px;\n        border-bottom: 1px solid #eee;\n    }\n    table {\n        width: 100%;\n        border-collapse: collapse;\n        margin-bottom: 10px;\n    }\n    td {\n        padding: 10px 12px;\n        border-bottom: 1px solid #eee;\n    }\n    td.label {\n        color: #666;\n        width: 40%;\n    }\n    td.value {\n        font-weight: 600;\n        text-align: right;\n    }\n    td.value.highlight {\n        color: #1C2626;\n        font-size: 13pt;\n    }\n    .status {\n        display: inline-block;\n        padding: 4px 10px;\n        border-radius: 4px;\n        font-size: 9pt;\n        font-weight: 600;\n    }\n    .status.actif {\n        background: #dcfce7;\n        color: #166534;\n    }\n    .notes {\n        background: #f8f8f6;\n        padding: 14px 16px;\n        border-left: 3px solid #81C6C1;\n        border-radius: 4px;\n        font-size: 10pt;\n        color: #444;\n        line-height: 1.6;\n    }\n    .footer {\n        margin-top: 50px;\n        padding-top: 20px;\n        border-top: 1px solid #eee;\n        font-size: 8pt;\n        color: #999;\n        text-align: center;\n    }\n    .print-bar {\n        position: fixed;\n        top: 0;\n        left: 0;\n        right: 0;\n        background: #1C2626;\n        color: white;\n        padding: 12px 20px;\n        display: flex;\n        justify-content: space-between;\n        align-items: center;\n        z-index: 9999;\n        font-size: 10pt;\n    }\n    .print-bar button {\n        background: #81C6C1;\n        color: #1C2626;\n        border: none;\n        padding: 8px 16px;\n        border-radius: 6px;\n        font-weight: 600;\n        cursor: pointer;\n        font-size: 10pt;\n    }\n    @media print {\n        .print-bar { display: none; }\n        body { padding-top: 0; }\n    }\n    body { padding-top: 60px; }\n</style>\n</head>\n<body>\n    <div class=\"print-bar\">\n        <span>📄 Aperçu du contrat — utilisez <strong>Cmd/Ctrl + P</strong> puis \"Enregistrer au format PDF\"</span>\n        <button onclick=\"window.print()\">Imprimer / Enregistrer PDF</button>\n    </div>\n\n    <div class=\"header\">\n        <div>\n            <div class=\"brand\">JÖRO</div>\n            <div class=\"brand-sub\">Playbook de reporting · Asgard Group</div>\n        </div>\n        <div class=\"doc-meta\">\n            <strong>Fiche contrat</strong>\n            Édité le ${today}<br>\n            15 Av. Carnot · Paris 17ᵉ · LOKI\n        </div>\n    </div>\n\n    <span class=\"category-pill\">${data.category}</span>\n    <h1>${data.title}</h1>\n    <div class=\"provider\">Prestataire : <strong>${data.provider}</strong></div>\n\n    <h2>Modalités</h2>\n    <table>\n        <tr><td class=\"label\">Fréquence</td><td class=\"value\">${data.frequency}</td></tr>\n        <tr><td class=\"label\">Périmètre</td><td class=\"value\">${data.scope}</td></tr>\n    </table>\n\n    <h2>Coût</h2>\n    <table>\n        <tr><td class=\"label\">Mensuel</td><td class=\"value highlight\">${data.priceMonthly}</td></tr>\n        <tr><td class=\"label\">Annuel estimé</td><td class=\"value\">${data.priceYearly}</td></tr>\n    </table>\n\n    <h2>Période & statut</h2>\n    <table>\n        <tr><td class=\"label\">Date de début</td><td class=\"value\">${data.startDate}</td></tr>\n        <tr><td class=\"label\">Échéance</td><td class=\"value\">${data.endDate}</td></tr>\n        <tr><td class=\"label\">Statut</td><td class=\"value\"><span class=\"status ${data.status}\">${data.statusLabel}</span></td></tr>\n    </table>\n\n    ${data.notes ? `\n    <h2>Notes</h2>\n    <div class=\"notes\">${data.notes}</div>\n    ` : ''}\n\n    <div class=\"footer\">\n        JORO — Playbook de reporting trimestriel · Document confidentiel\n    </div>\n\n    <script>\n        // Auto-launch du dialog d'impression après un court délai\n        setTimeout(() => window.print(), 400);\n    </` + `script>\n</body>\n</html>`;\n\n            // Ouvrir dans un nouvel onglet et lancer l'impression\n            const win = window.open('', '_blank');\n            if (!win) {\n                alert('Veuillez autoriser les pop-ups pour générer le PDF.');\n                return;\n            }\n            win.document.write(html);\n            win.document.close();\n        }\n\n        // Fermer avec Escape\n        document.addEventListener('keydown', (e) => {\n            if (e.key === 'Escape') {\n                closeContractModal();\n            }\n        });\n\n        // Fausse map stylée — pas besoin de Google Maps\n        function initMap() {\n            // No-op : la map est rendue en CSS/HTML directement\n        }\n\n        const pageTitles = {\n            'overview': 'Vue d\\'ensemble',\n            'am': 'Asset Management',\n            'fund': 'Fund Management',\n            'finance': 'Financier',\n            'admin': 'Administratif',\n            'technique': 'Technique',\n            'hospitality': 'Hospitality',\n            'plans': 'Plans & surfaces'\n        };\n\n        // ===== TIMELINE GLOBALE =====\n        const timelineLabels = {\n            'quarter': 'T2 2025
